splay: flex; justify-content: space-between; align-items: center; width: 100%; background: linear-gradient(180deg, #000000 10%, transparent); } .header h1 { font-weight: 100; color: #ffffffb0; font-size: 15px; } .search-box { display: flex; justify-content: center; align-items: center; } #searchInput { width: 100%; padding: 8px 2px 8px 45px; font-size: 17px; border-radius: 20px; background: #1d2936; border: none; color: var(--text-primary); outline: none; transition: all 0.2s; } #searchInput:focus { background: #3a4b5e; } .fixtopsectiob { position: sticky; top: 0px; z-index: 1000; } .search-icon { position: absolute; left: 20px; font-size: 13px; color: rgb(255 255 255 / 60%); display: flex; justify-content: center; align-items: center; } .section { margin-bottom: 15px; position: relative; background: #181818; border-radius: 20px; } .section h2 { font-size: 15px; font-weight: 400; color: #8774e1; margin-bottom: 0px; padding-left: 20px; padding-top: 15px; } a.site-item:hover{ background-color: #212121; } a.site-item:last-child{ border-radius: 0 0 20px 20px; } .site-item { display: flex; align-items: center; padding: 10px; text-decoration: none; color: var(--text-primary); transition: background 0.18s; } .letter-icon { width: 48px; height: 48px; margin-right: 7px; border-radius: 50%; background: var(--accent-dark); color: black; font-weight: 600; font-size: 1.35rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; text-transform: uppercase; filter: brightness(0.5) saturate(5); } .site-info { flex: 1; min-width: 0; } .site-info h3 { font-size: 16px; font-weight: 500; margin: 0 0 3px 0; } .site-info p { font-size: 13px; color: #ffffff82; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 300; width: 75%; } .section:first-child { border: none; } .no-results { text-align: center; padding: 80px 20px; color: var(--text-secondary); font-size: 1.1rem; display: none; } footer{ text-align: center; font-size: <script>
const siteGroups = [
    {
    heading: "Return Management",
    sites: [
      { name: "BS&MFI Solutions",      desc: "Return date extender",       url: "https://blackswan19.github.io/golden/FM/solution",      icon: "fab fa-youtube"       },
]
},
{
  heading: "New in & issue",
  sites: [
    { name: "Enterance Form", desc: "New members form",       url: "https://mfi0212.github.io/MFI/entrysheet", icon: "fas fa-code"         },
    { name: "Helper",      desc: "I have issue form",           url: "https://mfi0212.github.io/MFI/abt.hlp",      icon: "fas fa-film"          },
  ]
},
{
  heading: "Offer & Earns",
  sites: [
    { name: "BsGames",       desc: "Exclusive rewards and benefits for BS&MFI members.",          url: "https://blackswan19.github.io/golden/Bs%20Games/bsgames",       icon: "fab fa-reddit"        },
    { name: "Stars",       desc: "Interest reducer.",          url: "https://blackswan19.github.io/golden/FM/starspage",       icon: "fab fa-reddit"        },
  ]
},
  
  {
    heading: "Services",
    sites: [
      { name: "All Services", desc: "All service from BS&MFI",       url: "https://blackswan19.github.io/BS/bslends", icon: "fas fa-code"         },
      { name: "BsLends", desc: "A service from BS&MFI",       url: "https://mfi0212.github.io/MFI/rate", icon: "fas fa-code"         },
      { name: "Myootive", desc: "A service from BS&MFI",       url: "https://blackswan19.github.io/golden/FM/themain", icon: "fas fa-code"         },
    ]
  },
   {
    heading: "Collaboration",
    sites: [
      { name: "BsPsgenerater", desc: "Password generator",       url: "https://blackswan19.github.io/Educate/password", icon: "fas fa-code"         },
      { name: "BsReminder", desc: "Date wise notes",       url: "https://blackswan19.github.io/bscrop/reminder", icon: "fas fa-code"         },
      { name: "BsBookpad", desc: "Download the notes",       url: "https://blackswan19.github.io/Educate/bookpad", icon: "fas fa-code"         },
      { name: "BsAdstoper", desc: "Ad blocker",       url: "https://blackswan19.github.io/Educate/stoper", icon: "fas fa-code"         },
     { name: "BsFilexplorer", desc: "Store privacy files in folders",       url: "https://blackswan19.github.io/Educate/filexplorer", icon: "fas fa-code"         },
      { name: "BsMediastorage", desc: "Store files with privacy",       url: "https://blackswan19.github.io/Educate/hider", icon: "fas fa-code"         },
    ]
  }
];
document.addEventListener('contextmenu', e => e.preventDefault());
function getColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) {
    hash = name.charCodeAt(i) + ((hash << 5) - hash);
  }
  const hue = Math.abs(hash) % 360;
  return `hsl(${hue}, 75%, 58%)`;
}

function getInitial(name) {
  return name.trim()[0]?.toUpperCase() || "?";
}

function renderAll() {
  const container = document.getElementById("sectionsContainer");
  container.innerHTML = "";

  siteGroups.forEach(group => {
    const section = document.createElement("div");
    section.className = "section";

    const h2 = document.createElement("h2");
    h2.textContent = group.heading;
    section.appendChild(h2);

    const list = document.createElement("div");
    list.className = "site-list";

    group.sites.forEach(site => {
      const a = document.createElement("a");
      a.href = site.url;
      a.target = "_parent";
      a.className = "site-item";

      const bg = getColor(site.name);
      const initial = getInitial(site.name);

      a.innerHTML = `
        <div class="letter-icon" style="background: ${bg};">${initial}</div>
        <div class="site-info">
          <h3>${site.name}</h3>
          <p>${site.desc}</p>
        </div>
      `;

      list.appendChild(a);
    });

    section.appendChild(list);
    container.appendChild(section);
  });
}

function renderFiltered(query = "") {
  const q = query.toLowerCase().trim();
  const container = document.getElementById("sectionsContainer");
  const noResults = document.getElementById("noResults");

  container.innerHTML = "";

  if (!q) {
    renderAll();
    noResults.style.display = "none";
    return;
  }

  let found = false;

  siteGroups.forEach(group => {
    const matches = group.sites.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.desc.toLowerCase().includes(q) ||
      s.url.toLowerCase().includes(q)
    );

    if (!matches.length) return;

    found = true;

    const section = document.createElement("div");
    section.className = "section";

    const h2 = document.createElement("h2");
    h2.textContent = group.heading;
    section.appendChild(h2);

    const list = document.createElement("div");
    list.className = "site-list";

    matches.forEach(site => {
      const a = document.createElement("a");
      a.href = site.url;
      a.target = "_parent";
      a.className = "site-item";

      const bg = getColor(site.name);
      const initial = getInitial(site.name);

      a.innerHTML = `
        <div class="letter-icon" style="background: ${bg};">${initial}</div>
        <div class="site-info">
          <h3>${site.name}</h3>
          <p>${site.desc}</p>
        </div>
      `;

      list.appendChild(a);
    });

    section.appendChild(list);
    container.appendChild(section);
  });

  noResults.style.display = found ? "none" : "block";
}
function goBack() {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        alert("✅ Back button clicked!\n\n(In a real app this would take you to previous screen or home.)");
      }
    }
renderAll();

document.getElementById("searchInput").addEventListener("input", e => {
  renderFiltered(e.target.value);
});
</script>
