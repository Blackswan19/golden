<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BsRora</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #e0e0e0;
        }

        .chat-container {
           width: 100%;
    max-width: 420px;
    height: 100vh;
    background: #0a0a0a;
    border: 1px solid #1a1a1a;
    border-radius: 0px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0, 0, 0, 0.9);
    display: flex;
    flex-direction: column;
        }

        /* Header */
        .header {
            background: #111111;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #222;
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00ff9d, #00cc6e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 21px;
            font-weight: bold;
            color: #000;
            flex-shrink: 0;
            box-shadow: 0 0 10px rgba(0, 255, 140, 0.3);
        }

        .header-info h1 {
            font-size: 17px;
            font-weight: 500;
            color: #ffffff;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #00ff9d;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #00ff9d;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Chat Messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: thin;
            scrollbar-color: #333 #0a0a0a;
        }

        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 20px;
        }

        .message {
            display: flex;
            max-width: 85%;
            gap: 8px;
        }

        .bot-message {
            align-self: flex-start;
        }

        .user-message {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .bubble {
            padding: 11px 16px;
            border-radius: 18px;
            font-size: 15.5px;
            line-height: 1.45;
        }

        .bot-bubble {
            background: #1c1c1c;
            color: #e0e0e0;
            border-bottom-left-radius: 5px;
        }

        .user-bubble {
            background: #007acc;
            color: white;
            border-bottom-right-radius: 5px;
        }

        /* Offer Card */
        .offer-card {
            background: #161616;
            border: 1px solid #252525;
            border-radius: 12px;
            padding: 16px;
            margin: 10px 0;
            border-left: 4px solid #00ff9d;
        }

        .offer-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .offer-title {
            font-size: 15.5px;
            font-weight: 500;
            color: #ffffff;
            flex: 1;
        }

        .discount-badge {
            background: #003322;
            color: #00ff9d;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .offer-description {
            color: #bbbbbb;
            font-size: 14px;
            margin: 10px 0;
        }

        .offer-dates {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #888888;
        }

        .apply-btn {
            margin-top: 12px;
            width: 100%;
            background: #00ff9d;
            color: #000000;
            font-weight: 500;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .apply-btn:hover {
            background: #00cc7a;
            transform: scale(1.02);
        }

        /* Input Area */
        .input-area {
            background: #111111;
            padding: 14px 16px;
            border-top: 1px solid #222;
        }

        .input-box {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 9999px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
        }

        #user-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 15.5px;
        }

        #user-input::placeholder {
            color: #666666;
        }

        .send-btn {
            width: 38px;
            height: 38px;
            background: #007acc;
            color: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
        }

        .hint {
            text-align: center;
            font-size: 11px;
            color: #555555;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="chat-container">

        <!-- Header -->
        <div class="header">
            <div class="avatar">B</div>
            <div class="header-info">
                <h1>BsRora</h1>
                <div class="status">
                    <span class="status-dot"></span>
                    online
                </div>
            </div>
            <div style="margin-left: auto; color: #666; font-size: 20px;">
                <i class="fas fa-ellipsis-v"></i>
            </div>
        </div>

        <!-- Messages Area -->
        <div id="chat-messages" class="chat-messages"></div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-box">
                <input 
                    id="user-input"
                    type="password"
                    placeholder="Enter password to unlock offers..."
                    onkeydown="if(event.key === 'Enter') sendMessage()">
                <button onclick="sendMessage()" class="send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <div id="hint" class="hint">
                Demo Password: <span style="color:#00ff9d; font-family: monospace;">bsrora2026</span>
            </div>
        </div>
    </div>

    <script>
        const CORRECT_PASSWORD = "bsrora2026";

        const OFFERS = [
            {
                title: "Summer Mega Sale",
                description: "Up to 70% OFF on Electronics, Fashion & Home Appliances",
                startDate: "2026-03-25",
                endDate: "2026-04-25",
                discount: "70% OFF"
            },
            {
                title: "Buy 1 Get 1 Free",
                description: "On all groceries, snacks and daily essentials",
                startDate: "2026-04-01",
                endDate: "2026-04-15",
                discount: "BOGO"
            },
            {
                title: "Festive Cashback",
                description: "Flat ₹300 cashback on orders above ₹1500 using any bank card",
                startDate: "2026-04-05",
                endDate: "2026-04-20",
                discount: "₹300 CB"
            }
        ];

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-IN', { 
                day: 'numeric', 
                month: 'short', 
                year: 'numeric' 
            });
        }

        function addMessage(sender, content, isHTML = false) {
            const chat = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = sender === 'bot' ? 'message bot-message' : 'message user-message';

            if (sender === 'bot') {
                div.innerHTML = `
                    <div class="avatar">B</div>
                    <div class="bubble bot-bubble">
                        ${isHTML ? content : `<p>${content}</p>`}
                    </div>
                `;
            } else {
                div.innerHTML = `
                    <div class="bubble user-bubble">
                        <p>${content}</p>
                    </div>
                `;
            }
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function createOfferCard(offer) {
            return `
                <div class="offer-card">
                    <div class="offer-header">
                        <div class="offer-title">${offer.title}</div>
                        <div class="discount-badge">${offer.discount}</div>
                    </div>
                    <div class="offer-description">${offer.description}</div>
                    <div class="offer-dates">
                        <div>Start: <span style="color:#ddd">${formatDate(offer.startDate)}</span></div>
                        <div>End: <span style="color:#ddd">${formatDate(offer.endDate)}</span></div>
                    </div>
                    <button onclick="applyOffer('${offer.title}')" class="apply-btn">
                        Apply Now
                    </button>
                </div>
            `;
        }

        function showOffers() {
            addMessage('bot', '✅ Password verified!<br>Here are the currently active offers:', true);

            let offersHTML = '';
            OFFERS.forEach(offer => {
                offersHTML += createOfferCard(offer);
            });

            const chat = document.getElementById('chat-messages');
            const offerDiv = document.createElement('div');
            offerDiv.className = 'message bot-message';
            offerDiv.innerHTML = `
                <div class="avatar">B</div>
                <div class="bubble bot-bubble">
                    ${offersHTML}
                </div>
            `;
            chat.appendChild(offerDiv);
            chat.scrollTop = chat.scrollHeight;
        }

        function applyOffer(title) {
            alert(`🎉 You applied for the offer: "${title}"\n\nOffer has been successfully applied!`);
        }

        let isVerified = false;

        function sendMessage() {
            const input = document.getElementById('user-input');
            const value = input.value.trim();

            if (!value) return;

            if (!isVerified) {
                // Show masked password
                addMessage('user', '••••••••••');

                setTimeout(() => {
                    if (value === CORRECT_PASSWORD) {
                        isVerified = true;
                        addMessage('bot', '🔓 Access Granted!<br>Welcome to BsRora!', true);

                        // Change input to normal mode
                        input.type = 'text';
                        input.placeholder = 'Type a message...';
                        document.getElementById('hint').innerHTML = 
                            '<span style="color:#00ff9d">✅ Verified • Full access unlocked</span>';

                        setTimeout(showOffers, 600);
                    } else {
                        addMessage('bot', '❌ Incorrect password. Please try again.', true);
                    }
                }, 600);
            } else {
                addMessage('user', value);
                setTimeout(() => {
                    addMessage('bot', 'Here are the active offers 👆', true);
                }, 400);
            }

            input.value = '';
        }

        // Initialize Chat
        window.onload = () => {
            addMessage('bot', `
                Hello! 👋<br><br>
                I am <strong>BsRora</strong>.<br>
                Enter the password to unlock and view all active offers with start &amp; end dates.
            `, true);

            document.getElementById('user-input').focus();
        };
    </script>
</body>
</html>
