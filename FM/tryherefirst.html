<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClearPay</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: white;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
    }

    .header {
      background: #000;
      color: white;
      padding: 28px 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 26px;
      font-weight: 600;
    }

    .content {
      padding: 32px 28px;
    }

    input {
      width: 100%;
      padding: 16px 20px;
      border: 1.5px solid #d2d2d7;
      border-radius: 16px;
      font-size: 17px;
      margin-bottom: 20px;
      background: #fff;
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #0071e3;
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15);
    }

    button {
      width: 100%;
      padding: 16px;
      background: #0071e3;
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:hover {
      background: #0066cc;
      transform: translateY(-1px);
    }

    .fee-card {
      background: #f8f9fa;
      border-radius: 20px;
      padding: 24px;
      margin: 24px 0;
      text-align: center;
      border: 1px solid #e5e5e5;
    }

    .fee-amount {
      font-size: 38px;
      font-weight: 600;
      color: #000;
      margin: 8px 0;
    }

    .history {
      margin-top: 30px;
    }

    .history h3 {
      font-size: 17px;
      margin-bottom: 15px;
      color: #555;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      padding: 14px 18px;
      background: #f8f9fa;
      border-radius: 14px;
      margin-bottom: 10px;
      border: 1px solid #e5e5e5;
    }

    .hidden { 
      display: none; 
    }

    .error { 
      color: #ff3b30; 
      text-align: center; 
      margin: 10px 0; 
      font-size: 15px; 
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Login Screen -->
    <div id="loginScreen">
      <div class="header">
        <h1>ClearPay</h1>
      </div>
      <div class="content">
        <h2 style="text-align:center; margin-bottom:24px; color:#1d1d1f;">Enter Password</h2>
        <input type="password" id="passwordInput" placeholder="Password" autocomplete="off">
        <button onclick="verifyPassword()">Continue</button>
        <div id="loginError" class="error"></div>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden">
      <div class="header">
        <h1>ClearPay</h1>
        <button onclick="logout()" 
                style="position:absolute; top:24px; right:24px; background:none; color:white; border:none; font-size:16px; cursor:pointer;">
          Sign Out
        </button>
      </div>
      <div class="content">
        <p style="text-align:center; margin-bottom:20px; color:#1d1d1f;">
          Welcome, <strong id="userName"></strong>
        </p>

        <input type="number" id="amountInput" placeholder="Enter amount" oninput="calculateFee()">

        <div class="fee-card" id="feeResult">
          <p style="color:#555; font-size:15px;">6% Processing Fee</p>
          <div class="fee-amount" id="feeAmount">₹0.00</div>
          <p style="color:#555;" id="totalAmount">Total: ₹0.00</p>
        </div>

        <button onclick="applyForClearance()">Apply for Clearance</button>

        <div class="history">
          <h3>Recent Activity</h3>
          <div id="historyList"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Multiple Users Data
    const users = {
      "pass1": { 
        name: "Rahul Sharma", 
        history: [
          { amount: 25000, date: "2026-05-05" },
          { amount: 18000, date: "2026-04-30" }
        ]
      },
      "pass2": { 
        name: "Priya Patel", 
        history: [
          { amount: 45000, date: "2026-05-03" }
        ]
      },
      "admin123": { 
        name: "Administrator", 
        history: [] 
      }
    };

    let currentUserPassword = null;

    function verifyPassword() {
      const password = document.getElementById("passwordInput").value.trim();
      const errorDiv = document.getElementById("loginError");

      if (users[password]) {
        currentUserPassword = password;
        document.getElementById("loginScreen").classList.add("hidden");
        document.getElementById("dashboard").classList.remove("hidden");
        
        document.getElementById("userName").textContent = users[password].name;
        renderHistory();
      } else {
        errorDiv.textContent = "Incorrect password";
        setTimeout(() => errorDiv.textContent = "", 2500);
      }
    }

    function calculateFee() {
      const amount = parseFloat(document.getElementById("amountInput").value) || 0;
      const fee = amount * 0.06;
      const total = amount + fee;

      document.getElementById("feeAmount").textContent = `₹${fee.toFixed(2)}`;
      document.getElementById("totalAmount").textContent = `Total: ₹${total.toFixed(2)}`;
    }

    function applyForClearance() {
      const amount = parseFloat(document.getElementById("amountInput").value);
      if (!amount || amount <= 0) {
        alert("Please enter a valid amount");
        return;
      }

      const googleFormUrl = "https://docs.google.com/forms/d/e/YOUR_FORM_ID/viewform"; // ← Replace with your link

      if (confirm(`Apply for ₹${amount.toLocaleString('en-IN')} ?`)) {
        window.open(googleFormUrl, "_blank");

        users[currentUserPassword].history.unshift({
          amount: amount,
          date: new Date().toISOString().split('T')[0]
        });

        renderHistory();
        document.getElementById("amountInput").value = "";
        calculateFee();
      }
    }

    function renderHistory() {
      const container = document.getElementById("historyList");
      container.innerHTML = "";

      const history = users[currentUserPassword].history;

      if (history.length === 0) {
        container.innerHTML = `<p style="color:#999; text-align:center; padding:30px 0;">No transactions yet</p>`;
        return;
      }

      history.forEach(item => {
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerHTML = `
          <span>₹${item.amount.toLocaleString('en-IN')}</span>
          <span style="color:#777;">${item.date}</span>
        `;
        container.appendChild(div);
      });
    }

    function logout() {
      if (confirm("Sign out?")) {
        currentUserPassword = null;
        document.getElementById("dashboard").classList.add("hidden");
        document.getElementById("loginScreen").classList.remove("hidden");
        document.getElementById("passwordInput").value = "";
      }
    }

    // Enter key support
    document.getElementById("passwordInput").addEventListener("keypress", (e) => {
      if (e.key === "Enter") verifyPassword();
    });
  </script>
</body>
</html>
