<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSearchin • Safari</title>
    <link rel="icon" type="image/x-icon" href="https://i.ibb.co/1bgTMY6/logosercin.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&display=swap');

        :root {
            --safari-blue: #0071e3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .background-container {
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: -2;
            transition: background 0.4s ease;
        }

        .blur-overlay {
            position: fixed;
            inset: 0;
            background: rgb(0 0 0 / 32%);
        }

        /* Toolbar */
        .toolbar {
            position: fixed;
            left: 0;
            right: 0;
            height: 56px;
            background: rgba(30, 30, 30, 0.92);
            backdrop-filter: blur(30px);
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            padding: 0 12px;
            z-index: 1000;
            transition: all 0.4s ease;
        }

        .toolbar.bottom {
            top: auto;
            bottom: 0;
            border-bottom: none;
            border-top: 0.5px solid rgba(255,255,255,0.1);
        }

        .address-bar-container {
            flex: 1;
            max-width: 680px;
            margin: 0 auto;
            position: relative;
        }

        #url-bar {
            width: 100%;
            height: 42px;
            background: rgba(60, 60, 60, 0.9);
            border: 0.5px solid rgba(255,255,255,0.2);
            border-radius: 9999px;
            padding: 0 50px 0 20px;
            color: #fff;
            font-size: 15.5px;
            outline: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        #url-bar:focus {
            background: rgba(70, 70, 70, 0.95);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.4);
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }

        /* Favorites */
        .main-content {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .logo {
            font-size: 38px;
            font-weight: 600;
            letter-spacing: -1.2px;
            margin-bottom: 50px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        .favorites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(88px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 620px;
        }

        .favorite-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            position: relative;
        }

        .fav-icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .fav-icon img {
            width: 46px;
            height: 46px;
            border-radius: 10px;
        }

        .fav-title {
            font-size: 13.5px;
            color: #ddd;
            text-align: center;
            max-width: 88px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .delete-fav {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #ff3b30;
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            opacity: 0;
            transition: all 0.2s;
        }

        .favorite-item:hover .delete-fav {
            opacity: 1;
        }

        /* Bottom Links */
        .bottom-links {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(40,40,40,0.85);
            backdrop-filter: blur(30px);
            border-radius: 9999px;
            padding: 6px 14px;
            display: flex;
            gap: 12px;
            font-size: 13px;
            z-index: 900;
        }

        .bottom-link {
            color: #ccc;
            padding: 6px 12px;
            border-radius: 9999px;
            transition: 0.2s;
        }

        .bottom-link:hover {
            background: rgba(255,255,255,0.12);
            color: white;
        }

        /* Settings Menu */
        .settings-menu {
            position: fixed;
            top: 70px;
            right: 16px;
            background: rgba(32,32,32,0.97);
            backdrop-filter: blur(30px);
            border-radius: 14px;
            padding: 8px 0;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 0.5px solid rgba(255,255,255,0.1);
            z-index: 2000;
            min-width: 210px;
            display: none;
        }

        .menu-item {
            padding: 12px 20px;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .menu-item:hover {
            background: rgba(255,255,255,0.1);
        }

        /* Popups */
        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(28,28,28,0.98);
            backdrop-filter: blur(30px);
            border-radius: 18px;
            padding: 24px;
            width: 92%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            z-index: 3000;
            display: none;
            border: 0.5px solid rgba(255,255,255,0.15);
        }
    </style>
</head>
<body>
    <div class="background-container" id="bgContainer"></div>
    <div class="blur-overlay"></div>

    <!-- Toolbar -->
    <div class="toolbar" id="toolbar">
        <div class="address-bar-container">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="url-bar" placeholder="Search or enter website" autocomplete="off">
        </div>
        <div onclick="toggleSettings()" style="padding: 8px 10px; cursor: pointer;">
            <i class="fa-solid fa-ellipsis-h"></i>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="logo">BSearchin</div>
        <div id="favorites-grid" class="favorites-grid"></div>
    </div>

    <!-- Bottom Links -->
    <div class="bottom-links">
        <a href="https://blackswan19.github.io/Educate/songsearcher" class="bottom-link">BSongsearch</a>
        <a href="https://blackswan19.github.io/bscrop/bsweb" class="bottom-link">BsWebs</a>
    </div>

    <!-- Settings Menu -->
    <div class="settings-menu" id="settingsMenu">
        <div class="menu-item" onclick="toggleToolbarPosition()"><i class="fa-solid fa-arrows-up-down"></i> Move Search Bar</div>
        <div class="menu-item" onclick="uploadBackground()"><i class="fa-solid fa-upload"></i> Upload Wallpaper</div>
        <div class="menu-item" onclick="pickColorBackground()"><i class="fa-solid fa-palette"></i> Solid Color Background</div>
        <div class="menu-item" onclick="showRecommendedBGs()"><i class="fa-solid fa-images"></i> Recommended Wallpapers</div>
        <div class="menu-item" onclick="removeBackground()"><i class="fa-solid fa-trash"></i> Reset Background</div>
        <div class="menu-item" onclick="addNewSite()"><i class="fa-solid fa-plus"></i> Add Favorite</div>
    </div>

    <!-- Add Favorite Popup -->
    <div class="popup" id="addSitePopup">
        <div style="font-size:18px; font-weight:600; text-align:center; margin-bottom:16px;">Add New Favorite</div>
        <input type="text" id="siteTitle" class="popup-input" placeholder="Title" style="margin-bottom:12px;">
        <input type="text" id="siteURL" class="popup-input" placeholder="https://example.com">
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="hideAddPopup()" style="flex:1; padding:12px; border-radius:10px; background:rgba(255,255,255,0.1); color:white; border:none;">Cancel</button>
            <button onclick="saveNewSite()" style="flex:1; padding:12px; border-radius:10px; background:#0071e3; color:white; border:none;">Add</button>
        </div>
    </div>

    <!-- Recommended BG Popup -->
    <div class="popup" id="bgPopup" style="width:92%; max-width:680px;">
        <div style="font-size:18px; font-weight:600; text-align:center; margin-bottom:16px;">Choose Wallpaper</div>
        <div id="bgGrid" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(130px,1fr)); gap:12px; max-height:420px; overflow-y:auto; padding:8px 0;"></div>
        <button onclick="hideBGPpopup()" style="margin-top:16px; width:100%; padding:12px; border-radius:10px; background:rgba(255,255,255,0.1); color:white; border:none;">Close</button>
    </div>

    <script>
        // Background Management
        let currentBg = localStorage.getItem('bsBackground') || '';
        let currentColor = localStorage.getItem('bsBackgroundColor') || '#0a0f1c';

        function applyBackground() {
            const bgContainer = document.getElementById('bgContainer');
            if (currentBg) {
                bgContainer.style.backgroundImage = `url('${currentBg}')`;
                bgContainer.style.backgroundColor = '';
            } else {
                bgContainer.style.backgroundImage = '';
                bgContainer.style.backgroundColor = currentColor;
            }
        }

        function updateImageBackground(src) {
            currentBg = src;
            localStorage.setItem('bsBackground', src);
            localStorage.removeItem('bsBackgroundColor');
            applyBackground();
        }

        function updateColorBackground(color) {
            currentColor = color;
            currentBg = '';
            localStorage.setItem('bsBackgroundColor', color);
            localStorage.removeItem('bsBackground');
            applyBackground();
        }

        function removeBackground() {
            if (confirm("Reset to default background?")) {
                currentBg = '';
                currentColor = '#0a0f1c';
                localStorage.removeItem('bsBackground');
                localStorage.removeItem('bsBackgroundColor');
                applyBackground();
            }
        }

        // Color Picker
        function pickColorBackground() {
            const input = document.createElement('input');
            input.type = 'color';
            input.value = currentColor;
            input.onchange = (e) => {
                updateColorBackground(e.target.value);
            };
            input.click();
            document.getElementById('settingsMenu').style.display = 'none';
        }

        // Toolbar Position
        function loadToolbarPosition() {
            const isBottom = localStorage.getItem('toolbarBottom') === 'true';
            if (isBottom) document.getElementById('toolbar').classList.add('bottom');
        }

        function toggleToolbarPosition() {
            const toolbar = document.getElementById('toolbar');
            const isBottom = toolbar.classList.toggle('bottom');
            localStorage.setItem('toolbarBottom', isBottom);
            document.getElementById('settingsMenu').style.display = 'none';
        }

        // Favorites
        let favorites = JSON.parse(localStorage.getItem('bsFavorites')) || [];

        function renderFavorites() {
            const grid = document.getElementById('favorites-grid');
            grid.innerHTML = favorites.length === 0 
                ? `<div style="color:#777; text-align:center; grid-column:1/-1; padding:60px 20px; font-size:15px;">No favorites yet.<br>Use menu → Add Favorite</div>`
                : '';

            favorites.forEach((fav, index) => {
                const div = document.createElement('div');
                div.className = 'favorite-item';
                div.innerHTML = `
                    <div class="fav-icon">
                        <img src="${fav.icon}" onerror="this.src='https://i.ibb.co/kxgjrZG/sitesaved-BS.png'">
                    </div>
                    <div class="fav-title">${fav.title}</div>
                    <div class="delete-fav" onclick="event.stopImmediatePropagation(); deleteFavorite(${index});">×</div>
                `;
                div.onclick = () => window.open(fav.url, '_self');
                grid.appendChild(div);
            });
        }

        function deleteFavorite(index) {
            if (confirm("Delete this favorite?")) {
                favorites.splice(index, 1);
                localStorage.setItem('bsFavorites', JSON.stringify(favorites));
                renderFavorites();
            }
        }

        function addNewSite() {
            document.getElementById('addSitePopup').style.display = 'block';
            document.getElementById('settingsMenu').style.display = 'none';
        }

        function hideAddPopup() {
            document.getElementById('addSitePopup').style.display = 'none';
        }

        function saveNewSite() {
            const title = document.getElementById('siteTitle').value.trim();
            let url = document.getElementById('siteURL').value.trim();
            if (!title || !url) return alert("Title and URL are required");
            if (!url.startsWith('http')) url = 'https://' + url;

            favorites.unshift({
                title,
                url,
                icon: `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}`
            });

            localStorage.setItem('bsFavorites', JSON.stringify(favorites));
            renderFavorites();
            hideAddPopup();
        }

        function toggleSettings() {
            const menu = document.getElementById('settingsMenu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        function uploadBackground() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = e => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = ev => updateImageBackground(ev.target.result);
                    reader.readAsDataURL(file);
                }
            };
            input.click();
            document.getElementById('settingsMenu').style.display = 'none';
        }

        // Recommended Backgrounds
        const recommendedBGs = [
            "https://picsum.photos/id/1015/1920/1080",
            "https://picsum.photos/id/133/1920/1080",
            "https://picsum.photos/id/201/1920/1080",
            "https://picsum.photos/id/251/1920/1080",
            "https://picsum.photos/id/1016/1920/1080",
            "https://picsum.photos/id/870/1920/1080"
        ];

        function showRecommendedBGs() {
            const grid = document.getElementById('bgGrid');
            grid.innerHTML = '';
            recommendedBGs.forEach(src => {
                const div = document.createElement('div');
                div.style.height = '118px';
                div.style.borderRadius = '12px';
                div.style.background = `url('${src}') center/cover`;
                div.style.cursor = 'pointer';
                div.onclick = () => {
                    updateImageBackground(src);
                    hideBGPpopup();
                };
                grid.appendChild(div);
            });
            document.getElementById('bgPopup').style.display = 'block';
            document.getElementById('settingsMenu').style.display = 'none';
        }

        function hideBGPpopup() {
            document.getElementById('bgPopup').style.display = 'none';
        }

        // Search
        document.getElementById('url-bar').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                let q = this.value.trim();
                if (!q) return;
                if (q.includes('.') && !q.includes(' ')) {
                    window.location.href = q.startsWith('http') ? q : 'https://' + q;
                } else {
                    window.location.href = `https://www.google.com/search?q=${encodeURIComponent(q)}`;
                }
            }
        });

        document.addEventListener('click', e => {
            if (!e.target.closest('#settingsMenu') && !e.target.closest('.fa-ellipsis-h')) {
                document.getElementById('settingsMenu').style.display = 'none';
            }
        });

        // Initialize
        window.onload = () => {
            applyBackground();
            loadToolbarPosition();
            renderFavorites();
            setTimeout(() => document.getElementById('url-bar').focus(), 400);
        };
    </script>
</body>
</html>
