<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: white;
      color: #333;
      margin: 0;
      padding: 20px;
      line-height: 1.6;
    }
    .container {
     max-width: 500px;
    margin: 0 auto;
    padding: 20px;
    border-radius: 8px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #007bff;
    }
    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px 0;
    }
    button:hover { background: #0056b3; }

    .welcome {
      text-align: center;
      font-size: 22px;
      margin-bottom: 15px;
    }

    /* Search Bar */
    .search-container {
      margin-bottom: 20px;
    }
    .search-bar {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
      box-sizing: border-box;
    }
    .search-bar:focus {
      outline: none;
      border-color: #007bff;
    }

    /* Donut Chart */
    .chart-container {
      display: flex;
      justify-content: center;
      margin: 25px 0;
      position: relative;
    }
    .donut {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: conic-gradient(#007bff, #28a745, #ffc107, #dc3545, #6f42c1);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .donut-inner {
      width: 130px;
      height: 130px;
      background: white;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .donut-inner span {
      font-size: 24px;
      font-weight: bold;
      color: #333;
    }
    .donut-inner small {
      font-size: 13px;
      color: #666;
    }

    .loan-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
    }
    .edit-input {
      width: 100%;
      padding: 6px;
      border: 1px solid #007bff;
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .info {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      font-size: 15px;
    }
    .label { color: #666; }
    .value { font-weight: 600; }

    .due-date {
      color: #d32f2f;
      font-weight: 600;
      margin-top: 8px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 15px;
      font-size: 14px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .legend-color {
      width: 14px;
      height: 14px;
      border-radius: 3px;
    }

    .no-results {
      text-align: center;
      color: #888;
      padding: 20px;
      font-style: italic;
    }

    .logout-btn {
      background: #dc3545;
    }
    .logout-btn:hover {
      background: #c82333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Finance</h1>

    <!-- Password Screen -->
    <div id="passwordCard" class="card">
      <div class="welcome">Welcome Back</div>
      <input type="password" id="password" placeholder="Enter password" autocomplete="off">
      <button onclick="checkPassword()">Login</button>
    </div>

    <!-- Account Overview -->
    <div id="detailsCard" style="display: none;">
      <div style="text-align: center; margin-bottom: 20px;">
        <h2 id="userName"></h2>
        <p style="color: #666;">Loan Overview</p>
      </div>

      <!-- Search Bar -->
      <div class="search-container">
        <input type="text" id="searchBar" class="search-bar" 
               placeholder="Search by loan title..." 
               onkeyup="filterLoans()">
      </div>

      <!-- Round Graph by Amount -->
      <div class="chart-container">
        <div id="donutChart" class="donut">
          <div class="donut-inner">
            <span id="totalAmount">₹0</span>
            <small>Total Loans</small>
          </div>
        </div>
      </div>

      <div class="legend" id="legend"></div>

      <div id="loansContainer"></div>

      <button onclick="logout()" class="logout-btn">Logout</button>
    </div>
  </div>

  <script>
    let users = [
      {
        password: "rahul123",
        name: "Rahul Sharma",
        loans: [
          { id: 1, title: "Home Renovation", amount: 120000, interest: 18000, takenDate: "2026-02-10", endDate: "2026-08-10", overduePerDay: 550 },
          { id: 2, title: "Bike Purchase", amount: 65000, interest: 9750, takenDate: "2026-03-05", endDate: "2026-09-05", overduePerDay: 320 }
        ]
      },
      {
        password: "priya456",
        name: "Priya Patel",
        loans: [
          { id: 1, title: "Education Loan", amount: 150000, interest: 22500, takenDate: "2026-01-15", endDate: "2026-07-15", overduePerDay: 680 }
        ]
      },
      {
        password: "amit789",
        name: "Amit Kumar",
        loans: [
          { id: 1, title: "Business Loan", amount: 80000, interest: 12000, takenDate: "2026-02-20", endDate: "2026-08-20", overduePerDay: 420 },
          { id: 2, title: "Personal Loan", amount: 35000, interest: 5250, takenDate: "2026-04-01", endDate: "2026-10-01", overduePerDay: 180 }
        ]
      },
      {
        password: "neha111",
        name: "Neha Singh",
        loans: [
          { id: 1, title: "Car Loan", amount: 250000, interest: 37500, takenDate: "2026-03-01", endDate: "2026-09-01", overduePerDay: 950 }
        ]
      },
      {
        password: "suresh222",
        name: "Suresh Reddy",
        loans: [
          { id: 1, title: "Medical Loan", amount: 45000, interest: 6750, takenDate: "2026-04-10", endDate: "2026-07-10", overduePerDay: 250 },
          { id: 2, title: "Wedding Loan", amount: 180000, interest: 27000, takenDate: "2026-02-15", endDate: "2026-08-15", overduePerDay: 720 }
        ]
      }
    ];

    let currentUser = null;
    let allLoans = []; // To keep original list for searching

    function loadData() {
      const saved = localStorage.getItem('financeUsers');
      if (saved) users = JSON.parse(saved);
    }

    function saveData() {
      localStorage.setItem('financeUsers', JSON.stringify(users));
    }

    function calculateDueStatus(endDateStr) {
      const today = new Date();
      const endDate = new Date(endDateStr);
      today.setHours(0,0,0,0);
      endDate.setHours(0,0,0,0);
      const daysDiff = Math.ceil((endDate - today) / 86400000);

      if (daysDiff > 2) return { status: 'On Track', color: '#28a745', days: daysDiff };
      else if (daysDiff > 0) return { status: `Due in ${daysDiff} day${daysDiff > 1 ? 's' : ''}`, color: '#ffc107', days: daysDiff };
      else {
        const overdueDays = Math.abs(daysDiff);
        return { status: `Overdue ${overdueDays} days`, color: '#dc3545', days: overdueDays };
      }
    }

    function renderDonutChart(loansToShow) {
      const container = document.getElementById('donutChart');
      const totalAmountEl = document.getElementById('totalAmount');
      const legendContainer = document.getElementById('legend');

      const total = loansToShow.reduce((sum, loan) => sum + loan.amount, 0);
      totalAmountEl.textContent = `₹ ${total.toLocaleString('en-IN')}`;

      if (loansToShow.length === 0) {
        container.style.background = '#e0e0e0';
        legendContainer.innerHTML = '';
        return;
      }

      const colors = ['#007bff', '#28a745', '#ffc107', '#dc3545', '#6f42c1', '#17a2b8'];
      let gradient = '';
      let start = 0;

      loansToShow.forEach((loan, index) => {
        const percentage = total > 0 ? (loan.amount / total) * 100 : 0;
        const color = colors[index % colors.length];
        gradient += `${color} ${start}% ${start + percentage}%, `;
        start += percentage;
      });

      gradient = gradient.slice(0, -2);
      container.style.background = `conic-gradient(${gradient})`;

      // Legend
      legendContainer.innerHTML = '';
      loansToShow.forEach((loan, index) => {
        const percentage = total > 0 ? Math.round((loan.amount / total) * 100) : 0;
        const color = colors[index % colors.length];

        const div = document.createElement('div');
        div.className = 'legend-item';
        div.innerHTML = `
          <div class="legend-color" style="background: ${color};"></div>
          <span>${loan.title} <strong>(${percentage}%)</strong></span>
        `;
        legendContainer.appendChild(div);
      });
    }

    function renderLoans(filteredLoans) {
      const container = document.getElementById('loansContainer');
      container.innerHTML = '';

      if (filteredLoans.length === 0) {
        container.innerHTML = '<div class="no-results">No loans found matching your search.</div>';
        return;
      }

      filteredLoans.forEach(loan => {
        const dueInfo = calculateDueStatus(loan.endDate);
        const totalDue = loan.amount + loan.interest;

        const html = `
          <div class="loan-card">
            <input type="text" class="edit-input" value="${loan.title}" 
                   onchange="updateTitle(${loan.id}, this.value)">
            
            <div class="info"><span class="label">Principal</span><span class="value">₹ ${loan.amount.toLocaleString('en-IN')}</span></div>
            <div class="info"><span class="label">Interest</span><span class="value">₹ ${loan.interest.toLocaleString('en-IN')}</span></div>
            <div class="info"><span class="label">Taken On</span><span class="value">${loan.takenDate}</span></div>
            
            <div class="due-date">
              Due: ${loan.endDate} 
              <span style="color: ${dueInfo.color};">(${dueInfo.status})</span>
            </div>

            <div class="info" style="margin-top:12px; border-top:1px solid #eee; padding-top:10px;">
              <span class="label">Total Due</span>
              <span style="font-weight:bold; color:#007bff;">₹ ${totalDue.toLocaleString('en-IN')}</span>
            </div>
          </div>
        `;
        container.innerHTML += html;
      });
    }

    function filterLoans() {
      const searchTerm = document.getElementById('searchBar').value.toLowerCase().trim();
      
      if (!currentUser) return;

      let filtered = currentUser.loans;

      if (searchTerm !== '') {
        filtered = currentUser.loans.filter(loan => 
          loan.title.toLowerCase().includes(searchTerm)
        );
      }

      renderDonutChart(filtered);
      renderLoans(filtered);
    }

    function updateTitle(loanId, newTitle) {
      if (!currentUser) return;
      const loan = currentUser.loans.find(l => l.id === loanId);
      if (loan) {
        loan.title = newTitle.trim();
        saveData();
        
        // Refresh everything after edit
        const searchTerm = document.getElementById('searchBar').value.toLowerCase().trim();
        let filtered = currentUser.loans;
        if (searchTerm !== '') {
          filtered = currentUser.loans.filter(l => l.title.toLowerCase().includes(searchTerm));
        }
        
        renderDonutChart(filtered);
        renderLoans(filtered);
      }
    }

    function checkPassword() {
      const pass = document.getElementById('password').value.trim();
      currentUser = users.find(u => u.password === pass);

      if (currentUser) {
        document.getElementById('passwordCard').style.display = 'none';
        document.getElementById('detailsCard').style.display = 'block';
        document.getElementById('userName').textContent = currentUser.name;
        
        // Initial render with all loans
        renderDonutChart(currentUser.loans);
        renderLoans(currentUser.loans);
      } else {
        alert("Incorrect password. Try again.");
      }
    }

    function logout() {
      document.getElementById('passwordCard').style.display = 'block';
      document.getElementById('detailsCard').style.display = 'none';
      document.getElementById('password').value = '';
      document.getElementById('searchBar').value = ''; // Clear search on logout
    }

    window.onload = () => {
      loadData();
    };

    document.getElementById('password').addEventListener('keypress', e => {
      if (e.key === 'Enter') checkPassword();
    });
  </script>
</body>
</html>
