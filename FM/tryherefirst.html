<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BsNote</title>
  <link rel="icon" type="image/x-icon" href="https://i.pinimg.com/originals/22/fb/32/22fb32654195b989444117ae2f1a479b.gif" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

    * {
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
      color: var(--text);
    }

    :root {
      --bg: #000000;
      --text: #e8e8e8;
      --text-dim: #777777;
      --accent: #002aff;
    }

    html, body { 
      height: 100%; 
      background: var(--bg); 
      overflow: hidden; 
    }

    body { 
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .BsTasks {
      position: absolute;
      right: 0;
      top: 0;
      background: #ffffff2e;
      padding: 6px 10px;
      z-index: 10000000;
      border-radius: 0 0 0 15px;
      font-size: 14px;
    }

    header {
     font-size: 16px;
    font-weight: 600;
    color: #002aff;
    padding: 10px;
    width: 100%;
    text-align: justify;
    }

    .folders-container {
      background: var(--bg);
      flex-shrink: 0;
      max-width: 650px;
      width: 100%;
    }

.folders {
    display: flex;
    align-items: center;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
    justify-content: flex-start;
    width: 100%;
    }

    .folders::-webkit-scrollbar { display: none; }

    .add-folder-fixed {
flex-shrink: 0;
    padding: 10px 10px 10px 30px;
    background: linear-gradient(269deg, #002aff, #000000);
    color: #ffffff;
    border-radius: 0 100px 100px 0;
    font-size: 15px;
    cursor: pointer;
    white-space: nowrap;
    border: none;
    backdrop-filter: blur(11px);
    display: flex;
    justify-content: center;
    align-items: center;
    position: sticky;
    left: -30px;
    }

    .folder-btn {
      flex-shrink: 0;
    padding: 7px 9px;
    border-radius: 999px;
    background: #1a1a1a;
    border: none;
    color: var(--text-dim);
    font-size: 15px;
    cursor: pointer;
    transition: all 0.18s;
    text-overflow: ellipsis;
    max-width: 400px;
    overflow: hidden;
    white-space: nowrap;
    }

    .folder-btn.active,
    .folder-btn:hover {
      background: var(--accent);
      color: white;
    }

    .notes-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px 5px;
      scrollbar-width: thin;
      scrollbar-color: #202020 transparent;
      width: 100%;
      max-width: 650px;
    }

    .note {
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 20px;
      padding: 14px 20px 14px 30px;
      border-radius: 25px;
      background: rgb(255 255 255 / 8%);
      position: relative;
      transition: background 0.2s;
      word-break: break-word;
    }

    .note:hover { background: rgba(255, 255, 255, 0.12); }

    .note .star {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 25px;
      cursor: pointer;
      color: #ffffff91;
      background: #ffffff26;
      width: 35px;
      height: 35px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      backdrop-filter: blur(5px);
    }

    .note.important .star {
      color: white;
      background: #002aff;
    }

    .note-text {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .note img {
      max-width: 100%;
      border-radius: 15px;
      margin: 8px 0;
      display: block;
      cursor: pointer;
      opacity: 0.9;
    }

    .empty-state {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-size: 17px;
      text-align: center;
      padding: 0 40px;
    }

    .input-area {
padding: 4px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: black;
    width: 100%;
    max-width: 650px;
    flex-shrink: 0;
    z-index: 20000000;
    flex-direction: column;
    }

    #noteInput {
          flex: 1;
    background: rgb(26 26 26);
    border-radius: 9999px;
    font-size: 18px;
    outline: none;
    padding: 10px 15px;
    color: #ffffffc9;
    resize: none;
    min-height: 45px;
    max-height: 180px;
    overflow-y: auto;
    border: 0.5px solid rgba(255, 255, 255, 0.1);
    line-height: 1.5;
    }

    #noteInput::placeholder { color: #555; }

    .btn {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .attach-label {
      font-size: 24px;
      color: var(--text-dim);
      cursor: pointer;
      padding: 10px;
    }

    /* Context Menus */
    #noteContextMenu, #folderContextMenu {
      position: fixed;
      background: rgb(46 46 46);
      border-radius: 25px;
      padding: 6px 8px;
      min-width: 130px;
      z-index: 100;
      list-style: none;
    }

    #noteContextMenu li, #folderContextMenu li {
      padding: 8px 14px;
      font-size: 15px;
      cursor: pointer;
      border-radius: 999px;
    }

    #noteContextMenu li:hover, #folderContextMenu li:hover {
      background: rgb(255 255 255 / 22%);
    }

    #popup {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20000000;
      background: #000000ad;
    }

    .popup-box {
      background: #1c1c1e;
      border-radius: 30px;
      padding: 20px;
      width: 95%;
      max-width: 320px;
      text-align: center;
    }

    .popup-image {
      max-width: 100%;
      max-height: 65vh;
      border-radius: 16px;
      margin: 10px 0;
    }

    .popup-buttons {
      display: flex;
      gap: 12px;
      margin-top: 15px;
    }

    .popup-btn {
      flex: 1;
      padding: 12px;
      border-radius: 14px;
      border: none;
      font-size: 15px;
      cursor: pointer;
    }
.inputsection {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    gap: 5px;
    padding: 0px 5px 10px 5px;
}
    .cancel { background: #323232; color: #ffffffb5; }
    .danger  { background: #ff0d00; color: white; }
    .confirm { background: var(--accent); color: white; }
  </style>
</head>
<body>
<div class="BsTasks">
  <a href="https://blackswan19.github.io/Educate/bstasks"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="m423.23-394.15-92.92-92.93q-8.31-8.3-20.89-8.5-12.57-.19-21.27 8.5-8.69 8.7-8.69 21.08 0 12.38 8.69 21.08l109.77 109.77q10.85 10.84 25.31 10.84 14.46 0 25.31-10.84l222.54-222.54q8.3-8.31 8.5-20.89.19-12.57-8.5-21.27-8.7-8.69-21.08-8.69-12.38 0-21.08 8.69l-205.69 205.7ZM480.07-100q-78.84 0-148.21-29.92t-120.68-81.21q-51.31-51.29-81.25-120.63Q100-401.1 100-479.93q0-78.84 29.92-148.21t81.21-120.68q51.29-51.31 120.63-81.25Q401.1-860 479.93-860q78.84 0 148.21 29.92t120.68 81.21q51.31 51.29 81.25 120.63Q860-558.9 860-480.07q0 78.84-29.92 148.21t-81.21 120.68q-51.29 51.31-120.63 81.25Q558.9-100 480.07-100Zm-.07-60q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/></svg></a>
</div>

  <header id="header">BsNote</header>

  <div class="folders-container">
  </div>

  <div class="notes-container" id="notes">
    <div class="empty-state">Select a folder to view or add notes</div>
  </div>

  <div class="input-area" id="inputArea">
    <div class="folders" id="folders"></div>
    <div class="inputsection">
        <label class="btn" for="imageInput">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M706.92-334.23q0 97.44-67.81 165.83-67.8 68.4-165.07 68.4t-165.27-68.4q-68-68.39-68-165.83v-359.62q0-69.23 48.08-117.69Q336.92-860 406.15-860q69.23 0 117.31 48.46t48.08 117.69v340.39q0 40.61-28.29 69.34-28.3 28.73-68.96 28.73-40.67 0-69.4-28.53-28.73-28.53-28.73-69.54v-321.15q0-12.75 8.62-21.38 8.63-8.62 21.39-8.62 12.75 0 21.37 8.62 8.61 8.63 8.61 21.38v321.15q0 16.08 10.81 27.08t26.89 11q16.07 0 26.88-11 10.81-11 10.81-27.08v-340.77q-.62-44.31-30.85-75.04Q450.46-800 406.19-800q-44.28 0-74.85 30.92-30.57 30.93-30.57 75.23v359.62q-.62 72.54 50.15 123.38Q401.69-160 474.18-160q71.46 0 121.49-50.85 50.02-50.84 51.25-123.38v-340.38q0-12.75 8.63-21.38 8.63-8.62 21.39-8.62 12.75 0 21.37 8.62 8.61 8.63 8.61 21.38v340.38Z"/></svg>
        </label>
        <input type="file" id="imageInput" accept="image/*" style="display:none" />
        <textarea id="noteInput" placeholder="Write note..." rows="1"></textarea>
        <button class="btn" id="sendBtn">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="m748.92-446.46-558.3 235.38q-18.08 7.23-34.35-3.11Q140-224.54 140-244.23v-471.54q0-19.69 16.27-30.04 16.27-10.34 34.35-3.11l558.3 235.38q22.31 9.85 22.31 33.54 0 23.69-22.31 33.54ZM200-280l474-200-474-200v147.69L416.92-480 200-427.69V-280Zm0 0v-400 400Z"/></svg>
        </button>
    </div>
  </div>

  <ul id="noteContextMenu" style="display:none">
    <li id="editNote">Edit</li>
    <li id="copyNote">Copy</li>
    <li id="deleteNote">Delete</li>
  </ul>

  <ul id="folderContextMenu" style="display:none">
    <li id="deleteFolder">Delete section</li>
  </ul>

  <div id="popup">
    <div class="popup-box">
      <p class="popup-msg" id="popupMsg"></p>
      <div id="popupExtra"></div>
      <div class="popup-buttons" id="popupButtons"></div>
    </div>
  </div>

<script>
const folders = JSON.parse(localStorage.getItem('bsnote_minimal_v2')) || {};
let current = null;
let ctxNote = null;
let ctxFolder = null;

const foldersEl = document.getElementById('folders');
const notesEl = document.getElementById('notes');
const headerEl = document.getElementById('header');
const input = document.getElementById('noteInput');
const sendBtn = document.getElementById('sendBtn');
const popup = document.getElementById('popup');
const popupMsg = document.getElementById('popupMsg');
const popupExtra = document.getElementById('popupExtra');
const popupButtons = document.getElementById('popupButtons');

function save() {
  localStorage.setItem('bsnote_minimal_v2', JSON.stringify(folders));
}

function closePopup() {
  popup.style.display = 'none';
  popupExtra.innerHTML = '';
  popupButtons.innerHTML = '';
}

function showPopup(message = '', extraHTML = '', buttons = []) {
  popupMsg.textContent = message;
  popupExtra.innerHTML = extraHTML;
  popupButtons.innerHTML = '';
  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.className = `popup-btn ${b.class || 'confirm'}`;
    btn.textContent = b.text;
    btn.onclick = () => { b.action(); closePopup(); };
    popupButtons.appendChild(btn);
  });
  popup.style.display = 'flex';
}

function showImagePopup(src) {
  const filename = 'bsnote-image-' + Date.now() + '.png';
  const extra = `<img src="${src}" class="popup-image" alt="Note image">`;
  const buttons = [
    { text: 'Download', class: 'confirm', action: () => {
      const link = document.createElement('a');
      link.href = src;
      link.download = filename;
      link.click();
    }},
    { text: 'Close', class: 'cancel', action: closePopup }
  ];
  showPopup('', extra, buttons);
}

function getImportantNotes() {
  const important = [];
  Object.entries(folders).forEach(([folderName, notes]) => {
    notes.forEach((note, idx) => {
      if (note.important) important.push({ folder: folderName, index: idx, note });
    });
  });
  return important;
}

function renderFolders() {
  foldersEl.innerHTML = '';

  const addBtn = document.createElement('button');
  addBtn.className = 'add-folder-fixed';
  addBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M458.62-148.63Q450-157.25 450-170v-280H170q-12.75 0-21.37-8.63-8.63-8.63-8.63-21.38 0-12.76 8.63-21.37Q157.25-510 170-510h280v-280q0-12.75 8.63-21.37 8.63-8.63 21.38-8.63 12.76 0 21.37 8.63Q510-802.75 510-790v280h280q12.75 0 21.37 8.63 8.63 8.63 8.63 21.38 0 12.76-8.63 21.37Q802.75-450 790-450H510v280q0 12.75-8.63 21.37-8.63 8.63-21.38 8.63-12.76 0-21.37-8.63Z"/></svg>';
  addBtn.onclick = addFolder;
  foldersEl.appendChild(addBtn);

  const impBtn = document.createElement('button');
  impBtn.className = `folder-btn ${current === 'important' ? 'active' : ''}`;
  impBtn.innerHTML = '<i class="fas fa-star"></i> Important';
  impBtn.onclick = () => select('important');
  foldersEl.appendChild(impBtn);

  Object.keys(folders).sort().forEach(name => {
    const b = document.createElement('button');
    b.className = `folder-btn ${name === current ? 'active' : ''}`;
    b.textContent = name;
    b.dataset.folder = name;

    b.onclick = () => select(name);

    let pressTimer;
    b.onpointerdown = () => {
      pressTimer = setTimeout(() => {
        ctxFolder = name;
        showFolderContext({ pageX: window.innerWidth/2, pageY: window.innerHeight/2 });
      }, 600);
    };
    b.onpointerup = b.onpointercancel = b.onpointerleave = () => clearTimeout(pressTimer);

    b.oncontextmenu = e => {
      e.preventDefault();
      ctxFolder = name;
      showFolderContext(e);
    };

    foldersEl.appendChild(b);
  });
}

function select(name) {
  current = name;
  headerEl.textContent = name === 'important' ? 'Important Notes' : (name || 'BsNote');

  const canWrite = name && name !== 'important';
  input.disabled = sendBtn.disabled = !canWrite;

  renderFolders();

  if (name === 'important') {
    renderImportantNotes();
  } else if (name && folders[name]) {
    renderNotes(name);
  } else {
    notesEl.innerHTML = '<div class="empty-state">Welcome to BsNote</div>';
  }
}

function renderNotes(folderName) {
  notesEl.innerHTML = '';
  const notes = folders[folderName] || [];

  if (notes.length === 0) {
    notesEl.innerHTML = '<div class="empty-state">This section is empty<br>Start typing to add notes</div>';
    return;
  }

  notes.forEach((note, i) => createNoteElement(note, i, folderName));
}

function renderImportantNotes() {
  notesEl.innerHTML = '';
  const important = getImportantNotes();

  if (important.length === 0) {
    notesEl.innerHTML = '<div class="empty-state">No important notes<br>Click ★ to pin notes</div>';
    return;
  }

  important.forEach(({folder, index, note}) => {
    const el = createNoteElement(note, index, folder, true);
    const badge = document.createElement('div');
    badge.style.cssText = 'font-size:11px; color:#888; margin-top:6px; opacity:0.7;';
    badge.textContent = `from ${folder}`;
    el.appendChild(badge);
  });
}

function createNoteElement(note, index, folderName) {
  const div = document.createElement('div');
  div.className = `note ${note.important ? 'important' : ''}`;
  div.dataset.folder = folderName;
  div.dataset.index = index;

  const star = document.createElement('span');
  star.className = 'star';
  star.innerHTML = '<i class="fas fa-star"></i>';
  star.onclick = e => {
    e.stopPropagation();
    toggleImportant(folderName, index);
  };
  div.appendChild(star);

  if (note.type === 'image') {
    const img = document.createElement('img');
    img.src = note.content;
    img.onclick = () => showImagePopup(note.content);
    div.appendChild(img);
  } else {
    const textDiv = document.createElement('div');
    textDiv.className = 'note-text';
    textDiv.textContent = note.content;
    div.appendChild(textDiv);
  }

  let pressTimer;
  div.onpointerdown = () => {
    pressTimer = setTimeout(() => {
      ctxNote = { folder: folderName, index };
      showNoteContext({ pageX: window.innerWidth/2, pageY: window.innerHeight/2 });
    }, 500);
  };
  div.onpointerup = div.onpointercancel = div.onpointerleave = () => clearTimeout(pressTimer);

  div.oncontextmenu = e => {
    e.preventDefault();
    ctxNote = { folder: folderName, index };
    showNoteContext(e);
  };

  notesEl.appendChild(div);
  return div;
}

function toggleImportant(folderName, index) {
  if (!folders[folderName]?.[index]) return;
  folders[folderName][index].important = !folders[folderName][index].important;
  save();
  if (current === 'important') renderImportantNotes();
  else if (current === folderName) renderNotes(folderName);
}

function addFolder() {
  showPopup("Create Section", `
    <input type="text" id="folderNameInput" placeholder="Enter folder name..." style="width:100%;padding:12px;background:#fff;border:none;border-radius:10px;color:black;font-size:16px;text-align:center;">
  `, [
    { text: 'Cancel', class: 'cancel', action: closePopup },
    { text: 'Create', class: 'confirm', action: () => {
      const name = document.getElementById('folderNameInput').value.trim();
      if (!name) return;
      if (folders[name] || name.toLowerCase() === 'important') {
        alert("Folder name already exists or is not allowed.");
        return;
      }
      folders[name] = [];
      save();
      renderFolders();
      select(name);
    }}
  ]);
}

function deleteFolder(folderName) {
  showPopup(`Delete folder "${folderName}"?`, 
    folders[folderName]?.length > 0 ? '<p style="color:#ff9800;">This folder contains notes!<br>They will be permanently deleted.</p>' : '',
    [
      { text: 'Cancel', class: 'cancel', action: closePopup },
      { text: 'Delete', class: 'danger', action: () => {
        delete folders[folderName];
        save();
        if (current === folderName) select(null);
        else renderFolders();
      }}
    ]
  );
}

function addNote() {
  const txt = input.value.trim();
  if (!txt || !current || current === 'important') return;
  folders[current].push({ type: 'text', content: txt, important: false });
  input.value = '';
  input.style.height = 'auto';
  save();
  renderNotes(current);
}

function attach(e) {
  const file = e.target.files[0];
  if (!file || !current || current === 'important') return;
  const r = new FileReader();
  r.onload = ev => {
    folders[current].push({ type: 'image', content: ev.target.result, important: false });
    save();
    renderNotes(current);
  };
  r.readAsDataURL(file);
}

function showNoteContext(e) {
  const m = document.getElementById('noteContextMenu');
  m.style.left = Math.min(e.pageX, window.innerWidth - 160) + 'px';
  m.style.top  = Math.min(e.pageY, window.innerHeight - 140) + 'px';
  m.style.display = 'block';
}

function showFolderContext(e) {
  const m = document.getElementById('folderContextMenu');
  m.style.left = Math.min(e.pageX, window.innerWidth - 180) + 'px';
  m.style.top  = Math.min(e.pageY, window.innerHeight - 100) + 'px';
  m.style.display = 'block';
}

function hideAllContext() {
  document.getElementById('noteContextMenu').style.display = 'none';
  document.getElementById('folderContextMenu').style.display = 'none';
}

// Context Menu Actions
document.getElementById('editNote').onclick = () => {
  hideAllContext();
  if (!ctxNote) return;
  const {folder, index} = ctxNote;
  const note = folders[folder]?.[index];
  if (!note || note.type === 'image') return alert("Can't edit images");

  showPopup("Edit note", `
    <textarea id="editInput" style="width:100%;min-height:140px;padding:14px;background:#1a1a1a;border:1px solid #333;border-radius:10px;font-size:17px;color:white;resize:vertical;">${note.content}</textarea>
  `, [
    { text: 'Cancel', class: 'cancel', action: closePopup },
    { text: 'Save', class: 'confirm', action: () => {
      const newText = document.getElementById('editInput').value.trim();
      if (newText) {
        note.content = newText;
        save();
        if (current === 'important') renderImportantNotes();
        else if (current === folder) renderNotes(folder);
      }
    }}
  ]);
};

document.getElementById('deleteNote').onclick = () => {
  hideAllContext();
  if (!ctxNote) return;
  showPopup("Delete this note permanently?", '', [
    { text: 'Cancel', class: 'cancel', action: closePopup },
    { text: 'Delete', class: 'danger', action: () => {
      const {folder, index} = ctxNote;
      if (folders[folder]) {
        folders[folder].splice(index, 1);
        save();
        if (current === 'important') renderImportantNotes();
        else if (current === folder) renderNotes(folder);
      }
    }}
  ]);
};

document.getElementById('copyNote').onclick = () => {
  hideAllContext();
  if (!ctxNote) return;
  const note = folders[ctxNote.folder]?.[ctxNote.index];
  if (!note || note.type === 'image') return alert("Can't copy image");
  navigator.clipboard.writeText(note.content).then(() => alert("Copied!")).catch(() => alert("Copy failed"));
};

document.getElementById('deleteFolder').onclick = () => {
  hideAllContext();
  if (ctxFolder) deleteFolder(ctxFolder);
};

// Event Listeners
sendBtn.onclick = addNote;
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    addNote();
  }
});

document.getElementById('imageInput').onchange = attach;

document.body.onclick = e => {
  if (!e.target.closest('#noteContextMenu') && 
      !e.target.closest('#folderContextMenu') && 
      !e.target.closest('.popup-box')) {
    hideAllContext();
  }
};

popup.onclick = e => { if (e.target === popup) closePopup(); };

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 180) + 'px';
});

renderFolders();
select(null);
</script>
</body>
</html>
