}

// document.addEventListener('contextmenu', e => e.preventDefault());
function getColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) {
    hash = name.charCodeAt(i) + ((hash << 5) - hash);
  }
  const hue = Math.abs(hash) % 360;
  // return `hsl(${hue}, 75%, 58%)`;
}

function getInitial(name) {
  return name.trim()[0]?.toUpperCase() || "?";
}

function renderAll() {
  const container = document.getElementById("sectionsContainer");
  container.innerHTML = "";

  siteGroups.forEach(group => {
    const section = document.createElement("div");
    section.className = "section";

    const h2 = document.createElement("h2");
    h2.textContent = group.heading;
    section.appendChild(h2);

    const list = document.createElement("div");
    list.className = "site-list";

    group.sites.forEach(site => {
      const a = document.createElement("a");
      a.href = site.url;
      a.target = "_parent";
      a.className = "site-item";

      const bg = getColor(site.name);
      const initial = getInitial(site.name);

      a.innerHTML = `
        <div class="letter-icon" style="background: ${bg};">${initial}</div>
        <div class="site-info">
          <h3>${site.name}</h3>
          <p>${site.desc}</p>
        </div>
      `;

      list.appendChild(a);
    });

    section.appendChild(list);
    container.appendChild(section);
  });
}

function renderFiltered(query = "") {
  const q = query.toLowerCase().trim();
  const container = document.getElementById("sectionsContainer");
  const noResults = document.getElementById("noResults");

  container.innerHTML = "";

  if (!q) {
    renderAll();
    noResults.style.display = "none";
    return;
  }

  let found = false;

  siteGroups.forEach(group => {
    const matches = group.sites.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.desc.toLowerCase().includes(q) ||
      s.url.toLowerCase().includes(q)
    );

    if (!matches.length) return;

    found = true;

    const section = document.createElement("div");
    section.className = "section";

    const h2 = document.createElement("h2");
    h2.textContent = group.heading;
    section.appendChild(h2);

    const list = document.createElement("div");
    list.className = "site-list";

    matches.forEach(site => {
      const a = document.createElement("a");
      a.href = site.url;
      a.target = "_parent";
      a.className = "site-item";

      const bg = getColor(site.name);
      const initial = getInitial(site.name);

      a.innerHTML = `
        <div class="letter-icon" style="background: ${bg};">${initial}</div>
        <div class="site-info">
          <h3>${site.name}</h3>
          <p>${site.desc}</p>
        </div>
      `;

      list.appendChild(a);
    });

    section.appendChild(list);
    container.appendChild(section);
  });

  noResults.style.display = found ? "none" : "block";
}
function goBack() {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        alert("✅ Back button clicked!\n\n(In a real app this would take you to previous screen or home.)");
      }
    }
renderAll();

document.getElementById("searchInput").addEventListener("input", e => {
  renderFiltered(e.target.value);
});
