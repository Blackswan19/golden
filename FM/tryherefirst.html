<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Android Home</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

    :root {
      --bg: #0a0a0a;
      --surface: #1e1e1e;
      --primary: #8ab4f8;
      --text: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', system-ui, sans-serif;
      background: linear-gradient(180deg, #0f0f0f, #1a1a2e, #0a0a0a);
      height: 100vh;
      overflow: hidden;
      color: var(--text);
      user-select: none;
    }

    /* Phone Frame */
    .phone-frame {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      height: 100vh;
      max-height: 812px;
      border-radius: 52px;
      overflow: hidden;
      position: relative;
    }

    /* Status Bar */
    .status-bar {
      height: 32px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 500;
      color: white;
    }

    /* Search Bar */
    .search-bar {
      margin: 12px 20px 20px;
    padding: 10px;
    border-radius: 9999px;
    background: rgba(255, 255, 255, 0.08);
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    color: var(--text-secondary);
    }

    .search-bar input {
      background: transparent;
      border: none;
      outline: none;
      color: white;
      flex: 1;
      font-size: 16px;
    }

    /* App Grid */
    .app-grid {
     display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 28px 16px;
    padding: 0 24px;
    margin-bottom: 40px;
    }

    .app-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .app-item:active {
      transform: scale(0.88);
    }

    .app-icon {
      width: 52px;
    height: 52px;
    border-radius: 122px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 23px;
    transition: all 0.3s ease;
    }

    .app-label {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0.9;
      text-align: center;
    }

    /* Quick Notes */
    .notes-section {
      padding: 0 24px;
    }

    .notes-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .note-card {
      background: #2a2a2a;
      color: white;
      border-radius: 24px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    }
.search-bar img{
  width: 30px;
    height: 30px;
    border-radius: 100px;
}
    /* Bottom Navigation (Android Style) */
    .bottom-nav {
         position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 28px;
    }

    .nav-icon {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: white;
      transition: transform 0.3s ease;
    }

    .nav-icon:active {
      transform: scale(0.85);
    }

    /* Lock Screen */
    #lock-screen {
      position: absolute;
      inset: 0;
      z-index: 100;
      background: linear-gradient(180deg, #0a0a0a, #1a1a2e);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #lock-screen.unlocking {
      transform: scale(0.92) translateY(-40px);
      opacity: 0;
    }

    .lock-time {
      font-size: 92px;
      font-weight: 300;
      letter-spacing: -6px;
      margin-bottom: 8px;
    }

    .lock-date {
      font-size: 22px;
      opacity: 0.85;
      font-weight: 400;
    }

    .fingerprint-hint {
      margin-top: 80px;
      font-size: 48px;
      opacity: 0.6;
    }

    /* Modal */
    #app-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    #app-modal.show {
      display: flex;
    }

    .modal-content {
      background: #1e1e1e;
      width: 320px;
      border-radius: 28px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
    }
  </style>
</head>
<body>

  <!-- Lock Screen -->
  <div id="lock-screen">
    <div class="text-center">
      <div id="lock-time" class="lock-time"></div>
      <div id="lock-date" class="lock-date"></div>
    </div>
    
    <div class="fingerprint-hint">🔒</div>
    
    <div style="position: absolute; bottom: 100px; font-size: 14px; opacity: 0.6;">
      Swipe up to unlock
    </div>
  </div>

  <!-- Home Screen -->
  <div id="home-screen" class="phone-frame hidden">

    <!-- Status Bar -->
    <div class="status-bar">
      <div id="status-time"></div>
      <div style="display: flex; gap: 12px;">
        <span>4G</span>
        <span>92%</span>
      </div>
    </div>

    <!-- Search Bar -->
    <div class="search-bar">
      <span style="opacity: 0.7;"><img src="mfi.gif" alt=""></span>
      <span> Myootive Services from BS&MFI Services</span>
    </div>

    <!-- App Grid -->
    <div class="app-grid">
      <div onclick="openApp(1)" class="app-item">
        <div class="app-icon" style="background: linear-gradient(135deg, #4285f4, #34a853);">💬</div>
        <div class="app-label">Messages</div>
      </div>
      <div onclick="openApp(2)" class="app-item">
        <div class="app-icon" style="background: linear-gradient(135deg, #ea4335, #fbbc05);">📸</div>
        <div class="app-label">Camera</div>
      </div>
      <div onclick="openApp(3)" class="app-item">
        <div class="app-icon" style="background: linear-gradient(135deg, #34a853, #4285f4);">🎵</div>
        <div class="app-label">Music</div>
      </div>
      <div onclick="openApp(4)" class="app-item">
        <div class="app-icon" style="background: linear-gradient(135deg, #fbbc05, #ea4335);">🗺️</div>
        <div class="app-label">Maps</div>
      </div>

      <div onclick="openApp(5)" class="app-item">
        <div class="app-icon" style="background: linear-gradient(135deg, #4285f4, #9c27b0);">🌤️</div>
        <div class="app-label">Weather</div>
      </div>
      <div onclick="openApp(6)" class="app-item">
        <div class="app-icon" style="background: linear-gradient(135deg, #ff9800, #f44336);">📅</div>
        <div class="app-label">Calendar</div>
      </div>
      <div onclick="openApp(7)" class="app-item">
        <div class="app-icon" style="background: linear-gradient(135deg, #34a853, #00bcd4);">💰</div>
        <div class="app-label">Wallet</div>
      </div>
      <div onclick="openApp(8)" class="app-item">
        <div class="app-icon" style="background: linear-gradient(135deg, #9c27b0, #e91e63);">🛒</div>
        <div class="app-label">Play Store</div>
      </div>
    </div>

    <!-- Quick Notes -->
    <div class="notes-section">
      <div class="notes-header">
        <button onclick="addNote()" style="background: #333; padding: 8px 18px; border-radius: 9999px; font-size: 14px; border: none; color: white; cursor: pointer;">
         Add Note
        </button>
      </div>
      <div id="notes-container"></div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
      <div onclick="openApp(9)" class="nav-icon">☎️</div>
      <div onclick="openApp(10)" class="nav-icon">💬</div>
      <div onclick="openApp(11)" class="nav-icon">🌐</div>
      <div onclick="openApp(12)" class="nav-icon">📷</div>
    </div>
  </div>

  <!-- App Modal -->
  <div id="app-modal">
    <div class="modal-content">
      <div id="modal-icon" style="font-size: 72px; margin-bottom: 20px;"></div>
      <h2 id="modal-title" style="font-size: 24px; margin-bottom: 12px; font-weight: 500;"></h2>
      <p style="opacity: 0.7; margin-bottom: 28px;">This is a demo Android app</p>
      <button onclick="closeModal()" 
              style="width: 100%; padding: 16px; background: #333; border: none; border-radius: 9999px; color: white; font-size: 17px; cursor: pointer;">
        Close
      </button>
    </div>
  </div>

  <script>
    // Same JavaScript as before (only minor changes)
    function updateClock() {
      const now = new Date();
      
      document.getElementById('status-time').textContent = 
        now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }).replace(' AM', 'am').replace(' PM', 'pm');
      
      document.getElementById('lock-time').textContent = 
        now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: false });
      
      document.getElementById('lock-date').textContent = 
        now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }

    const correctPasswords = ["6275", "9919", "123456789"];
    let notes = JSON.parse(localStorage.getItem('quickNotes')) || [];

    const lockScreen = document.getElementById('lock-screen');
    const homeScreen = document.getElementById('home-screen');

    // Simple tap to unlock (since no swipe detection in demo)
    lockScreen.addEventListener('click', () => {
      lockScreen.classList.add('unlocking');
      setTimeout(() => {
        lockScreen.style.display = 'none';
        homeScreen.classList.remove('hidden');
        renderNotes();
      }, 600);
    });

    function renderNotes() {
      const container = document.getElementById('notes-container');
      container.innerHTML = '';
      
      notes.forEach((note, index) => {
        const div = document.createElement('div');
        div.className = 'note-card';
        div.innerHTML = `
          <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            <p style="font-size: 15.5px; line-height: 1.45;">${note.text}</p>
            <button onclick="deleteNote(${index})" style="color: #ff5252; font-size: 24px; background: none; border: none; cursor: pointer;">×</button>
          </div>
          <p style="font-size: 12.5px; opacity: 0.6; margin-top: 12px;">
            ${new Date(note.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
          </p>
        `;
        container.appendChild(div);
      });
    }

    function addNote() {
      const text = prompt("Write your quick note:");
      if (!text || !text.trim()) return;
      
      notes.unshift({ text: text.trim(), time: Date.now() });
      if (notes.length > 10) notes.pop();
      localStorage.setItem('quickNotes', JSON.stringify(notes));
      renderNotes();
    }

    function deleteNote(index) {
      notes.splice(index, 1);
      localStorage.setItem('quickNotes', JSON.stringify(notes));
      renderNotes();
    }

    function openApp(num) {
      const modal = document.getElementById('app-modal');
      const iconEl = document.getElementById('modal-icon');
      const titleEl = document.getElementById('modal-title');

      const apps = {
        1: {icon: '💬', title: 'Messages'},
        2: {icon: '📸', title: 'Camera'},
        3: {icon: '🎵', title: 'Music'},
        4: {icon: '🗺️', title: 'Maps'},
        5: {icon: '🌤️', title: 'Weather'},
        6: {icon: '📅', title: 'Calendar'},
        7: {icon: '💰', title: 'Wallet'},
        8: {icon: '🛒', title: 'Play Store'},
        9: {icon: '☎️', title: 'Phone'},
        10: {icon: '💬', title: 'Messages'},
        11: {icon: '🌐', title: 'Chrome'},
        12: {icon: '📷', title: 'Photos'}
      };

      const app = apps[num] || {icon: '⭐', title: 'App'};
      iconEl.textContent = app.icon;
      titleEl.textContent = app.title;

      modal.style.display = 'flex';
      setTimeout(() => modal.classList.add('show'), 10);
    }

    function closeModal() {
      const modal = document.getElementById('app-modal');
      modal.classList.remove('show');
      setTimeout(() => modal.style.display = 'none', 300);
    }

    // Initialize
    window.onload = () => {
      updateClock();
      setInterval(updateClock, 1000);

      if (notes.length === 0) {
        notes = [{ 
          text: "Welcome to your Android-style home screen!", 
          time: Date.now() 
        }];
      }
    };
  </script>
</body>
</html>
