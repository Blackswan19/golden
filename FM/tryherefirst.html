<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iOS Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&display=swap');
    
    body {
      font-family: 'SF Pro Display', system-ui, sans-serif;
      background: linear-gradient(180deg, #1e3a8a, #312e81, #1e1b4b);
      height: 100vh;
      overflow: hidden;
      color: white;
    }

    .glass {
      background: rgba(255, 255, 255, 0.13);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(255, 255, 255, 0.22);
    }

    /* App Icons with Spring Press */
    .app-icon {
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }
    .app-icon:active {
      transform: scale(0.78) !important;
    }

    /* Dock Bounce */
    .dock-icon {
      transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .dock:hover .dock-icon {
      transform: scale(1.32);
    }

    /* Notes Fade-in */
    .note-card {
      background: rgba(255, 255, 255, 0.96);
      color: #1f2937;
      animation: notePop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    }
    @keyframes notePop {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Lock Screen Unlock Animation */
    #lock-screen {
      transition: all 0.75s cubic-bezier(0.32, 0.72, 0, 1);
    }
    #lock-screen.unlocking {
      transform: scale(0.92) translateY(-40px);
      opacity: 0;
    }

    /* Modal Animation */
    #app-modal .modal-content {
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform: scale(0.8);
      opacity: 0;
    }
    #app-modal.show .modal-content {
      transform: scale(1);
      opacity: 1;
    }

    .passcode-input {
      letter-spacing: 18px;
      font-size: 34px;
      font-weight: 500;
      background: transparent;
      border: none;
      color: white;
      text-align: center;
      outline: none;
      transition: all 0.2s ease;
    }
    .passcode-input:focus {
      text-shadow: 0 0 20px rgba(255,255,255,0.6);
    }
  </style>
</head>
<body class="flex items-center justify-center bg-black">

  <!-- Lock Screen -->
  <div id="lock-screen" class="w-full max-w-[420px] mx-auto h-screen flex flex-col items-center justify-center absolute inset-0 z-50 bg-gradient-to-b from-zinc-950 via-blue-950 to-black">
    <div class="text-center mb-20">
      <div id="lock-time" class="text-8xl font-light tracking-tighter mb-2"></div>
      <div id="lock-date" class="text-2xl opacity-75 font-light"></div>
    </div>

    <div class="glass rounded-3xl px-12 py-10 w-80 text-center shadow-2xl">
      <p class="text-sm mb-6 text-white/80">Enter Passcode</p>
      <input id="passcode" type="password" maxlength="9" inputmode="numeric"
             class="passcode-input mx-auto block w-64 py-4 rounded-2xl" placeholder="•••••••••">
      <div id="pass-error" class="text-red-400 text-sm mt-6 hidden">Incorrect passcode</div>
    </div>

    <div class="absolute bottom-12 text-xs opacity-60 flex items-center gap-1.5">
      <i class="fa-solid fa-chevron-up animate-bounce"></i>
      <span class="tracking-widest">slide up to unlock</span>
    </div>
  </div>

  <!-- Home Screen -->
  <div id="home-screen" class="w-full max-w-[420px] mx-auto h-screen bg-black/30 rounded-3xl shadow-2xl overflow-hidden flex flex-col hidden" style="max-height: 812px; box-shadow: 0 0 100px rgba(0,0,0,0.7);">
    
    <!-- Status Bar -->
    <div class="h-11 bg-transparent flex items-end justify-between px-6 text-sm font-medium">
      <div id="status-time" class="font-semibold"></div>
      <div id="status-date" class="text-xs opacity-75"></div>
    </div>

    <!-- Search Bar -->
    <div class="px-5 pt-3 pb-5">
      <div class="glass rounded-3xl px-5 py-3 flex items-center gap-3">
        <i class="fa-solid fa-magnifying-glass text-white/60"></i>
        <input id="search" type="text" placeholder="Search" 
               class="bg-transparent outline-none flex-1 text-white placeholder-white/60 text-[17px]">
      </div>
    </div>

    <!-- Content -->
    <div class="flex-1 px-5 overflow-auto pb-4">
      <div class="grid grid-cols-4 gap-x-6 gap-y-8 mb-12">
        <!-- 8 Apps with spring press -->
        <div onclick="openApp(1)" class="flex flex-col items-center cursor-pointer">
          <div class="app-icon w-16 h-16 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-3xl flex items-center justify-center text-4xl">📱</div>
          <p class="text-xs mt-2 opacity-90">Messages</p>
        </div>
        <div onclick="openApp(2)" class="flex flex-col items-center cursor-pointer">
          <div class="app-icon w-16 h-16 bg-gradient-to-br from-green-500 to-emerald-600 rounded-3xl flex items-center justify-center text-4xl">📸</div>
          <p class="text-xs mt-2 opacity-90">Camera</p>
        </div>
        <div onclick="openApp(3)" class="flex flex-col items-center cursor-pointer">
          <div class="app-icon w-16 h-16 bg-gradient-to-br from-purple-500 to-pink-600 rounded-3xl flex items-center justify-center text-4xl">🎵</div>
          <p class="text-xs mt-2 opacity-90">Music</p>
        </div>
        <div onclick="openApp(4)" class="flex flex-col items-center cursor-pointer">
          <div class="app-icon w-16 h-16 bg-gradient-to-br from-orange-500 to-red-600 rounded-3xl flex items-center justify-center text-4xl">🗺️</div>
          <p class="text-xs mt-2 opacity-90">Maps</p>
        </div>

        <div onclick="openApp(5)" class="flex flex-col items-center cursor-pointer">
          <div class="app-icon w-16 h-16 bg-gradient-to-br from-cyan-500 to-teal-600 rounded-3xl flex items-center justify-center text-4xl">🌤️</div>
          <p class="text-xs mt-2 opacity-90">Weather</p>
        </div>
        <div onclick="openApp(6)" class="flex flex-col items-center cursor-pointer">
          <div class="app-icon w-16 h-16 bg-gradient-to-br from-rose-500 to-purple-600 rounded-3xl flex items-center justify-center text-4xl">📅</div>
          <p class="text-xs mt-2 opacity-90">Calendar</p>
        </div>
        <div onclick="openApp(7)" class="flex flex-col items-center cursor-pointer">
          <div class="app-icon w-16 h-16 bg-gradient-to-br from-amber-500 to-yellow-600 rounded-3xl flex items-center justify-center text-4xl">💰</div>
          <p class="text-xs mt-2 opacity-90">Wallet</p>
        </div>
        <div onclick="openApp(8)" class="flex flex-col items-center cursor-pointer">
          <div class="app-icon w-16 h-16 bg-gradient-to-br from-lime-500 to-green-600 rounded-3xl flex items-center justify-center text-4xl">🛒</div>
          <p class="text-xs mt-2 opacity-90">App Store</p>
        </div>
      </div>

      <!-- Quick Notes -->
      <div>
        <div class="flex justify-between items-center mb-4 px-1">
          <h2 class="text-xl font-semibold">Quick Notes</h2>
          <button onclick="addNote()" class="glass px-5 py-2 rounded-3xl text-sm font-medium flex items-center gap-2 active:scale-95 transition-transform">
            <i class="fa-solid fa-plus"></i> Add
          </button>
        </div>
        <div id="notes-container" class="space-y-4"></div>
      </div>
    </div>

    <!-- Bottom Dock -->
    <div class="glass mx-6 mb-9 rounded-3xl p-3 flex justify-around shadow-2xl" style="height: 82px;">
      <div onclick="openApp(9)" class="dock-icon w-14 h-14 bg-white/90 rounded-2xl flex items-center justify-center text-4xl cursor-pointer">📞</div>
      <div onclick="openApp(10)" class="dock-icon w-14 h-14 bg-white/90 rounded-2xl flex items-center justify-center text-4xl cursor-pointer">💬</div>
      <div onclick="openApp(11)" class="dock-icon w-14 h-14 bg-white/90 rounded-2xl flex items-center justify-center text-4xl cursor-pointer">🌐</div>
      <div onclick="openApp(12)" class="dock-icon w-14 h-14 bg-white/90 rounded-2xl flex items-center justify-center text-4xl cursor-pointer">📷</div>
    </div>
  </div>

  <!-- App Modal -->
  <div id="app-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="modal-content glass w-80 rounded-3xl p-9 text-center">
      <div id="modal-icon" class="mx-auto w-28 h-28 rounded-3xl flex items-center justify-center text-7xl mb-6"></div>
      <h2 id="modal-title" class="text-2xl font-semibold mb-1"></h2>
      <p class="text-white/60 mb-8">Opening app...</p>
      <button onclick="closeModal()" class="glass w-full py-4 rounded-3xl text-base font-medium active:scale-95 transition-transform">Close</button>
    </div>
  </div>

  <script>
    // Real-time Clock
    function updateClock() {
      const now = new Date();
      document.getElementById('status-time').textContent = 
        now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }).replace(' AM', 'am').replace(' PM', 'pm');
      
      document.getElementById('status-date').textContent = 
        now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

      document.getElementById('lock-time').textContent = 
        now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: false });
      
      document.getElementById('lock-date').textContent = 
        now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }

    // Passwords
    const correctPasswords = ["6275", "9919", "123456789"];
    const passInput = document.getElementById('passcode');
    const errorEl = document.getElementById('pass-error');
    const lockScreen = document.getElementById('lock-screen');
    const homeScreen = document.getElementById('home-screen');

    passInput.addEventListener('input', () => {
      const value = passInput.value.trim();
      if (value.length >= 4 && correctPasswords.includes(value)) {
        unlockPhone();
      } else if (value.length >= 9) {
        lockScreen.classList.add('shake');
        errorEl.classList.remove('hidden');
        setTimeout(() => {
          lockScreen.classList.remove('shake');
          errorEl.classList.add('hidden');
          passInput.value = '';
        }, 500);
      }
    });

    function unlockPhone() {
      lockScreen.classList.add('unlocking');
      
      setTimeout(() => {
        lockScreen.style.display = 'none';
        homeScreen.classList.remove('hidden');
        renderNotes();
      }, 650);
    }

    // Notepad with fade-in
    let notes = JSON.parse(localStorage.getItem('quickNotes')) || [];

    function renderNotes() {
      const container = document.getElementById('notes-container');
      container.innerHTML = '';
      
      notes.forEach((note, i) => {
        const div = document.createElement('div');
        div.className = 'note-card rounded-3xl p-6 shadow';
        div.style.animationDelay = (i * 80) + 'ms';
        div.innerHTML = `
          <div class="flex justify-between">
            <p class="text-[15px] leading-tight">${note.text}</p>
            <button onclick="deleteNote(${i})" class="text-red-500 text-2xl -mt-1">×</button>
          </div>
          <p class="text-xs text-gray-500 mt-4">${new Date(note.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</p>
        `;
        container.appendChild(div);
      });
    }

    function addNote() {
      const text = prompt("Quick note:");
      if (!text?.trim()) return;
      notes.unshift({ text: text.trim(), time: Date.now() });
      if (notes.length > 10) notes.pop();
      localStorage.setItem('quickNotes', JSON.stringify(notes));
      renderNotes();
    }

    function deleteNote(i) {
      notes.splice(i, 1);
      localStorage.setItem('quickNotes', JSON.stringify(notes));
      renderNotes();
    }

    // App Modal with nice animation
    function openApp(n) {
      const modal = document.getElementById('app-modal');
      const icon = document.getElementById('modal-icon');
      const title = document.getElementById('modal-title');

      const appList = {
        1: {icon:'📱', name:'Messages'}, 2:{icon:'📸', name:'Camera'},
        3:{icon:'🎵', name:'Music'}, 4:{icon:'🗺️', name:'Maps'},
        5:{icon:'🌤️', name:'Weather'}, 6:{icon:'📅', name:'Calendar'},
        7:{icon:'💰', name:'Wallet'}, 8:{icon:'🛒', name:'App Store'},
        9:{icon:'📞', name:'Phone'}, 10:{icon:'💬', name:'Messages'},
        11:{icon:'🌐', name:'Safari'}, 12:{icon:'📷', name:'Photos'}
      };

      const app = appList[n] || {icon:'⭐', name:'App'};
      icon.textContent = app.icon;
      title.textContent = app.name;
      
      modal.classList.remove('hidden');
      setTimeout(() => {
        modal.classList.add('show');
      }, 10);
    }

    function closeModal() {
      const modal = document.getElementById('app-modal');
      modal.classList.remove('show');
      setTimeout(() => {
        modal.classList.add('hidden');
      }, 300);
    }

    // Shake animation for wrong password
    const style = document.createElement('style');
    style.innerHTML = `
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-6px); }
        20%, 40%, 60%, 80% { transform: translateX(6px); }
      }
      .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
    `;
    document.head.appendChild(style);

    // Initialize
    window.onload = () => {
      updateClock();
      setInterval(updateClock, 1000);

      setTimeout(() => {
        passInput.focus();
      }, 800);

      if (notes.length === 0) {
        notes = [{text: "Welcome! Tap + to add quick notes. Everything has smooth animations now ✨", time: Date.now()}];
      }
    };
  </script>
</body>
</html>
