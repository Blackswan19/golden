<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BsReminder</title>
    <link rel="icon" type="image/x-icon" href="https://i.ibb.co/WBcSJPd/New-Project-A1-A7313.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap');
        
        * { color: #fff; font-family: "Red Hat Display", sans-serif; margin: 0; padding: 0; }
        body { 
            background: #000; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;overflow: hidden;
            scrollbar-width: none;
            scrollbar-color: gray transparent;
        }

        .header {
            position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: #000;
    z-index: 100;
    padding: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
        }

        .app-title { color: #0049ff; font-weight: 600; font-size: 17px; }

        .header-buttons button {
           background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    margin: 0;
        }

        .weekdays {
           display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-size: 13px;
    color: #aaa;
    padding: 13px 0 6px 0;
    position: fixed;
    top: 40px;
    left: 0;
    right: 0;display: none;
    background: #000;
    z-index: 99;
        }

        .calendar-container {
            padding-top: 140px;
            overflow-y: auto;
            height: 100vh;
        }

        .month-section {
    padding: 0 10px;}
        .month-header {
           font-size: 20px;
    font-weight: 700;
    padding: 30px 0 10px 0;
    position: sticky;
    top: -125px;
    background: #000;
    z-index: 90;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            background: #000000;
            border-radius: 15px;
            overflow: hidden;
        }

        .day-header {
            background: #111;
            padding: 10px 4px;
            text-align: center;
            font-size: 13px;
            color: #888;
        }

        .day {
            aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding: 6px 2px;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    background: #111111;
        }
        .day:hover { background: #313131; }

        .day.today .day-number {
            background: #0040ff;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .note-preview {
            font-size: 10px;
            line-height: 1.2;
            text-align: center;
            margin-top: 4px;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .pinned { background: #ff8c0088 !important; }
        .goal { background: #1800ff88 !important; }

        /* Modals */
        .modal, #notesListModal {
           display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.95);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

        .modal-content, .notes-list-content {
           padding: 10px 20px;
    max-width: 340px;
    background: #1c1c1e;
    border-radius: 45px;
    width: 80%;
    text-align: center;
        }

        .notes-list-content { 
          max-width: 600px;
    width: 100%;
    padding: 60px 0;
        }

        input, button {
           padding: 10px 0;
    margin: 10px 0;
    border-radius: 9999px;
    border: none;
    font-size: 17px;
    font-weight: 500;
    width: 100%;
    text-align: center;
        }
        input { background: #2c2c2e; }
        button { background: #0040ff; font-weight: 600; }

        .close { font-size: 35px;
    cursor: pointer;
    float: right;
    position: absolute;
    top: 10px;
    right: 10px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #1c1c1e;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 100; }
        .note-item {
            background: #1c1c1e;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 12px;
            cursor: pointer;
        }
        .empty-state { text-align: center; color: #666; padding: 60px 20px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="app-title">#BsReminder</div>
        <div class="header-buttons">
            <button onclick="toggleNotesList()"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="m480-277.46-148.61 89.84q-12.7 7.08-25.43 6.27-12.73-.81-22.8-7.88-10.08-7.08-14.93-19.27-4.84-12.19-1.23-26.12l39.31-169.69-131.38-113.92q-11.7-8.69-14.31-21.5-2.62-12.81 1.61-24.12 4.23-11.3 14.31-19.57t23.62-9.89l172.3-14.84L439.85-768q5.84-14.31 16.65-20.27 10.81-5.96 23.5-5.96t23.5 5.96q10.81 5.96 16.65 20.27l67.39 159.85 172.3 14.84q13.54 1.62 23.62 9.89 10.08 8.27 14.31 19.57 4.23 11.31 1.61 24.12-2.61 12.81-14.31 21.5L653.69-404.31 693-234.62q3.61 13.93-1.23 26.12-4.85 12.19-14.93 19.27-10.07 7.07-22.8 7.88-12.73.81-25.43-6.27L480-277.46Z"/></svg></button>
        </div>
    </div>

    <div class="weekdays">
        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div>
        <div>Thu</div><div>Fri</div><div>Sat</div>
    </div>

    <div class="calendar-container" id="calendarContainer"></div>

    <!-- All Notes -->
    <div id="notesListModal">
        <div class="notes-list-content">
            <div style="margin-bottom:20px;">
                <h2>All Notes <span class="close" onclick="closeNotesList()">×</span></h2>
            </div>
            <div id="notesList"></div>
        </div>
    </div>

    <!-- Add/Edit Note -->
    <div id="noteModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">×</span>
            <h3 id="modalDate"></h3>
            
            <div id="titleField" style="display:none;">
                <input type="text" id="noteTitle" placeholder="Title for pinned note" />
            </div>
            
            <input type="text" id="noteText" placeholder="Write your note here..." />
            
            <div style="    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    justify-content: center;
">
                <input type="checkbox" id="pinForever" style="    outline: none;
    border: none;
    width: 14px;
    height: 15px;
">
                <label for="pinForever">Pin to every month on this date</label>
            </div>
            
            <button onclick="saveNote()">Save Note</button>
        </div>
    </div>

    <!-- View Note -->
    <div id="viewModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">×</span>
            <h3 id="viewTitle" style="color:#0040ff;"></h3>
            <p id="viewText" style="font-size:16px; line-height:1.5; white-space: pre-wrap;"></p>
            <button onclick="editNote()" style="margin-top:20px;">Edit Note</button>
        </div>
    </div>

    <script>
    const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    
    let today = new Date();
    let currentYear = today.getFullYear();

    let oneTimeNotes = JSON.parse(localStorage.getItem('oneTimeNotes') || '{}');
    let pinnedNotes  = JSON.parse(localStorage.getItem('pinnedNotes') || '{}');

    let selectedDate = "";
    let selectedDay = 0;

    function saveToStorage() {
        localStorage.setItem('oneTimeNotes', JSON.stringify(oneTimeNotes));
        localStorage.setItem('pinnedNotes', JSON.stringify(pinnedNotes));
    }

    function migratePinnedNotes() {
        Object.keys(pinnedNotes).forEach(key => {
            if (key.includes('-')) {
                const day = parseInt(key.split('-')[2]);
                pinnedNotes[day] = pinnedNotes[key];
                delete pinnedNotes[key];
            }
        });
        saveToStorage();
    }

    function createMonthElement(year, month) {
        const section = document.createElement('div');
        section.className = 'month-section';

        const header = document.createElement('div');
        header.className = 'month-header';
        header.textContent = `${months[month]} ${year}`;
        section.appendChild(header);

        const grid = document.createElement('div');
        grid.className = 'calendar-grid';

        // Week headers
        ['S','M','T','W','T','F','S'].forEach(d => {
            const el = document.createElement('div');
            el.className = 'day-header';
            el.textContent = d;
            grid.appendChild(el);
        });

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        // Empty cells before first day (to keep alignment)
        for (let i = 0; i < firstDay; i++) {
            const empty = document.createElement('div');
            empty.className = 'day';
            empty.style.visibility = 'hidden';
            grid.appendChild(empty);
        }

        // Only current month days
        for (let day = 1; day <= daysInMonth; day++) {
            const fullDate = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            
            const cell = document.createElement('div');
            cell.className = 'day';
            cell.dataset.date = fullDate;
            cell.dataset.day = day;

            if (day === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
                cell.classList.add('today');
            }

            const num = document.createElement('div');
            num.className = 'day-number';
            num.textContent = day;
            cell.appendChild(num);

            // Pinned recurring
            const pinned = pinnedNotes[day];
            if (pinned && pinned.note && pinned.note.trim() !== "") {
                cell.classList.add('pinned');
                const p = document.createElement('div');
                p.className = 'note-preview';
                p.textContent = pinned.title ? pinned.title : pinned.note.substring(0, 18) + "…";
                cell.appendChild(p);
            }

            // One-time
            if (oneTimeNotes[fullDate] && oneTimeNotes[fullDate].trim() !== "") {
                cell.classList.add('goal');
                const p = document.createElement('div');
                p.className = 'note-preview';
                p.textContent = oneTimeNotes[fullDate].substring(0, 15) + "…";
                cell.appendChild(p);
            }

            cell.addEventListener('click', () => handleDayClick(fullDate, day));
            grid.appendChild(cell);
        }

        section.appendChild(grid);
        return section;
    }

    function handleDayClick(fullDate, day) {
        selectedDate = fullDate;
        selectedDay = day;

        const pinned = pinnedNotes[day];
        const oneTime = oneTimeNotes[fullDate];

        const hasPinned = pinned && pinned.note && pinned.note.trim() !== "";
        const hasOneTime = oneTime && oneTime.trim() !== "";

        if (hasPinned || hasOneTime) {
            document.getElementById("viewTitle").textContent = hasPinned ? (pinned.title || "Pinned Note") : "New Note";
            document.getElementById("viewText").textContent = hasPinned ? pinned.note : oneTime;
            document.getElementById("viewModal").style.display = "flex";
        } else {
            openNoteModal(fullDate, day);
        }
    }

    function openNoteModal(fullDate, day) {
        selectedDate = fullDate;
        selectedDay = day;

        document.getElementById("modalDate").textContent = fullDate;
        const isPinned = !!(pinnedNotes[day] && pinnedNotes[day].note && pinnedNotes[day].note.trim() !== "");

        document.getElementById("pinForever").checked = isPinned;
        document.getElementById("titleField").style.display = isPinned ? "block" : "none";

        document.getElementById("noteTitle").value = isPinned ? (pinnedNotes[day].title || "") : "";
        document.getElementById("noteText").value = isPinned ? pinnedNotes[day].note : (oneTimeNotes[fullDate] || "");

        document.getElementById("noteModal").style.display = "flex";
    }

    function saveNote() {
        let text = document.getElementById("noteText").value.trim();
        const title = document.getElementById("noteTitle").value.trim();
        const forever = document.getElementById("pinForever").checked;

        if (!text) {
            if (forever) delete pinnedNotes[selectedDay];
            else delete oneTimeNotes[selectedDate];
            saveToStorage();
            closeModal();
            refreshCalendar();
            refreshNotesList();
            return;
        }

        if (forever) {
            pinnedNotes[selectedDay] = { title: title || "", note: text };
            delete oneTimeNotes[selectedDate];
        } else {
            oneTimeNotes[selectedDate] = text;
            delete pinnedNotes[selectedDay];
        }

        saveToStorage();
        closeModal();
        refreshCalendar();
        refreshNotesList();
    }

    function editNote() {
        closeModal();
        openNoteModal(selectedDate, selectedDay);
    }

    function closeModal() {
        document.querySelectorAll('.modal').forEach(m => m.style.display = "none");
    }

    function refreshCalendar() {
        const container = document.getElementById("calendarContainer");
        container.innerHTML = "";
        
        const startYear = currentYear - 2;
        for (let y = startYear; y <= currentYear + 1; y++) {
            for (let m = 0; m < 12; m++) {
                container.appendChild(createMonthElement(y, m));
            }
        }
    }

    function toggleNotesList() {
        document.getElementById("notesListModal").style.display = "block";
        refreshNotesList();
    }

    function closeNotesList() {
        document.getElementById("notesListModal").style.display = "none";
    }

    function refreshNotesList() {
        const container = document.getElementById("notesList");
        container.innerHTML = "";

        let notesArray = [];

        Object.keys(pinnedNotes).forEach(day => {
            const pinned = pinnedNotes[day];
            if (pinned && pinned.note && pinned.note.trim() !== "") {
                notesArray.push({
                    type: "pinned",
                    dateStr: `Every ${day}${getOrdinal(day)}`,
                    title: pinned.title || "",
                    text: pinned.note,
                    day: parseInt(day)
                });
            }
        });

        Object.keys(oneTimeNotes).sort().forEach(date => {
            const text = oneTimeNotes[date];
            if (text && text.trim() !== "") {
                notesArray.push({
                    type: "onetime",
                    dateStr: date,
                    title: "",
                    text: text
                });
            }
        });

        if (notesArray.length === 0) {
            container.innerHTML = `<div class="empty-state">No notes yet.<br>Tap any date on the calendar.</div>`;
            return;
        }

        notesArray.forEach(note => {
            const div = document.createElement('div');
            div.className = 'note-item';
            div.innerHTML = `
                <div style="color:#0049ff; font-size:15px;">${note.dateStr}</div>
                ${note.type === "pinned" ? `<div style="font-weight:600; margin:6px 0;">⭐ ${note.title || "Pinned Note"}</div>` : ''}
                <div style="font-size:15px; line-height:1.4;">${note.text}</div>
            `;
            div.onclick = () => {
                closeNotesList();
                if (note.type === "pinned") {
                    selectedDay = note.day;
                    selectedDate = `${currentYear}-01-${String(note.day).padStart(2,'0')}`;
                    document.getElementById("viewTitle").textContent = note.title || "Pinned Note";
                    document.getElementById("viewText").textContent = note.text;
                    document.getElementById("viewModal").style.display = "flex";
                } else {
                    selectedDate = note.dateStr;
                    selectedDay = parseInt(note.dateStr.split('-')[2]);
                    openNoteModal(selectedDate, selectedDay);
                }
            };
            container.appendChild(div);
        });
    }

    function getOrdinal(n) {
        const s = ["th","st","nd","rd"];
        const v = n % 100;
        return s[(v-20)%10] || s[v] || s[0];
    }

    window.onclick = e => {
        if (e.target.id === "notesListModal") closeNotesList();
        if (e.target.classList.contains('modal')) closeModal();
    };

    document.addEventListener("DOMContentLoaded", () => {
        migratePinnedNotes();
        refreshCalendar();
        
        setTimeout(() => {
            const current = Array.from(document.querySelectorAll('.month-header'))
                .find(h => h.textContent.includes(months[today.getMonth()]) && 
                           h.textContent.includes(today.getFullYear().toString()));
            if (current) current.scrollIntoView({ behavior: "smooth" });
        }, 100);
    });
</script>
</body>
</html>
