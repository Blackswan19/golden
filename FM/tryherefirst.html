<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BsGames | Lottery Spins</title>
<link rel="icon" href="https://i.ibb.co/ZpVQQ2Kp/mfi-logo.png" />
<style>
:root{
    --yellow:#f5c518;
    --red:#e53935;
    --blue:#1e88e5;
    --bg:#0d0d0d;
    --card:#161616;
}
* {
            -webkit-tap-highlight-color: transparent;
        }
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
body{
    margin:0;
    min-height:100vh;
    background:var(--bg);
    font-family:system-ui, Segoe UI, sans-serif;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
}
::placeholder{
    color: white;
}
.container{
   width: 90%;
    max-width: 680px;
    padding: 32px;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

h1{color:var(--yellow);margin-bottom:10px}
p{color:#ccc}

input{
    width:220px;
    padding:13px;
    font-size:16px;
    background:#000;
    color:#fff;
    border:1px solid #333;
    border-radius:8px;
}
input:focus{
  background: #ffffff24;
    color: #ffffff;
}
button{
   padding: 8px 12px;
    font-size: 16px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    margin-top: 20px;
    box-shadow: inset 0.5px 0.5px 0px 0.1px #ffffff54, inset -1.5px -2.5px 0px -1.9px #ffffff54;
}

.cards{
    margin-top:28px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:18px;
}

.card{
   height: 100px;
    background: #181b24;
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid #222;
    box-shadow: inset 0.5px 0.5px 0px 0.1px #ffffff54, inset -1.5px -2.5px 0px -1.9px #ffffff54;
}

.card.revealed{cursor:default}
.win{color:var(--yellow)}
.empty{color:var(--red)}
.hidden{display:none}

#message{
    margin-top:20px;
    font-size:18px;
}
    .exchange-btn {
      background: #4f698c;
    color: white;
    border: none;
    padding: 10px;
    font-size: 14px;
    font-weight: 500;
    border-radius: 31px;
    cursor: pointer;
    transition: all 0.2s;
    position: fixed;
    top: 0px;
    right: 10px;
    box-shadow: inset 0.5px 0.5px 0px 0.1px #ffffff54, inset -1.5px -2.5px 0px -1.9px #ffffff54;
    }

    .exchange-btn:hover {
      background: #4f698cc9;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
       background: #232323;
    border-radius: 40px;
    border: none;
    position: relative;
    animation: popup 0.28s ease-out;
    padding: 24px;
    display: flex;
    justify-content: center;
    align-items: center;
    }

    @keyframes popup {
      from { transform: scale(0.94); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    h2 {
      margin: 0 0 22px 0;
      font-size: 22px;
      color: #ffffff;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #b0b0b0;
      font-size: 14px;
    }

    input {
    padding: 10px 14px;
    background: #0000004f;
    border: none;
    border-radius: 30px;
    color: #ffffff;
    font-size: 14px;
    outline: none;
    box-sizing: border-box;
    box-shadow: inset 0.5px 0.5px 0px 0.1px #ffffff54, inset -1.5px -2.5px 0px -1.9px #ffffff54;
    text-align: center;
    }

   
    input::placeholder {
      color: #555;
    }

    .submit-btn {
      background: #4f6594;
    color: white;
    border: none;
    padding: 10px 21px;
    font-size: 15px;
    font-weight: 400;
    border-radius: 27px;
    cursor: pointer;
    transition: background 0.2s;
    width: 100%;outline: none;
    margin: 5px 0px;box-shadow: inset 0.5px 0.5px 0px 0.1px #ffffff54, inset -1.5px -2.5px 0px -1.9px #ffffff54;
    }

    .submit-btn:hover {
      background: #4f6594d1;
    }

    /* States */
    .loading-state, .success-state {
     display: none;
    text-align: center;
    padding: 20px 0px;
    }

    .success-state {
      color: #a0e060;
    }

    .success-icon {
      font-size: 54px;
      margin-bottom: 20px;
    }

    .success-title {
      font-size: 21px;
      font-weight: 600;
      color: #ffffff;
      margin: 10px 0 16px;
    }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 28px;
      cursor: pointer;
      color: #777;
      line-height: 1;
    }

    .close-btn:hover {
      color: #ccc;
    }

    .fee-highlight {
      color: #ffdd57;
      font-weight: 600;
    }
  </style>
</head>
<body>


<!-- Exchange Gift Button – placed here so it's fixed in top-right -->
<button class="exchange-btn" id="exchangeBtn">Exchange Gift</button>

<!-- Modal -->
<div class="modal-overlay" id="exchangeModal">
  <div class="modal-content">
    <span class="close-btn" id="closeModal">×</span>

    <div id="formStep">
      <h2>Exchange Gift</h2>
      <div class="form-group">
        <input type="text" id="yourId" placeholder="Your ID" required>
      </div>
      <div class="form-group">
        <input type="text" id="exchangerId" placeholder="Exchanger ID" required>
      </div>
      <div class="form-group">
        <input type="text" id="giftId" placeholder="Exchanger Gift ID" required>
      </div>
      <button class="submit-btn" id="submitExchange">Submit</button>
    </div>

    <div class="loading-state" id="loadingStep">
      <div style="font-size:44px; margin-bottom:24px;">⟳</div>
      <h2>Verifying...</h2>
      <p style="color:#999;">Wait a moment</p>
    </div>

    <div class="success-state" id="successStep">
      <div class="success-icon">✅</div>
      <div class="success-title">Exchange Requested!</div>
      <p>Gift exchange fee was <span class="fee-highlight">₹460</span> from Exchanger.</p>
      <p>We will verify your fee and exchange details shortly.</p>
      <p style="margin-top:24px; color:#0066cc; font-size:15px;">Thank you!</p>
    </div>
  </div>
</div>

<div class="container" id="app">
  <h1>Lottery Spins</h1>
  <div id="content"></div>
</div>

<script>
// ────────────────────────────────────────────────
//  CONFIG
// ────────────────────────────────────────────────
const START_TIME = new Date("2026-02-17T18:00:00");
const END_TIME   = new Date("2026-03-22T23:59:00");
const now        = new Date();

const TOTAL_CARDS = 6;
const MAX_OPENS   = 3;
const GIFTS       = ["100 Stars", "200 Stars", "300 Stars"];

const content = document.getElementById("content");

// ────────────────────────────────────────────────
//  DATE & CLAIM CHECK
// ────────────────────────────────────────────────
if (now < START_TIME || now > END_TIME) {
  content.innerHTML = `
    <div class="status-message" style="color:#ff0600;">
      There is no lottery spins currently
    </div>
  `;
} else if (localStorage.getItem("lotteryClaimed") === "true") {
  content.innerHTML = `
    <div class="status-message" style="color:#ff0600;">
      Reward already claimed on this device.
    </div>
    <p style="margin-top: 1.5rem;
    color: #888;
    position: fixed;
    bottom: 0px;
    text-align: center;
    background: #35353d;
    color: white;
    border-radius: 100px;
    padding: 5px 10px;box-shadow: inset 0.5px 0.5px 0px 0.1px #ffffff54, inset -1.5px -2.5px 0px -1.9px #ffffff54;">
      Only one claim per device is allowed.
    </p>
  `;
} else {
  // Code entry screen
  content.innerHTML = `
    <p style="margin-bottom:1.5rem;">Enter access code</p>
    <input id="code" type="password" placeholder="•••••••••" autocomplete="off">
    <button onclick="verifyCode()">Verify</button>
    <div id="message" style="margin-top:1.5rem; min-height:1.6em;"></div>
  `;
}

function verifyCode() {
  const codeInput = document.getElementById("code");
  const msg = document.getElementById("message");

  if (!codeInput) return;

  const code = codeInput.value.trim();

  if (code === "123456789") {
    startGame();
  } else {
    msg.textContent = "Invalid code";
    msg.style.color = "#e53935";
  }
}

function startGame() {
  let opened = 0;
  const selectedGift = GIFTS[Math.floor(Math.random() * GIFTS.length)];

  content.innerHTML = `
    <p style="    margin-bottom: 1.2rem;
    background: #4e688b;
    color: white;
    border-radius: 100px;
    padding: 5px;">Select any ${MAX_OPENS} cards</p>
    <div class="cards" id="cardsGrid"></div>
    <div id="message" style="margin:2rem 0; min-height:1.8em; font-size:1.4rem;"></div>
  `;

  const grid = document.getElementById("cardsGrid");

  for (let i = 0; i < TOTAL_CARDS; i++) {
    const card = document.createElement("div");
    card.className = "card";
    card.textContent = "?";
    card.onclick = () => openCard(card);
    grid.appendChild(card);
  }

  function openCard(card) {
    if (card.classList.contains("revealed") || opened >= MAX_OPENS) return;

    opened++;
    card.classList.add("revealed");

    if (opened < MAX_OPENS) {
      card.textContent = "Empty";
      card.classList.add("empty");
      showMessage("Keep going...", "#888");
    } else {
      // 3rd card → guaranteed win
      card.textContent = selectedGift;
      card.classList.add("win");
      showMessage(`You won ${selectedGift}! 🎉`, "var(--yellow)");

      localStorage.setItem("lotteryClaimed", "true");

      // Disable remaining cards
      document.querySelectorAll(".card:not(.revealed)").forEach(c => {
        c.style.opacity = "0.4";
        c.style.cursor = "default";
        c.onclick = null;
      });
    }
  }

  function showMessage(text, color = "#ccc") {
    const msgEl = document.getElementById("message");
    if (msgEl) {
      msgEl.textContent = text;
      msgEl.style.color = color;
    }
  }
}

// ────────────────────────────────────────────────
//  EXCHANGE MODAL LOGIC
// ────────────────────────────────────────────────
const modal       = document.getElementById("exchangeModal");
const exchangeBtn = document.getElementById("exchangeBtn");
const closeBtn    = document.getElementById("closeModal");
const submitBtn   = document.getElementById("submitExchange");

const formStep    = document.getElementById("formStep");
const loadingStep = document.getElementById("loadingStep");
const successStep = document.getElementById("successStep");

exchangeBtn.onclick = () => {
  modal.style.display = "flex";
  formStep.style.display = "block";
  loadingStep.style.display = "none";
  successStep.style.display = "none";
};

closeBtn.onclick = () => modal.style.display = "none";
modal.onclick = e => { if (e.target === modal) modal.style.display = "none"; };

submitBtn.onclick = () => {
  const yourId     = document.getElementById("yourId").value.trim();
  const exchangerId = document.getElementById("exchangerId").value.trim();
  const giftId     = document.getElementById("giftId").value.trim();

  if (!yourId || !exchangerId || !giftId) {
    alert("Fill all fields");
    return;
  }

  formStep.style.display = "none";
  loadingStep.style.display = "block";

  setTimeout(() => {
    loadingStep.style.display = "none";
    successStep.style.display = "block";
  }, 1800);
};
</script>
</body>
</html>
