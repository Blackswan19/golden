<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BsNote</title>
  <link rel="icon" type="image/x-icon" href="https://i.pinimg.com/originals/22/fb/32/22fb32654195b989444117ae2f1a479b.gif" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

    * {
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
      color: var(--text);
    }* {
            -webkit-tap-highlight-color: transparent;
        }
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

    :root {
      --bg: #000000;
      --text: #e8e8e8;
      --text-dim: #777777;
      --accent: #002aff;
    }

    html, body { 
      height: 100%; 
      background: var(--bg); 
    }

    body { 
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .BsTasks {
          position: absolute;
    right: 0;
    top: 0;
    background: #ffffff1a;
    padding: 5px 10px;
    z-index: 10000000;
    border-radius: 0 0 0 15px;
    backdrop-filter: blur(10px);
    border: 0.5px solid rgba(255, 255, 255, 0.1);
    }

    header {
font-size: 15px;
    font-weight: 400;
    color: #ffffff;
    padding: 10px;
    text-align: center;
    white-space: nowrap;
    overflow: scroll;
    width: fit-content;
    border-radius: 999px;
    scrollbar-width: none;
    max-width: 95%;
    margin: 10px;
    position: fixed;
    top: 0;
    z-index: 1000;
    box-shadow: 0px 0px 8px rgb(0 0 0 / 21%);
    background: rgb(255 255 255 / 10%);
    backdrop-filter: blur(30px);
    font-weight: 200;
    border: 0.5px solid rgba(255, 255, 255, 0.1);
    }

    .folders-container {
      background: var(--bg);
      flex-shrink: 0;
      max-width: 650px;
      width: 100%;
    }

.folders {
display: flex;
    align-items: center;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
    justify-content: flex-start;
    width: 100%;
    padding: 5px 0 0 0;
    }

    .folders::-webkit-scrollbar { display: none; }

    .add-folder-fixed {
   flex-shrink: 0;
    padding: 10px 10px 10px 30px;
    background: linear-gradient(269deg, #4f4f4f, #000000);
    color: #ffffff;
    border-radius: 0 100px 100px 0;
    font-size: 15px;
    cursor: pointer;
    white-space: nowrap;
    border: none;
    backdrop-filter: blur(11px);
    display: flex;
    justify-content: center;
    align-items: center;
    position: sticky;
    left: -25px;
    }

.folder-btn {
flex-shrink: 0;
    padding: 6px 10px;
    border-radius: 999px;
    background: #373737;
    border: none;
    color: white;
    font-size: 17px;
    cursor: pointer;
    transition: all 0.18s;
    text-overflow: ellipsis;
    max-width: 400px;
    overflow: hidden;
    white-space: nowrap;
    display: flex;
    justify-content: flex-start;
    align-items: center;
    font-weight: 300;
    }

    .folder-btn.active,
    .folder-btn:hover {
      background: blue;
    }

    .notes-container {
overflow-y: auto;
    padding: 65px 8px 130px 8px;
    scrollbar-width: thin;
    scrollbar-color: #2e2e2e transparent;
    width: 100%;
    max-width: 650px;
    }

    .note {
     font-size: 16px;
    line-height: 1.4;
    margin-bottom: 15px;
    padding: 10px 40px 10px 20px;
    border-radius: 25px;
    background: rgb(255 255 255 / 8%);
    position: relative;
    transition: background 0.2s;
    word-break: break-word;
    font-weight: 300;
    }

    .note:hover { background: rgba(255, 255, 255, 0.12); }

    .note .star {
      position: absolute;
      right: 5px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 25px;
      cursor: pointer;
      color: #ffffff91;
      background: #ffffff26;
      width: 35px;
      height: 35px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      backdrop-filter: blur(5px);
    }

    .note.important .star {
      color: white;
      background: #002aff;
    }

    .note-text {
    white-space: pre-wrap;
    word-break: break-word;
    color: #ffffffb5;
    font-weight: 300;
}
    .note img {
      max-width: 100%;
      border-radius: 15px;
      margin: 8px 0;
      display: block;
      cursor: pointer;
      opacity: 0.9;
    }

    .empty-state {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-size: 17px;
      text-align: center;
      padding: 0 40px;
    }

    .input-area {
display: flex;
    align-items: center;
    gap: 5px;
    width: 100%;
    max-width: 650px;
    z-index: 20000000;
    flex-direction: column;
    padding: 0px;
    justify-content: center;
    position: fixed;
    bottom: 0px;
    background: linear-gradient(0deg, black 50%, transparent);
    }

    #noteInput {
    flex: 1;
    background: rgba(0, 0, 0, 0);
    font-size: 18px;
    outline: none;
    padding: 10px 0;
    color: #ffffffc9;
    resize: none;
    min-height: 45px;
    max-height: 180px;
    overflow-y: auto;
    border: none;
    line-height: 1.5;
    scrollbar-width: none;
    }

    #noteInput::placeholder { color: #555; }

    .btn {
width: 40px;
    height: 27px;
    border-radius: 40px;
    background: #002aff;
    border: none;
    color: white;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    margin: 10px;
    }

    .attach-label {
      font-size: 24px;
      color: var(--text-dim);
      cursor: pointer;
      padding: 10px;
    }

    /* Context Menus */
    #noteContextMenu, #folderContextMenu {
position: fixed;
    background: rgb(255 255 255 / 19%);
    border-radius: 25px;
    padding: 5px;
    min-width: 130px;
    z-index: 100;
    list-style: none;
    text-align: center;
    backdrop-filter: blur(30px);
    }

    #noteContextMenu li, #folderContextMenu li {
      padding: 8px 15px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 999px;
    }

    #noteContextMenu li:hover, #folderContextMenu li:hover {
      background: rgb(255 255 255 / 42%);
    }

    #popup {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20000000;
      background: #000000ad;
    }

    .popup-box {
          background: #1c1c1e;
    border-radius: 30px;
    padding: 15px;
    width: 95%;
    max-width: 420px;
    text-align: center;
    border: 0.5px solid rgba(255, 255, 255, 0.1);
    }
p#popupMsg {
    padding-bottom: 15px;
}

    .popup-image {
      max-width: 100%;
      max-height: 65vh;
      border-radius: 16px;
      margin: 10px 0;
    }

    .popup-buttons {
      display: flex;
      gap: 12px;
      margin-top: 15px;
    }

    .popup-btn {
      flex: 1;
      padding: 12px;
      border-radius: 14px;
      border: none;
      font-size: 15px;
      cursor: pointer;
    }
.inputsection {
display: flex;
    justify-content: center;
    align-items: end;
    width: 95%;
    border: 0.5px solid rgba(255, 255, 255, 0.1);
    background: #1a1a1a;
    border-radius: 25px;
    margin-bottom: 10px;
}
    .cancel { background: #323232; color: #ffffffb5; }
    .danger  { background: #ff0d00; color: white; }
    .confirm { background: var(--accent); color: white; }
  </style>
</head>
<body>

      <header id="header">BsNote</header>

  <div class="notes-container" id="notes">
    <div class="empty-state">Select a folder to view or add notes</div>
  </div>

  <div class="input-area" id="inputArea">
    <div class="folders" id="folders"></div>
  <div class="folders-container">
  </div>
    <div class="inputsection">
        <label class="btn" for="imageInput">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M212.31-140Q182-140 161-161q-21-21-21-51.31v-535.38Q140-778 161-799q21-21 51.31-21h535.38Q778-820 799-799q21 21 21 51.31v535.38Q820-182 799-161q-21 21-51.31 21H212.31Zm0-60h535.38q4.62 0 8.46-3.85 3.85-3.84 3.85-8.46v-535.38q0-4.62-3.85-8.46-3.84-3.85-8.46-3.85H212.31q-4.62 0-8.46 3.85-3.85 3.84-3.85 8.46v535.38q0 4.62 3.85 8.46 3.84 3.85 8.46 3.85ZM200-200v-560 560Zm106.16-90h350.76q10.85 0 16.08-9.85 5.23-9.84-1.62-19.07L576-446.69q-5.62-7.23-14.46-7.23-8.85 0-14.46 7.23l-97.85 127.46-65.54-84q-5.61-6.85-14.27-6.85-8.65 0-14.27 7.24l-63.07 83.92q-7.23 9.23-2 19.07 5.23 9.85 16.08 9.85Z"/></svg>
        </label>
        <input type="file" id="imageInput" accept="image/*" style="display:none" />
        <textarea id="noteInput" placeholder="Write note..." rows="1"></textarea>
        <button class="btn" id="sendBtn">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M450-665.08 243.23-458.31q-8.92 8.92-20.88 8.81-11.96-.12-21.27-9.42-8.69-9.31-9-21.08-.31-11.77 9-21.08l253.61-253.61q5.62-5.62 11.85-7.92 6.23-2.31 13.46-2.31t13.46 2.31q6.23 2.3 11.85 7.92l253.61 253.61q8.31 8.31 8.5 20.58.19 12.27-8.5 21.58-9.31 9.3-21.38 9.3-12.08 0-21.39-9.3L510-665.08V-210q0 12.77-8.62 21.38Q492.77-180 480-180t-21.38-8.62Q450-197.23 450-210v-455.08Z"/></svg>
        </button>
    </div>
  </div>

  <ul id="noteContextMenu" style="display:none">
    <li id="editNote">Edit</li>
    <li id="copyNote">Copy</li>
    <li id="deleteNote">Delete</li>
  </ul>

  <ul id="folderContextMenu" style="display:none">
    <li id="deleteFolder">Delete section</li>
  </ul>

  <div id="popup">
    <div class="popup-box">
      <p class="popup-msg" id="popupMsg"></p>
      <div id="popupExtra"></div>
      <div class="popup-buttons" id="popupButtons"></div>
    </div>
  </div>

<script>
const folders = JSON.parse(localStorage.getItem('bsnote_minimal_v2')) || {};
let current = null;
let ctxNote = null;
let ctxFolder = null;
// document.addEventListener('contextmenu', e => e.preventDefault());
const foldersEl = document.getElementById('folders');
const notesEl = document.getElementById('notes');
const headerEl = document.getElementById('header');
const input = document.getElementById('noteInput');
const sendBtn = document.getElementById('sendBtn');
const popup = document.getElementById('popup');
const popupMsg = document.getElementById('popupMsg');
const popupExtra = document.getElementById('popupExtra');
const popupButtons = document.getElementById('popupButtons');

function save() {
  localStorage.setItem('bsnote_minimal_v2', JSON.stringify(folders));
}

function closePopup() {
  popup.style.display = 'none';
  popupExtra.innerHTML = '';
  popupButtons.innerHTML = '';
}

function showPopup(message = '', extraHTML = '', buttons = []) {
  popupMsg.textContent = message;
  popupExtra.innerHTML = extraHTML;
  popupButtons.innerHTML = '';
  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.className = `popup-btn ${b.class || 'confirm'}`;
    btn.textContent = b.text;
    btn.onclick = () => { b.action(); closePopup(); };
    popupButtons.appendChild(btn);
  });
  popup.style.display = 'flex';
}

function showImagePopup(src) {
  const filename = 'bsnote-image-' + Date.now() + '.png';
  const extra = `<img src="${src}" class="popup-image" alt="Note image">`;
  const buttons = [
    { text: 'Download', class: 'confirm', action: () => {
      const link = document.createElement('a');
      link.href = src;
      link.download = filename;
      link.click();
    }},
    { text: 'Close', class: 'cancel', action: closePopup }
  ];
  showPopup('', extra, buttons);
}

function getImportantNotes() {
  const important = [];
  Object.entries(folders).forEach(([folderName, notes]) => {
    notes.forEach((note, idx) => {
      if (note.important) important.push({ folder: folderName, index: idx, note });
    });
  });
  return important;
}

function renderFolders() {
  foldersEl.innerHTML = '';

  const addBtn = document.createElement('button');
  addBtn.className = 'add-folder-fixed';
  addBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M458.62-148.63Q450-157.25 450-170v-280H170q-12.75 0-21.37-8.63-8.63-8.63-8.63-21.38 0-12.76 8.63-21.37Q157.25-510 170-510h280v-280q0-12.75 8.63-21.37 8.63-8.63 21.38-8.63 12.76 0 21.37 8.63Q510-802.75 510-790v280h280q12.75 0 21.37 8.63 8.63 8.63 8.63 21.38 0 12.76-8.63 21.37Q802.75-450 790-450H510v280q0 12.75-8.63 21.37-8.63 8.63-21.38 8.63-12.76 0-21.37-8.63Z"/></svg>';
  addBtn.onclick = addFolder;
  foldersEl.appendChild(addBtn);

  const impBtn = document.createElement('button');
  impBtn.className = `folder-btn ${current === 'important' ? 'active' : ''}`;
  impBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M620-760v288.46l62.61 62.62q4.46 4.46 6.7 10.04 2.23 5.57 2.23 11.52v17.1q0 12.64-8.74 21.45-8.73 8.81-21.65 8.81H510v215.54q0 12.75-8.63 21.37-8.63 8.62-21.38 8.62-12.76 0-21.37-8.62-8.62-8.62-8.62-21.37V-340H298.85q-12.92 0-21.65-8.81-8.74-8.81-8.74-21.45v-17.1q0-5.95 2.23-11.52 2.24-5.58 6.7-10.04L340-471.54V-760h-10q-12.75 0-21.37-8.63-8.63-8.63-8.63-21.38 0-12.76 8.63-21.37Q317.25-820 330-820h300q12.75 0 21.37 8.63 8.63 8.63 8.63 21.38 0 12.76-8.63 21.37Q642.75-760 630-760h-10Z"/></svg> Pinned';
  impBtn.onclick = () => select('important');
  foldersEl.appendChild(impBtn);

  Object.keys(folders).sort().forEach(name => {
    const b = document.createElement('button');
    b.className = `folder-btn ${name === current ? 'active' : ''}`;
    b.textContent = name;
    b.dataset.folder = name;

    b.onclick = () => select(name);

    let pressTimer;
    b.onpointerdown = () => {
      pressTimer = setTimeout(() => {
        ctxFolder = name;
        showFolderContext({ pageX: window.innerWidth/2, pageY: window.innerHeight/2 });
      }, 600);
    };
    b.onpointerup = b.onpointercancel = b.onpointerleave = () => clearTimeout(pressTimer);

    b.oncontextmenu = e => {
      e.preventDefault();
      ctxFolder = name;
      showFolderContext(e);
    };

    foldersEl.appendChild(b);
  });
}

function select(name) {
  current = name;
  headerEl.textContent = name === 'important' ? 'Important Notes' : (name || 'BsNote');

  const canWrite = name && name !== 'important';
  input.disabled = sendBtn.disabled = !canWrite;

  renderFolders();

  if (name === 'important') {
    renderImportantNotes();
  } else if (name && folders[name]) {
    renderNotes(name);
  } else {
    notesEl.innerHTML = '<div class="empty-state">Welcome to BsNote</div>';
  }
}

function renderNotes(folderName) {
  notesEl.innerHTML = '';
  const notes = folders[folderName] || [];

  if (notes.length === 0) {
    notesEl.innerHTML = '<div class="empty-state">This section is empty<br>Start typing to add notes</div>';
    return;
  }

  notes.forEach((note, i) => createNoteElement(note, i, folderName));
}

function renderImportantNotes() {
  notesEl.innerHTML = '';
  const important = getImportantNotes();

  if (important.length === 0) {
    notesEl.innerHTML = '<div class="empty-state">No important notes<br>Click 📌 to pin notes</div>';
    return;
  }

  important.forEach(({folder, index, note}) => {
    const el = createNoteElement(note, index, folder, true);
    const badge = document.createElement('div');
    badge.style.cssText = 'font-size:11px; color:#888; margin-top:6px; opacity:0.7;';
    badge.textContent = `from ${folder}`;
    el.appendChild(badge);
  });
}

function createNoteElement(note, index, folderName) {
  const div = document.createElement('div');
  div.className = `note ${note.important ? 'important' : ''}`;
  div.dataset.folder = folderName;
  div.dataset.index = index;

  const star = document.createElement('span');
  star.className = 'star';
  star.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M620-760v288.46l62.61 62.62q4.46 4.46 6.7 10.04 2.23 5.57 2.23 11.52v17.1q0 12.64-8.74 21.45-8.73 8.81-21.65 8.81H510v215.54q0 12.75-8.63 21.37-8.63 8.62-21.38 8.62-12.76 0-21.37-8.62-8.62-8.62-8.62-21.37V-340H298.85q-12.92 0-21.65-8.81-8.74-8.81-8.74-21.45v-17.1q0-5.95 2.23-11.52 2.24-5.58 6.7-10.04L340-471.54V-760h-10q-12.75 0-21.37-8.63-8.63-8.63-8.63-21.38 0-12.76 8.63-21.37Q317.25-820 330-820h300q12.75 0 21.37 8.63 8.63 8.63 8.63 21.38 0 12.76-8.63 21.37Q642.75-760 630-760h-10Z"/></svg>';
  star.onclick = e => {
    e.stopPropagation();
    toggleImportant(folderName, index);
  };
  div.appendChild(star);

  if (note.type === 'image') {
    const img = document.createElement('img');
    img.src = note.content;
    img.onclick = () => showImagePopup(note.content);
    div.appendChild(img);
  } else {
    const textDiv = document.createElement('div');
    textDiv.className = 'note-text';
    textDiv.textContent = note.content;
    div.appendChild(textDiv);
  }

  let pressTimer;
  div.onpointerdown = () => {
    pressTimer = setTimeout(() => {
      ctxNote = { folder: folderName, index };
      showNoteContext({ pageX: window.innerWidth/2, pageY: window.innerHeight/2 });
    }, 500);
  };
  div.onpointerup = div.onpointercancel = div.onpointerleave = () => clearTimeout(pressTimer);

  div.oncontextmenu = e => {
    e.preventDefault();
    ctxNote = { folder: folderName, index };
    showNoteContext(e);
  };

  notesEl.appendChild(div);
  return div;
}

function toggleImportant(folderName, index) {
  if (!folders[folderName]?.[index]) return;
  folders[folderName][index].important = !folders[folderName][index].important;
  save();
  if (current === 'important') renderImportantNotes();
  else if (current === folderName) renderNotes(folderName);
}

function addFolder() {
  showPopup("Create Section", `
    <input type="text" id="folderNameInput" placeholder="Enter folder name..." style="outline:none;width:100%;padding:12px;background:#fff;border:none;border-radius:10px;color:black;font-size:16px;text-align:center;">
  `, [
    { text: 'Cancel', class: 'cancel', action: closePopup },
    { text: 'Create', class: 'confirm', action: () => {
      const name = document.getElementById('folderNameInput').value.trim();
      if (!name) return;
      if (folders[name] || name.toLowerCase() === 'important') {
        alert("Folder name already exists or is not allowed.");
        return;
      }
      folders[name] = [];
      save();
      renderFolders();
      select(name);
    }}
  ]);
}

function deleteFolder(folderName) {
  showPopup(`Delete folder "${folderName}"?`, 
    folders[folderName]?.length > 0 ? '<p style="color:#ff9800;">This folder contains notes!<br>They will be permanently deleted.</p>' : '',
    [
      { text: 'Cancel', class: 'cancel', action: closePopup },
      { text: 'Delete', class: 'danger', action: () => {
        delete folders[folderName];
        save();
        if (current === folderName) select(null);
        else renderFolders();
      }}
    ]
  );
}

function addNote() {
  const txt = input.value.trim();
  if (!txt || !current || current === 'important') return;
  folders[current].push({ type: 'text', content: txt, important: false });
  input.value = '';
  input.style.height = 'auto';
  save();
  renderNotes(current);
}

function attach(e) {
  const file = e.target.files[0];
  if (!file || !current || current === 'important') return;
  const r = new FileReader();
  r.onload = ev => {
    folders[current].push({ type: 'image', content: ev.target.result, important: false });
    save();
    renderNotes(current);
  };
  r.readAsDataURL(file);
}

function showNoteContext(e) {
  const m = document.getElementById('noteContextMenu');
  m.style.left = Math.min(e.pageX, window.innerWidth - 160) + 'px';
  m.style.top  = Math.min(e.pageY, window.innerHeight - 140) + 'px';
  m.style.display = 'block';
}

function showFolderContext(e) {
  const m = document.getElementById('folderContextMenu');
  m.style.left = Math.min(e.pageX, window.innerWidth - 180) + 'px';
  m.style.top  = Math.min(e.pageY, window.innerHeight - 100) + 'px';
  m.style.display = 'block';
}

function hideAllContext() {
  document.getElementById('noteContextMenu').style.display = 'none';
  document.getElementById('folderContextMenu').style.display = 'none';
}

// Context Menu Actions
document.getElementById('editNote').onclick = () => {
  hideAllContext();
  if (!ctxNote) return;
  const {folder, index} = ctxNote;
  const note = folders[folder]?.[index];
  if (!note || note.type === 'image') return alert("Can't edit images");

  showPopup("Edit note", `
    <textarea id="editInput" style="width: 100%;
    min-height: 140px;
    padding: 14px;
    background: rgba(255, 255, 255, 0.1);
    font-size: 17px;
    color: white;
    resize: vertical;
    scrollbar-width: none;
    overflow-y: scroll;
    outline: none;
    border-width: medium;
    border-style: none;
    border-color: currentcolor;
    border-image: none;
    height: 242px;
    border-radius: 14px;">${note.content}</textarea>
  `, [
    { text: 'Cancel', class: 'cancel', action: closePopup },
    { text: 'Save', class: 'confirm', action: () => {
      const newText = document.getElementById('editInput').value.trim();
      if (newText) {
        note.content = newText;
        save();
        if (current === 'important') renderImportantNotes();
        else if (current === folder) renderNotes(folder);
      }
    }}
  ]);
};

document.getElementById('deleteNote').onclick = () => {
  hideAllContext();
  if (!ctxNote) return;
  showPopup("Delete this note permanently?", '', [
    { text: 'Cancel', class: 'cancel', action: closePopup },
    { text: 'Delete', class: 'danger', action: () => {
      const {folder, index} = ctxNote;
      if (folders[folder]) {
        folders[folder].splice(index, 1);
        save();
        if (current === 'important') renderImportantNotes();
        else if (current === folder) renderNotes(folder);
      }
    }}
  ]);
};

document.getElementById('copyNote').onclick = () => {
  hideAllContext();
  if (!ctxNote) return;
  const note = folders[ctxNote.folder]?.[ctxNote.index];
  if (!note || note.type === 'image') return alert("Can't copy image");
  navigator.clipboard.writeText(note.content).then(() => alert("Copied!")).catch(() => alert("Copy failed"));
};

document.getElementById('deleteFolder').onclick = () => {
  hideAllContext();
  if (ctxFolder) deleteFolder(ctxFolder);
};

// Event Listeners
sendBtn.onclick = addNote;
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    addNote();
  }
});

document.getElementById('imageInput').onchange = attach;

document.body.onclick = e => {
  if (!e.target.closest('#noteContextMenu') && 
      !e.target.closest('#folderContextMenu') && 
      !e.target.closest('.popup-box')) {
    hideAllContext();
  }
};

popup.onclick = e => { if (e.target === popup) closePopup(); };

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 180) + 'px';
});

renderFolders();
select(null);
</script>
</body>
</html>
