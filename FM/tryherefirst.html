<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BS&MFI Services</title>
    <link rel="icon" href="mfi.logo.png" />
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Balthazar&family=Della+Respira&family=Hahmlet:wght@100..900&family=Niconne&family=Stalemate&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Oswald|Noto+Sans">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style> @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

    :root {
      --bg-primary: #111920;
      --bg-secondary: #17171c;
      --bg-message: #1c1c24;
      --text-primary: #e0e0e8;
      --text-secondary: #a0a0b0;
      --accent: #0021ff;
      --accent-dark: #0021ff;
      --border: #2a2a35;
    }
* {
            -webkit-tap-highlight-color: transparent;
        }
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    * {
      margin: 0;scrollbar-width: none;
      padding: 0;font-family: "Noto Sans", sans-serif;
      box-sizing: border-box;letter-spacing: 0.3px;
    }

    body {
      
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding:10px;
    }
  
    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    .header {
     padding: 15px 0px;
    text-align: center;
    display: flex;
    justify-content: space-between;
    align-items: center;
    }

    .header h1 {
      font-weight: 100;
    color: #ffffffb0;
    font-size: 15px;
    }

    .search-box {
   display: flex;
    justify-content: center;
    align-items: center;
    }

    #searchInput {
   width: 100%;
    padding: 8px 2px 8px 45px;
    font-size: 17px;
    border-radius: 20px;
    background: #1d2936;
    border: none;
    color: var(--text-primary);
    outline: none;
    transition: all 0.2s;
    }

    #searchInput:focus {
      background: #3a4b5e;
    }
.fixtopsectiob {
      position: sticky;
    top: 0px;
    background: #111920f5;
    backdrop-filter: blur(3px);
    z-index: 1000;
    padding: 5px 0 15px 0;
}
    .search-icon {
position: absolute;
    left: 20px;
    font-size: 13px;
    color: rgb(255 255 255 / 60%);
    display: flex;
    justify-content: center;
    align-items: center;
    }

  .section {
    margin-bottom: 15px;
    position: relative;
    background: #30455d5e;
    border-radius: 20px;
    }

    .section h2 {
     font-size: 15px;
    font-weight: 400;
    color: #00b7ff;
    margin-bottom: 0px;
    padding-left: 20px;
    padding-top: 15px;
    }
a.site-item:hover{
  background-color: #3a4b5e;
}
a.site-item:last-child{
  border-radius: 0 0 20px 20px;
}
   .site-item {
    display: flex;
    align-items: center;
    padding: 10px;
    text-decoration: none;
    color: var(--text-primary);
    transition: background 0.18s;
}

    .letter-icon {
     width: 48px;
    height: 48px;
    margin-right: 7px;
    border-radius: 50%;
    background: var(--accent-dark);
    color: white;
    font-weight: 600;
    font-size: 1.35rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    text-transform: uppercase;
    }

    .site-info {
      flex: 1;
      min-width: 0;
    }

    .site-info h3 {
      font-size: 16px;
      font-weight: 500;
      margin: 0 0 3px 0;
    }

    .site-info p {
      font-size: 13px;
    color: #ffffff82;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 300;
    width: 75%;
    }
.section:first-child {
    border: none;
}

    .no-results {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-secondary);
      font-size: 1.1rem;
      display: none;
    }
footer{
  text-align: center;
    font-size: 12px;
    color: #ffffff85;
    background: #111920;
    position: sticky;
    bottom: 0px;
    padding: 5px 0px;
      }
       .close-btn {
          color: white;
    font-size: 16px;
    cursor: pointer;
    z-index: 11;
    border-radius: 8px;
    outline: none;
    border: none;
    display: flex;
    justify-content: center;
    align-items: center;
    background: transparent;
    color: #00aaff;
    padding: 0;
        }
  </style>
</head>
<body>
<div class="container">

  <div class="fixtopsectiob">
    <div class="header">
      <button onclick="closeModal()" class="close-btn">
                      <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M560-267.69 347.69-480 560-692.31 588.31-664l-184 184 184 184L560-267.69Z"/></svg> Back
                  </button>
      <h1>BS&MFI Services</h1>
    </div>

    <div class="search-box">
      <span class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
      <input type="text" id="searchInput" placeholder="Search here..." autocomplete="off"/>
    </div>
  </div>

  <div id="sectionsContainer"></div>

  <div class="no-results" id="noResults">
    Nothing found
  </div>
  <footer>
    © BS&MFI. All rights reserved.
  </footer>
</div>

<script>
const siteGroups = [
    {
    heading: "Return Management",
    sites: [
      { name: "BS&MFI Solutions",      desc: "Return date extender",       url: "https://blackswan19.github.io/golden/FM/solution",      icon: "fab fa-youtube"       },
]
},
{
  heading: "New in & issue",
  sites: [
    { name: "Enterance Form", desc: "New members form",       url: "https://mfi0212.github.io/MFI/entrysheet", icon: "fas fa-code"         },
    { name: "Helper",      desc: "I have issue form",           url: "https://mfi0212.github.io/MFI/abt.hlp",      icon: "fas fa-film"          },
  ]
},
{
  heading: "Offer & Earns",
  sites: [
    { name: "BsGames",       desc: "Exclusive rewards and benefits for BS&MFI members.",          url: "https://blackswan19.github.io/golden/Bs%20Games/bsgames",       icon: "fab fa-reddit"        },
    { name: "Stars",       desc: "Interest reducer.",          url: "https://blackswan19.github.io/golden/FM/starspage",       icon: "fab fa-reddit"        },
  ]
},
  
  {
    heading: "Services",
    sites: [
      { name: "All Services", desc: "All service from BS&MFI",       url: "https://blackswan19.github.io/BS/bslends", icon: "fas fa-code"         },
      { name: "BsLends", desc: "A service from BS&MFI",       url: "https://mfi0212.github.io/MFI/rate", icon: "fas fa-code"         },
      { name: "Myootive", desc: "A service from BS&MFI",       url: "https://blackswan19.github.io/golden/FM/themain", icon: "fas fa-code"         },
    ]
  },
   {
    heading: "Collaboration",
    sites: [
      { name: "BsPsgenerater", desc: "Password generator",       url: "https://blackswan19.github.io/Educate/password", icon: "fas fa-code"         },
      { name: "BsReminder", desc: "Date wise notes",       url: "https://blackswan19.github.io/bscrop/reminder", icon: "fas fa-code"         },
      { name: "BsBookpad", desc: "Download the notes",       url: "https://blackswan19.github.io/Educate/bookpad", icon: "fas fa-code"         },
      { name: "BsAdstoper", desc: "Ad blocker",       url: "https://blackswan19.github.io/Educate/stoper", icon: "fas fa-code"         },
    ]
  }
];
// document.addEventListener('contextmenu', e => e.preventDefault());
function getColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) {
    hash = name.charCodeAt(i) + ((hash << 5) - hash);
  }
  const hue = Math.abs(hash) % 360;
  return `hsl(${hue}, 75%, 58%)`;
}

function getInitial(name) {
  return name.trim()[0]?.toUpperCase() || "?";
}

function renderAll() {
  const container = document.getElementById("sectionsContainer");
  container.innerHTML = "";

  siteGroups.forEach(group => {
    const section = document.createElement("div");
    section.className = "section";

    const h2 = document.createElement("h2");
    h2.textContent = group.heading;
    section.appendChild(h2);

    const list = document.createElement("div");
    list.className = "site-list";

    group.sites.forEach(site => {
      const a = document.createElement("a");
      a.href = site.url;
      a.target = "_parent";
      a.className = "site-item";

      const bg = getColor(site.name);
      const initial = getInitial(site.name);

      a.innerHTML = `
        <div class="letter-icon" style="background: ${bg};">${initial}</div>
        <div class="site-info">
          <h3>${site.name}</h3>
          <p>${site.desc}</p>
        </div>
      `;

      list.appendChild(a);
    });

    section.appendChild(list);
    container.appendChild(section);
  });
}

function renderFiltered(query = "") {
  const q = query.toLowerCase().trim();
  const container = document.getElementById("sectionsContainer");
  const noResults = document.getElementById("noResults");

  container.innerHTML = "";

  if (!q) {
    renderAll();
    noResults.style.display = "none";
    return;
  }

  let found = false;

  siteGroups.forEach(group => {
    const matches = group.sites.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.desc.toLowerCase().includes(q) ||
      s.url.toLowerCase().includes(q)
    );

    if (!matches.length) return;

    found = true;

    const section = document.createElement("div");
    section.className = "section";

    const h2 = document.createElement("h2");
    h2.textContent = group.heading;
    section.appendChild(h2);

    const list = document.createElement("div");
    list.className = "site-list";

    matches.forEach(site => {
      const a = document.createElement("a");
      a.href = site.url;
      a.target = "_parent";
      a.className = "site-item";

      const bg = getColor(site.name);
      const initial = getInitial(site.name);

      a.innerHTML = `
        <div class="letter-icon" style="background: ${bg};">${initial}</div>
        <div class="site-info">
          <h3>${site.name}</h3>
          <p>${site.desc}</p>
        </div>
      `;

      list.appendChild(a);
    });

    section.appendChild(list);
    container.appendChild(section);
  });

  noResults.style.display = found ? "none" : "block";
}

renderAll();

document.getElementById("searchInput").addEventListener("input", e => {
  renderFiltered(e.target.value);
});
</script>

</body>
</html>
