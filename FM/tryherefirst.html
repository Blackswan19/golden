<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BsLinksaver</title>
    <link rel="icon" type="image/x-icon" href="https://i.ibb.co/0DBHQHG/linksave.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

* {
	-webkit-tap-highlight-color: transparent;
	margin: 0;
	padding: 0;
	font-family: 'Poppins', sans-serif;
    scrollbar-color: rgba(255, 255, 255, 0.648) transparent;
}
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --accent: #0000ff;
        }

        body {
            background-color: var(--bg);
    color: #f5f5f7;
    min-height: 100vh;
    display: flex;overflow: hidden;
    justify-content: center;
    align-items: center;
    line-height: 1.5;
    user-select: none;
    height: 100vh;
        }

        .container {
                padding: 10px;
    max-width: 920px;
    width: 100%;
    height: 100vh;
    display: flex;
    overflow: hidden;
    align-items: center;
    flex-direction: column;
    gap: 10px;
    /* justify-content: space-between; */
        }

.search-section h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.8px;
    color: #fff;
    text-align: center;
}

        .search-section {
        display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    margin: 15px 0 0 0;
        }

        input[type="text"], input[type="url"], input[type="search"], select {
transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    flex: 1;
    min-width: 260px;
    outline: none;
    width: 100%;
    padding: 10px 0;
    background: #ffffffe0;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    color: black;
    text-align: center;
        }
input#searchInput {
padding: 10px;
    min-width: 100px;
    border-radius: 999px;
    background: #000000;
    color: #ffffffcf;
    text-align: center;
}
        button {
            padding: 12px 24px;
            background-color: #2c2c2e;
            border: none;
            color: #f5f5f7;
            cursor: pointer;
            font-weight: 600;
            border-radius: 9999px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 15px;
        }

        button:hover {
            background-color: #3a3a3c;
        }

        .create-btn {
        background-color: var(--accent);
    color: white;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px;
    font-weight: 300;
    gap: 2px;
    height: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
        }

        .create-btn:hover {
            background-color: var(--accent);
        }

        /* Filter Section */
        .filter-section {
display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 15px;
    scrollbar-width: none;
    width: 100%;
    justify-content: start;
    align-items: center;
        }

        .filter-section::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
          flex-shrink: 0;
    padding: 6px 10px;
    border-radius: 999px;
    background: #ffffff33;
    border: none;
    color: white;
    font-size: 17px;
    cursor: pointer;
    transition: all 0.18s;
    text-overflow: ellipsis;
    max-width: 400px;
    overflow: hidden;
    white-space: nowrap;
    display: flex;
    justify-content: flex-start;
    align-items: center;
    font-weight: 300;
    backdrop-filter: blur(20px);
    gap: 15px;
        }

        .filter-btn.active {
            background-color: blue;
            color: white;
        }

        .add-category-btn {
flex-shrink: 0;
    padding: 10px 10px 10px 30px;
    background: linear-gradient(269deg, #4f4f4f, #000000);
    color: #ffffff;
    border-radius: 0 100px 100px 0;
    font-size: 15px;
    cursor: pointer;
    white-space: nowrap;
    border: none;
    backdrop-filter: blur(11px);
    display: flex;
    justify-content: center;
    align-items: center;
    position: sticky;
    left: -25px;
    z-index: 10;
        }

        /* Link List */
        .link-list {
background-color: #191919;
    border-radius: 30px;
    overflow-y: auto;
    scrollbar-width: none;
    scrollbar-color: gray transparent;
    height: fit-content;
    width: 100%;
    max-height: 75vh;
        }

        .link-list::-webkit-scrollbar {
            width: 6px;
        }

        .link-list::-webkit-scrollbar-thumb {
            background: #48484a;
            border-radius: 20px;
        }

        .table-header {
padding: 10px;
    font-size: 12px;
    font-weight: 600;
    color: #8e8e93;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    position: sticky;
    top: 0px;
    background-color: #191919;
    border-radius: 0;
    display: flex;
    gap: 20px;
    justify-content: center;
    align-items: center;
    z-index: 100000000;
    border-bottom: solid 1px #333333;
        }

        .link-item {
padding: 2px;
    border-radius: 999px;
    transition: all 0.3s ease;
    justify-content: space-between;
    display: flex;
    align-items: center;
    opacity: 60%;
    margin: 10px;
        }
.title-container a {
color: rgb(255, 255, 255);
    text-decoration: none;
    font-size: 15px;
}
        .link-item:hover{
            opacity: 100%;
            background-color: rgb(255 255 255 / 35%);
        }

        .title-container {
    display: flex;
    align-items: center;
    gap: 5px;
        }
        .view-title-btn {
background: none;
    border: none;
    cursor: pointer;
    padding: 5px;
    border-radius: 50%;
    transition: all 0.2s;
    width: 30px;
    height: 30px;
    display: flex;
    justify-content: center;
    align-items: center;
        }

        .view-title-btn:hover {
            background-color: #000000;
            color: #fff;
        }
        .link-item:last-child{
            border-bottom: 0.5px solid rgba(255, 255, 255, 0);
        }
        .link-item div:last-child {
font-size: 12px;
    text-align: right;
        }

        /* Modals */
        .modal, .create-modal, .edit-modal, .category-modal, .title-modal, .edit-category-modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgb(0 0 0 / 51%);
    justify-content: center;
    align-items: center;
        }

        .modal-content, .create-modal-content, .edit-modal-content, 
        .category-modal-content, .title-modal-content, .edit-category-modal-content {
padding: 15px;
    border-radius: 30px;
    width: 85%;
    max-width: 350px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 15px;
    transition: background 0.4s ease;
    box-shadow: 0px 0px 8px rgb(0 0 0 / 21%);
    background: rgb(37 37 37);
    backdrop-filter: blur(30px);
    font-weight: 200;
    border: 0.5px solid rgba(255, 255, 255, 0.1);
        }
p#titleModalMessage {
    font-size: 16px;
    text-align: center;
    width: 100%;
    white-space: nowrap;
    overflow-y: auto;
    scrollbar-width: thin;
    padding: 10px;
}
.title-modal-content h2 {
    font-weight: 600;
    font-size: 20px;
}
        .modal-content h2, .create-modal-content h2, .edit-modal-content h2 {
            font-size: 22px;
            font-weight: 600;
            text-align: center;
        }.form-group {
    width: 100%;
}
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #a1a1a6;
        }

        .wtd-options {
            display: flex;
    gap: 12px;
    width: 100%;
        }
.category-modal-content h2 {
    font-weight: 500;
    font-size: 20px;
}
        .close-btn, .save-btn {
flex: 1;
    color: white;
    padding: 10px;
    border-radius: 14px;
    border: none;
    width: 100%;
    font-size: 15px;
    cursor: pointer;
    min-width: 100px;
    font-weight: 400;
        }

        .save-btn {
            background-color: var(--accent);
            color: white;
        }

        .close-btn {
            background-color: #3a3a3c;
        }

.fa-solid, .fas {
        font-weight: 900;
    font-size: 15px;
}
        .context-menu, .category-context-menu {
display: none;
    position: absolute;
    background-color: #444444;
    border-radius: 15px;
    box-shadow: 0 0 14px rgba(0, 0, 0, 0.669);
    z-index: 100000001;
    min-width: fit-content;
    padding: 2px;
        }

        .context-menu-item, .category-context-menu-item{
padding: 5px 10px;
    color: #ffffffd4;
    cursor: pointer;
    border-radius: 14px;
    display: flex;
    align-items: center;
    gap: 5px;font-weight: 300;
    font-size: 15px;
    justify-content: flex-start;
        }

        .context-menu-item:hover, .category-context-menu-item:hover {
            background-color: rgb(126, 126, 126);
        }

        .context-menu-item.delete:hover, .category-context-menu-item.delete:hover{
            background-color: rgb(105, 0, 0);
        }

        @media (max-width: 480px) {
            h1 { font-size: 24px; }
          }
    </style>
</head>
<body>
    <div class="container">
        <div class="search-section">
            <h1>BsLinksaver</h1>
            <button class="create-btn" onclick="openCreateModal()">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M663.08-289.92h-86.93q-12.77 0-22.38-9.75-9.62-9.75-9.62-23.25 0-13.77 9.25-23.39 9.25-9.61 23.75-9.61h85.93v-85.93q0-13.5 9.75-23.25 9.76-9.75 23.27-9.75 13.52 0 23.25 9.75t9.73 23.25v85.93H815q13.5 0 23.25 9.75 9.75 9.76 9.75 23.27 0 13.52-9.75 23.25T815-289.92h-85.92V-204q0 13.5-9.76 23.25T696.05-171q-13.51 0-23.24-9.75-9.73-9.75-9.73-23.25v-85.92Zm-263.46-1H277.08q-78.68 0-133.88-55.19Q88-401.3 88-479.96t55.2-133.89q55.2-55.23 133.88-55.23h122.54q12.76 0 22.88 10.12 10.12 10.11 10.12 23.27 0 14.15-10.12 23.38-10.12 9.23-22.88 9.23H276.99q-50.68 0-86.84 36.16Q154-530.77 154-480t36.15 86.92q36.16 36.16 86.84 36.16h122.63q12.76 0 22.88 10.11 10.12 10.12 10.12 23.27 0 14.16-10.12 23.39t-22.88 9.23ZM355-448q-13.5 0-23.25-9.76T322-481.03q0-13.51 9.75-23.24Q341.5-514 355-514h212q13.5 0 23.25 9.76t9.75 23.27q0 13.51-9.75 23.24Q580.5-448 567-448H355Zm517-32h-66q0-50.77-36.15-86.92-36.16-36.16-86.83-36.16h-97.64q-12.76 0-22.38-9.25t-9.62-23.75q0-12.77 9.25-22.88 9.25-10.12 23.75-10.12h96.54q78.68 0 133.88 55.2Q872-558.68 872-480Z"/></svg>
                Add link
            </button>
        </div>
         <div class="filter-section" id="filterSection">
            <button class="filter-btn add-category-btn" onclick="openCategoryModal()">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M458.62-148.63Q450-157.25 450-170v-280H170q-12.75 0-21.37-8.63-8.63-8.63-8.63-21.38 0-12.76 8.63-21.37Q157.25-510 170-510h280v-280q0-12.75 8.63-21.37 8.63-8.63 21.38-8.63 12.76 0 21.37 8.63Q510-802.75 510-790v280h280q12.75 0 21.37 8.63 8.63 8.63 8.63 21.38 0 12.76-8.63 21.37Q802.75-450 790-450H510v280q0 12.75-8.63 21.37-8.63 8.63-21.38 8.63-12.76 0-21.37-8.63Z"/></svg>
            </button>
            <button type="button" class="filter-btn active" data-filter="all">All</button>
        </div>
        <div class="link-list" id="linkList">
            <div class="table-header">
                <input type="search" id="searchInput" placeholder="Search" oninput="searchLinks()">
                <!-- <div>Date Added</div> -->
            </div>
            <div id="allLinks"></div>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <p id="modalMessage"></p>
            <button class="close-btn" onclick="closeModal()">OK</button>
        </div>
    </div>

    <div id="createModal" class="create-modal">
        <div class="create-modal-content">
            <h2>New Link</h2>
            <div class="form-group">
                <input type="text" id="createTitleInput" placeholder="Enter title">
            </div>
            <div class="form-group">
                <input type="url" id="createUrlInput" placeholder="Paste URL">
            </div>
            <div class="form-group">
                <select id="createCategoryInput"></select>
            </div>
            <div class="wtd-options">
                <button class="save-btn" onclick="saveLink()">Save</button>
                <button class="close-btn" onclick="closeCreateModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div id="editModal" class="edit-modal">
        <div class="edit-modal-content">
            <h2>Edit Link</h2>
            <div class="form-group">
                <label for="editTitleInput">Title</label>
                <input type="text" id="editTitleInput">
            </div>
            <div class="form-group">
                <label for="editUrlInput">Link</label>
                <input type="url" id="editUrlInput">
            </div>
            <div class="form-group">
                <label for="editCategoryInput">Category</label>
                <select id="editCategoryInput"></select>
            </div>
            <div class="wtd-options">
                <button class="save-btn" onclick="saveEditedLink()">Save</button>
                <button class="close-btn" onclick="closeEditModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div id="categoryModal" class="category-modal">
        <div class="category-modal-content">
            <h2>New Category</h2>
            <div class="form-group">
                <input type="text" id="categoryInput" placeholder="Category Name">
            </div>
            <div class="wtd-options">
                <button class="save-btn" onclick="saveCategory()">Add</button>
                <button class="close-btn" onclick="closeCategoryModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div id="editCategoryModal" class="edit-category-modal">
        <div class="edit-category-modal-content">
            <h2>Edit Category</h2>
            <div class="form-group">
                <input type="text" id="editCategoryInput">
            </div>
            <div class="wtd-options">
                <button class="save-btn" onclick="saveEditedCategory()">Save</button>
                <button class="close-btn" onclick="closeEditCategoryModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div id="titleModal" class="title-modal">
        <div class="title-modal-content">
            <h2>Full Title</h2>
            <p id="titleModalMessage"></p>
            <button class="close-btn" onclick="closeTitleModal()">OK</button>
        </div>
    </div>

    <!-- Context Menus -->
    <div id="contextMenu" class="context-menu">

        <div class="context-menu-item" onclick="openEditModalFromContext()"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M200-200h50.46l409.46-409.46-50.46-50.46L200-250.46V-200Zm-23.84 60q-15.37 0-25.76-10.4-10.4-10.39-10.4-25.76v-69.3q0-14.63 5.62-27.89 5.61-13.26 15.46-23.11l506.54-506.31q9.07-8.24 20.03-12.73 10.97-4.5 23-4.5t23.3 4.27q11.28 4.27 19.97 13.58l48.85 49.46q9.31 8.69 13.27 20 3.96 11.31 3.96 22.62 0 12.07-4.12 23.03-4.12 10.97-13.11 20.04L296.46-161.08q-9.85 9.85-23.11 15.46-13.26 5.62-27.89 5.62h-69.3Zm584.22-570.15-50.23-50.23 50.23 50.23Zm-126.13 75.9-24.79-25.67 50.46 50.46-25.67-24.79Z"/></svg> Edit Now</div>

    </div>

    <div id="categoryContextMenu" class="category-context-menu">
        <div class="category-context-menu-item" onclick="openEditCategoryModalFromContext()"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M200-200h50.46l409.46-409.46-50.46-50.46L200-250.46V-200Zm-23.84 60q-15.37 0-25.76-10.4-10.4-10.39-10.4-25.76v-69.3q0-14.63 5.62-27.89 5.61-13.26 15.46-23.11l506.54-506.31q9.07-8.24 20.03-12.73 10.97-4.5 23-4.5t23.3 4.27q11.28 4.27 19.97 13.58l48.85 49.46q9.31 8.69 13.27 20 3.96 11.31 3.96 22.62 0 12.07-4.12 23.03-4.12 10.97-13.11 20.04L296.46-161.08q-9.85 9.85-23.11 15.46-13.26 5.62-27.89 5.62h-69.3Zm584.22-570.15-50.23-50.23 50.23 50.23Zm-126.13 75.9-24.79-25.67 50.46 50.46-25.67-24.79Z"/></svg> Edit Now</div>
        <div class="category-context-menu-item delete" onclick="deleteCategoryFromContext()"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M292.31-140q-29.83 0-51.07-21.24Q220-182.48 220-212.31V-720h-10q-12.75 0-21.37-8.63-8.63-8.63-8.63-21.38 0-12.76 8.63-21.37Q197.25-780 210-780h150q0-14.69 10.35-25.04 10.34-10.34 25.03-10.34h169.24q14.69 0 25.03 10.34Q600-794.69 600-780h150q12.75 0 21.37 8.63 8.63 8.63 8.63 21.38 0 12.76-8.63 21.37Q762.75-720 750-720h-10v507.69q0 29.83-21.24 51.07Q697.52-140 667.69-140H292.31ZM680-720H280v507.69q0 5.39 3.46 8.85t8.85 3.46h375.38q5.39 0 8.85-3.46t3.46-8.85V-720ZM427.54-288.62q8.61-8.63 8.61-21.38v-300q0-12.75-8.63-21.38-8.62-8.62-21.38-8.62-12.75 0-21.37 8.62-8.61 8.63-8.61 21.38v300q0 12.75 8.62 21.38 8.63 8.62 21.39 8.62 12.75 0 21.37-8.62Zm147.69 0q8.61-8.63 8.61-21.38v-300q0-12.75-8.62-21.38-8.63-8.62-21.39-8.62-12.75 0-21.37 8.62-8.61 8.63-8.61 21.38v300q0 12.75 8.63 21.38 8.62 8.62 21.38 8.62 12.75 0 21.37-8.62ZM280-720v520-520Z"/></svg>  Delete Now</div>
    </div>

    <script>
// document.addEventListener('contextmenu', e => e.preventDefault());
        let activeFilter = 'all';
        let categories = ['all'];
        let editIndex = -1;
        let contextIndex = -1;
        let categoryContextIndex = -1;
        const TITLE_MAX_LENGTH = 20;

        window.onload = function() {
            loadCategories();
            loadLinks();
            setupFilterButtons();
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.link-item') && !e.target.closest('.context-menu')) hideContextMenu();
                if (!e.target.closest('.filter-btn') && !e.target.closest('.category-context-menu')) hideCategoryContextMenu();
            });
        };

        function setupFilterButtons() {
            const buttons = document.querySelectorAll('.filter-btn:not(.add-category-btn):not(.category-ellipsis)');
            buttons.forEach(button => {
                button.onclick = () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    button.classList.add('active');
                    activeFilter = button.dataset.filter;
                    loadLinks();
                };
            });
        }

        function updateFilterButtons() {
            const filterSection = document.getElementById('filterSection');
            filterSection.innerHTML = `
                <button class="filter-btn add-category-btn" onclick="openCategoryModal()"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M458.62-148.63Q450-157.25 450-170v-280H170q-12.75 0-21.37-8.63-8.63-8.63-8.63-21.38 0-12.76 8.63-21.37Q157.25-510 170-510h280v-280q0-12.75 8.63-21.37 8.63-8.63 21.38-8.63 12.76 0 21.37 8.63Q510-802.75 510-790v280h280q12.75 0 21.37 8.63 8.63 8.63 8.63 21.38 0 12.76-8.63 21.37Q802.75-450 790-450H510v280q0 12.75-8.63 21.37-8.63 8.63-21.38 8.63-12.76 0-21.37-8.63Z"/></svg></button>
                ${categories.map((cat, idx) => `
                    <button type="button" class="filter-btn${cat === activeFilter ? ' active' : ''}" data-filter="${cat}">
                        ${cat.charAt(0).toUpperCase() + cat.slice(1)}
                        ${cat !== 'all' ? `<i class="fa-solid fa-ellipsis-vertical category-ellipsis" onclick="showCategoryContextMenu(event, ${idx})"></i>` : ''}
                    </button>
                `).join('')}
            `;
            setupFilterButtons();
        }
        function showCategoryContextMenu(event, index) {
            event.stopPropagation();
            hideCategoryContextMenu();
            const menu = document.getElementById('categoryContextMenu');
            categoryContextIndex = index;
            menu.style.display = 'block';
            menu.style.left = `${event.pageX}px`;
            menu.style.top = `${event.pageY}px`;
        }

        function hideCategoryContextMenu() {
            document.getElementById('categoryContextMenu').style.display = 'none';
            categoryContextIndex = -1;
        }

        function openEditCategoryModalFromContext() {
            if (categoryContextIndex === -1) return;
            const cat = categories[categoryContextIndex];
            document.getElementById('editCategoryInput').value = cat;
            document.getElementById('editCategoryModal').style.display = 'flex';
            hideCategoryContextMenu();
        }

        function closeEditCategoryModal() {
            document.getElementById('editCategoryModal').style.display = 'none';
        }

        function saveEditedCategory() {
            const oldCat = categories[categoryContextIndex];
            const newCat = document.getElementById('editCategoryInput').value.trim().toLowerCase();
            if (!newCat || newCat === 'all' || categories.includes(newCat)) {
                showModal('Invalid or duplicate category name.');
                return;
            }
            categories[categoryContextIndex] = newCat;
            localStorage.setItem('linkCategories', JSON.stringify(categories));
            const links = JSON.parse(localStorage.getItem('youtubeLinks')) || [];
            links.forEach(link => {
                if (link.category === oldCat) link.category = newCat;
            });
            localStorage.setItem('youtubeLinks', JSON.stringify(links));
            updateFilterButtons();
            loadLinks();
            closeEditCategoryModal();
            showModal('Category updated!');
        }

        function deleteCategoryFromContext() {
            if (categoryContextIndex === -1 || categories[categoryContextIndex] === 'all') return;
            const cat = categories[categoryContextIndex];
            if (confirm(`Delete category "${cat}"? Links will be moved to "All".`)) {
                const links = JSON.parse(localStorage.getItem('youtubeLinks')) || [];
                links.forEach(link => {
                    if (link.category === cat) link.category = 'all';
                });
                localStorage.setItem('youtubeLinks', JSON.stringify(links));
                categories.splice(categoryContextIndex, 1);
                localStorage.setItem('linkCategories', JSON.stringify(categories));
                updateFilterButtons();
                loadLinks();
                showModal('Category deleted.');
            }
            hideCategoryContextMenu();
        }

        function openCreateModal() {
            const select = document.getElementById('createCategoryInput');
            select.innerHTML = categories.map(cat => `<option value="${cat}">${cat.charAt(0).toUpperCase() + cat.slice(1)}</option>`).join('');
            document.getElementById('createModal').style.display = 'flex';
            document.getElementById('createTitleInput').value = '';
            document.getElementById('createUrlInput').value = '';
            document.getElementById('createCategoryInput').value = 'all';
        }

        function closeCreateModal() { document.getElementById('createModal').style.display = 'none'; }

        function openEditModal(index) {
            const links = JSON.parse(localStorage.getItem('youtubeLinks')) || [];
            const link = links[index];
            const select = document.getElementById('editCategoryInput');
            select.innerHTML = categories.map(cat => `<option value="${cat}">${cat.charAt(0).toUpperCase() + cat.slice(1)}</option>`).join('');
            document.getElementById('editTitleInput').value = link.title;
            document.getElementById('editUrlInput').value = link.url;
            document.getElementById('editCategoryInput').value = link.category;
            editIndex = index;
            document.getElementById('editModal').style.display = 'flex';
        }

        function openEditModalFromContext() {
            if (contextIndex !== -1) openEditModal(contextIndex);
            hideContextMenu();
        }

        function closeEditModal() { 
            document.getElementById('editModal').style.display = 'none'; 
            editIndex = -1; 
        }

        function openCategoryModal() {
            document.getElementById('categoryModal').style.display = 'flex';
            document.getElementById('categoryInput').value = '';
        }

        function closeCategoryModal() { document.getElementById('categoryModal').style.display = 'none'; }

        function openTitleModal(title) {
            document.getElementById('titleModalMessage').innerText = title;
            document.getElementById('titleModal').style.display = 'flex';
        }

        function closeTitleModal() { document.getElementById('titleModal').style.display = 'none'; }

        function showModal(message) {
            document.getElementById('modalMessage').innerText = message;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function saveCategory() {
            const category = document.getElementById('categoryInput').value.toLowerCase().trim();
            if (category && !categories.includes(category) && category !== 'all') {
                categories.push(category);
                localStorage.setItem('linkCategories', JSON.stringify(categories));
                updateFilterButtons();
                closeCategoryModal();
                showModal('Category added!');
            } else {
                showModal('Enter a unique category name.');
            }
        }

        function saveLink() {
            const title = document.getElementById('createTitleInput').value.trim();
            const url = document.getElementById('createUrlInput').value.trim();
            const category = document.getElementById('createCategoryInput').value;
            if (title && url) {
                const links = JSON.parse(localStorage.getItem('youtubeLinks')) || [];
                links.unshift({ title, url, category, dateAdded: new Date().toISOString() });
                localStorage.setItem('youtubeLinks', JSON.stringify(links));
                loadLinks();
                closeCreateModal();
                showModal('Link added!');
            } else {
                showModal('Enter both title and link.');
            }
        }

        function saveEditedLink() {
            const title = document.getElementById('editTitleInput').value.trim();
            const url = document.getElementById('editUrlInput').value.trim();
            const category = document.getElementById('editCategoryInput').value;
            if (title && url && editIndex !== -1) {
                const links = JSON.parse(localStorage.getItem('youtubeLinks')) || [];
                links[editIndex] = { title, url, category, dateAdded: links[editIndex].dateAdded };
                localStorage.setItem('youtubeLinks', JSON.stringify(links));
                loadLinks();
                closeEditModal();
                showModal('Link updated!');
            } else {
                showModal('Fill all fields.');
            }
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = Math.abs(now - date) / 1000;
            if (diff < 86400) return 'Today';
            if (diff < 172800) return 'Yesterday';
            if (diff < 604800) return `${Math.floor(diff / 86400)} days ago`;
            return date.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
        }

        function truncateTitle(title) {
            return title.length > TITLE_MAX_LENGTH ? title.substring(0, TITLE_MAX_LENGTH - 3) + '...' : title;
        }

        function displayLink(link, index) {
            const container = document.getElementById('allLinks');
            const linkItem = document.createElement('div');
            linkItem.className = 'link-item';
            linkItem.dataset.index = index;
            linkItem.oncontextmenu = e => { e.preventDefault(); showContextMenu(e, index); };
            const truncated = truncateTitle(link.title);
            linkItem.innerHTML = `
                <div class="title-container">
                    <button class="view-title-btn" onclick="openTitleModal('${link.title.replace(/'/g, "\\'")}')"><i class="fa-solid fa-eye"></i></button>
                    <a href="${link.url}" target="_self">${truncated} <span style=" font-size:13px;color: #00eaff;
    font-weight: 500;">(${link.category})</span></a>
                </div>
                <div>${formatDate(link.dateAdded)}</div>
            `;
            container.appendChild(linkItem);
        }

        function showContextMenu(e, index) {
            hideContextMenu();
            const menu = document.getElementById('contextMenu');
            contextIndex = index;
            menu.style.display = 'block';
            menu.style.left = `${e.pageX}px`;
            menu.style.top = `${e.pageY}px`;
        }

        function hideContextMenu() {
            document.getElementById('contextMenu').style.display = 'none';
            contextIndex = -1;
        }

        function copyLinkFromContext() {
            if (contextIndex === -1) return;
            const links = JSON.parse(localStorage.getItem('youtubeLinks')) || [];
            navigator.clipboard.writeText(links[contextIndex].url).then(() => {
                showModal('Link copied!');
                hideContextMenu();
            });
        }

        function deleteLinkFromContext() {
            if (contextIndex === -1) return;
            const links = JSON.parse(localStorage.getItem('youtubeLinks')) || [];
            links.splice(contextIndex, 1);
            localStorage.setItem('youtubeLinks', JSON.stringify(links));
            loadLinks();
            showModal('Link deleted.');
            hideContextMenu();
        }

        function loadCategories() {
            const stored = localStorage.getItem('linkCategories');
            if (stored) {
                categories = JSON.parse(stored);
                if (!categories.includes('all')) categories.unshift('all');
            } else {
                categories = ['all'];
            }
            updateFilterButtons();
        }

        function loadLinks() {
            const links = JSON.parse(localStorage.getItem('youtubeLinks')) || [];
            const container = document.getElementById('allLinks');
            container.innerHTML = '';
            const filtered = activeFilter === 'all' ? links : links.filter(l => l.category === activeFilter);
            filtered.forEach((link, i) => {
                const globalIndex = links.indexOf(link);
                displayLink(link, globalIndex);
            });
        }

        function searchLinks() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const links = JSON.parse(localStorage.getItem('youtubeLinks')) || [];
            const container = document.getElementById('allLinks');
            container.innerHTML = '';
            const filtered = links.filter(l =>
                l.title.toLowerCase().includes(query) &&
                (activeFilter === 'all' || l.category === activeFilter)
            );
            filtered.forEach((link, i) => {
                const globalIndex = links.indexOf(link);
                displayLink(link, globalIndex);
            });
        }
    </script>
</body>
</html>
