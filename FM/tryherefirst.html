        /* Toolbar */
        .toolbar {
    position: fixed;
    left: 0;
    right: 0;
    z-index: 1000;
    bottom: 0px;
    width: 100%;
    gap: 0;
    padding: 0 10px 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    transition: 0s;
        }
        .maincontentsection {
        border-top: 1px solid rgba(255, 255, 255, 0.215);
    border-bottom: 1px solid rgba(255, 255, 255, 0.215);
    width: 100%;
    padding: 7px;
    border-radius: 30px;
    backdrop-filter: blur(30px);
    background: rgb(255 255 255 / 10%);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 5px;
    max-width: 550px;
}
.visitsave {
    width: 45px;
    height: 45px;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 50%;
    transition: background 0.4s ease;
    border: 0.5px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0px 0px 8px rgb(0 0 0 / 21%);
    backdrop-filter: blur(30px);
    background: rgb(255 255 255 / 10%);
}
        .toolbar.bottom {
              bottom: auto;
    top: 10px;
    border-bottom: none;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    border-radius: 30px;
    gap: 10px;
    width: 100%;
    left: 50%;
    transform: translate(-50%, 0);
    max-width: 700px;
    transition: 0s;
        }
div#bottomLinksss {
display: flex;
    justify-content: space-between;
    width: 100%;
    align-items: center;
    padding: 0 10px;
}
a {
    display: contents;
}
        .address-bar-container {
           flex: 1;
    max-width: 680px;
    margin: 0 auto;
    background: rgb(255 255 255 / 10%);
    backdrop-filter: blur(30px);
    font-weight: 200;
    border-top: 1px solid rgba(255, 255, 255, 0.215);
    border-bottom: 1px solid rgba(255, 255, 255, 0.215);
    background: rgb(255 255 255 / 10%);
    backdrop-filter: blur(10px);
    border-radius: 999px;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
        }

        #url-bar {
width: 100%;
    height: 45px;
    border-radius: 9999px;
    padding: 0 30px 0 50px;
    color: #fff;
    font-size: 18px;
    outline: none;
    transition: background 0.4s ease;
    font-weight: 200;
    border: none;
    background: transparent;
        }
        #url-bar::placeholder{
            color: rgba(255, 255, 255, 0.648);
        }
        #url-bar:hover {
           background: rgba(255, 255, 255, 0.215);
        }

        .search-icon {
position: absolute;
    left: 5px;
    color: white;
    z-index: 1000;
    width: 35px;
    height: 35px;
    display: flex;
    cursor: pointer;
    justify-content: center;
    align-items: center;
    background: transparent;
        }
.search-icon:hover{
    background: rgba(255, 255, 255, 0.765);
}
        /* Search Suggestions */
        .suggestions {
scrollbar-width: auto;
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    width: 95%;
    max-width: 680px;
    backdrop-filter: blur(30px);
    border-radius: 25px;
    margin-top: 8px;
    margin-bottom: 10px;
    max-height: fit-content;
    overflow-y: auto;
    z-index: 0;
    display: none;
    scrollbar-width: none;
    border-top: 1px solid rgba(255, 255, 255, 0.215);
    border-bottom: 1px solid rgba(255, 255, 255, 0.215);
    background: rgb(255 255 255 / 10%);
    height: 65vh;
        }

        .toolbar.bottom .suggestions {
                bottom: auto;
    top: 100%;    margin: 0;
        }

        .suggestion-item {
padding: 8px 12px 5px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: background 0.4s ease;
    border-bottom: 0.5px solid rgba(255, 255, 255, 0.08);
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:hover {
            background: rgba(255, 255, 255, 0.215);
        }

        .suggestion-text {
            flex: 1;
            font-size: 15px;
        }

        .delete-suggestion {
            color: #000000;
            font-size: 20px;
            font-weight: 100;
            background: red;
            width: 20px;
            height: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
        }

        i.fa-solid.fa-ellipsis-h {
width: 45px;
    height: 45px;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 50%;
    margin: 0 13px;
    transition: background 0.4s ease;
    border: 0.5px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0px 0px 8px rgb(0 0 0 / 21%);
    backdrop-filter: blur(30px);
    background: rgb(255 255 255 / 10%);
        }
        i.fa-solid.fa-ellipsis-h:hover{
            background: #ffffff24;
        }
.cntntcnter{
transition: all 0.4s ease;
    opacity: 0%;
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: start;
    align-items: center;
    flex-direction: column;
}
.cntntcnter:hover{
    opacity: 100%;
}
        .main-content {
height: 100vh;
    background: #0000005e;
    text-align: center;
    padding: 80px 20px;
    position: relative;
    top: 0px;
    display: flex;
    align-items: center;
    flex-direction: column;
        }
        .favorites-grid {
gap: 5px;
    max-width: 820px;
    display: flex;
    justify-content: flex-start;
    align-items: center;
    overflow-y: auto;
    scrollbar-width: none;
    padding: 5px;
    backdrop-filter: blur(30px);
    box-shadow: 0px 0px 8px rgb(0 0 0 / 21%);
    background: rgb(255 255 255 / 10%);
    border-radius: 15px;
    border: 0.5px solid rgba(255, 255, 255, 0.1);
    width: 100%;
        }

        .favorite-item {
           display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    position: relative;
    padding: 5px;
    transition: background 0.4s ease;
    border-radius: 10px;
    color: white;
        }
        .favorite-item:hover{
            background: rgba(255, 255, 255, 0.215);
        }
        .fav-icon {
width: 25px;
    height: 25px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: rgb(0 0 0 / 77%);
    border-radius: 6px;
        }

        .fav-icon img {
            width: 15px;
    height: 15px;
        }
div#bottomLinks a {
    display: contents;
}
        .fav-title {
         font-size: 13px;
    color: #ddd;
    text-align: center;
    max-width: 100px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 300;
    padding: 0 5px;
    text-transform: capitalize;
        }

        .delete-fav {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff0e00;
            color: #000000;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 25px;
            cursor: pointer;
            opacity: 0;
            transition: all 0.2s;
            font-weight: 100;
        }

        .favorite-item:hover .delete-fav {
            opacity: 1;
        }

        /* Bottom Links */
        .bottom-links {
   position: fixed;
    top: 10px;
    left: 50%;
    transition: all 0.4s ease;
    transform: translateX(-50%);
    background: rgb(255 255 255 / 10%);
    backdrop-filter: blur(30px);
    border-radius: 9999px;
    display: flex;
    gap: 5px;
    z-index: 900;
    width: fit-content;
    box-shadow: 0px 0px 8px rgb(0 0 0 / 21%);
    max-width: 300px;
    justify-content: center;
    align-items: center;
    border-top: 1px solid rgba(255, 255, 255, 0.215);
    border-bottom: 1px solid rgba(255, 255, 255, 0.215);
    padding: 2px 18px;
    font-size: 15px;
    font-weight: 500;
        }
.bottom-links svg {
    width: 27px;
    height: 27px;
    fill: white;
}
        .toolbar.bottom + .bottom-links {
            top: auto;
            bottom: 10px;
        }

        .bottom-link {
           color: #ccc;
    padding: 4px 10px;
    border-radius: 9999px;
    transition: 0.2s;
    text-decoration: none;
    display: flex;
    justify-content: center;
    align-items: center;
        }

        .bottom-link:hover {
            background: rgba(255, 255, 255, 0.215);
            color: white;
        }

        /* Settings Menu */
        .settings-menu {
    position: fixed;
        bottom: 65px;
    right: 16px;
    backdrop-filter: blur(30px);
    border-radius: 27px;
    z-index: 2000;
    display: none;
    background: rgb(255 255 255 / 10%);
    border: 0.5px solid rgba(255, 255, 255, 0.1);
    line-height: 20px;
    padding: 10px;
    box-shadow: 0px 0px 8px rgb(0 0 0 / 21%);
        }

        .toolbar.bottom ~ .settings-menu {
            bottom: auto;
            top: 65px;
        }

        .menu-item {
padding: 6px 10px;
    font-size: 14px;
    display: flex;
    align-items: center;
    cursor: pointer;
    justify-content: center;
    border-radius: 9999px;
    margin: 2px;
    transition: background 0.4s ease;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.215);
        }

        /* Popups */
        .popup {
          position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 15px;
    width: 90%;
    max-width: 380px;
    z-index: 3000;

    border-radius: 30px;
    border: 0.5px solid rgba(255, 255, 255, 0.1);
        }

   filter: brightness(1);
}
div#bgGrid div:hover{
    filter: brightness(0.5);
}
        .popup input {
    outline: none;
    width: 100%;
    padding: 10px;
    background: #ffffffe0;

}

position: absolute;

    width: 35px;
    height: 35px;
    display: flex;
    cursor: pointer;
    justify-content: center;
    align-items: center;
    background: transparent;
}

    width: 100%;
    font-size: 15px;
    cursor: pointer;
    min-width: 100px;
    font-weight: 400;">Add</button>
        </div>
    </div>

    <div class="popup" id="bgPopup" style="width:92%; max-width:680px;">
        <div style="font-size:18px; font-weight:600; text-align:center; margin-bottom:16px;">Choose Wallpaper</div>
        <div id="bgGrid" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(130px,1fr)); gap:12px; max-height:420px; overflow-y:auto; padding:8px 0;"></div>
        <button onclick="hideBGPpopup()" style="    margin-top: 16px;
    width: 100%;
    padding: 5px;
    border-radius: 32px;
    background: rgba(255, 255, 255, 0.215);
    color: white;
    border: none;
    font-size: 14px;">Close Now</button>
    </div>

    <script>
        // document.addEventListener('contextmenu', e => e.preventDefault());
        let currentBg = localStorage.getItem('backgroundImage') || localStorage.getItem('bsBackground') || '';
        let currentColor = localStorage.getItem('bsBackgroundColor') || '#0a0f1c';

        function applyBackground() {
            const container = document.getElementById('bgContainer');
            if (currentBg) {
                container.style.backgroundImage = `url('${currentBg}')`;
                container.style.backgroundColor = '';
            } else {
                container.style.backgroundImage = '';
                container.style.backgroundColor = currentColor;
            }
        }

        function updateImageBackground(src) {
            currentBg = src;
            localStorage.setItem('backgroundImage', src);
            localStorage.setItem('bsBackground', src);
            localStorage.removeItem('bsBackgroundColor');
            applyBackground();
        }

        function updateColorBackground(color) {
            currentColor = color;
            currentBg = '';
            localStorage.setItem('bsBackgroundColor', color);
            localStorage.removeItem('backgroundImage');
            localStorage.removeItem('bsBackground');
            applyBackground();
        }

        function removeBackground() {
            if (confirm("Reset background?")) {
                currentBg = '';
                currentColor = '#0a0f1c';
                localStorage.removeItem('backgroundImage');
                localStorage.removeItem('bsBackground');
                localStorage.removeItem('bsBackgroundColor');
                applyBackground();
            }
        }

        function pickColorBackground() {
            const input = document.createElement('input');
            input.type = 'color';
            input.value = currentColor;
            input.onchange = e => updateColorBackground(e.target.value);
            input.click();
            document.getElementById('settingsMenu').style.display = 'none';
        }

        function loadToolbarPosition() {
            const toolbar = document.getElementById('toolbar');
            if (localStorage.getItem('toolbarBottom') === 'true') {
                toolbar.classList.add('bottom');
            }
            updateBottomLinksPosition();
        }

        function toggleToolbarPosition() {
            const toolbar = document.getElementById('toolbar');
            const isBottom = toolbar.classList.toggle('bottom');
            localStorage.setItem('toolbarBottom', isBottom);
            document.getElementById('settingsMenu').style.display = 'none';
            updateBottomLinksPosition();
        }

        function updateBottomLinksPosition() {
            const bottomLinks = document.getElementById('bottomLinks');
            const toolbar = document.getElementById('toolbar');
            if (toolbar.classList.contains('bottom')) {
                bottomLinks.style.top = 'auto';
                bottomLinks.style.bottom = '10px';
            } else {
                bottomLinks.style.top = '10px';
                bottomLinks.style.bottom = 'auto';
            }
        }

        let favorites = JSON.parse(localStorage.getItem('websites') || localStorage.getItem('bsFavorites') || '[]');

        function saveFavorites() {
            localStorage.setItem('websites', JSON.stringify(favorites));
            localStorage.setItem('bsFavorites', JSON.stringify(favorites));
        }

        function renderFavorites() {
            const grid = document.getElementById('favorites-grid');
            grid.innerHTML = favorites.length === 0 
                ? `<div onclick="addNewSite()" style="    color: #ffffff94;
    text-align: center;
    font-size: 15px;
    width: 100%;
    font-weight: 200;
    line-height: 30px;">No Site Saved yet.<br>Click here to save a site..!</div>`
                : '';

            favorites.forEach((fav, index) => {
                const div = document.createElement('div');
                div.className = 'favorite-item';
                const domain = fav.url ? new URL(fav.url).hostname : '';
                div.innerHTML = `
                    <div class="fav-icon">
                        <img src="https://www.google.com/s2/favicons?domain=${domain}" onerror="this.src='https://i.ibb.co/kxgjrZG/sitesaved-BS.png'">
                    </div>
                    <div class="fav-title">${fav.title || domain}</div>
                    <div class="delete-fav" onclick="event.stopImmediatePropagation(); deleteFavorite(${index});">×</div>
                `;
                div.onclick = () => window.open(fav.url, '_self');
                grid.appendChild(div);
            });
        }

        function deleteFavorite(index) {
            if (confirm("Delete this favorite?")) {
                favorites.splice(index, 1);
                saveFavorites();
                renderFavorites();
            }
        }

        function addNewSite() {
            document.getElementById('addSitePopup').style.display = 'block';
            document.getElementById('settingsMenu').style.display = 'none';
        }

        function hideAddPopup() {
            document.getElementById('addSitePopup').style.display = 'none';
        }

        function saveNewSite() {
            const title = document.getElementById('siteTitle').value.trim();
            let url = document.getElementById('siteURL').value.trim();
            if (!title || !url) return alert("Title and URL required");
            if (!url.startsWith('http')) url = 'https://' + url;

            favorites.unshift({ title, url });
            saveFavorites();
            renderFavorites();
            hideAddPopup();
        }

        let storedInputs = JSON.parse(localStorage.getItem('storedInputs') || '[]');

        function saveSearchHistory() {
            localStorage.setItem('storedInputs', JSON.stringify(storedInputs));
        }

        function showSuggestions(value) {
            const suggestionsEl = document.getElementById('suggestions');
            suggestionsEl.innerHTML = '';
            
            const filtered = value ? 
                storedInputs.filter(item => item.toLowerCase().includes(value.toLowerCase())) : 
                [...storedInputs];

            if (filtered.length === 0) {
                suggestionsEl.style.display = 'none';
                return;
            }

            filtered.forEach((suggestion, idx) => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerHTML = `
                    <span class="suggestion-text">${suggestion}</span>
                    <span class="delete-suggestion" onclick="event.stopImmediatePropagation(); deleteSuggestion(${idx})">×</span>
                `;
                div.onclick = () => {
                    document.getElementById('url-bar').value = suggestion;
                    suggestionsEl.style.display = 'none';
                    performSearch(suggestion);
                };
                suggestionsEl.appendChild(div);
            });
            suggestionsEl.style.display = 'block';
        }

        function deleteSuggestion(index) {
            storedInputs.splice(index, 1);
            saveSearchHistory();
            const value = document.getElementById('url-bar').value;
            showSuggestions(value);
        }

        function performSearch(query) {
            if (!storedInputs.includes(query)) {
                storedInputs.unshift(query);
                if (storedInputs.length > 30) storedInputs.pop();
                saveSearchHistory();
            }
            if (query.includes('.') && !query.includes(' ')) {
                window.location.href = query.startsWith('http') ? query : 'https://' + query;
            } else {
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            }
        }

        function toggleSettings() {
            const menu = document.getElementById('settingsMenu');
            const isVisible = menu.style.display === 'block';
            menu.style.display = isVisible ? 'none' : 'block';
        }

        function uploadBackground() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    
    input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;

        if (file.size > 15 * 1024 * 1024) {
            alert("Image is too large. Please choose an image under 15MB.");
            return;
        }

        document.getElementById('settingsMenu').style.display = 'none';

        const originalPlaceholder = document.getElementById('url-bar').placeholder;
        document.getElementById('url-bar').placeholder = "Processing image...";
        
        const reader = new FileReader();
        
        reader.onload = function(ev) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                let width = img.width;
                let height = img.height;
                const maxDim = 1920;
                
                if (width > maxDim || height > maxDim) {
                    if (width > height) {
                        height = Math.round(height * maxDim / width);
                        width = maxDim;
                    } else {
                        width = Math.round(width * maxDim / height);
                        height = maxDim;
                    }
                }
                
                canvas.width = width;
                canvas.height = height;
                ctx.drawImage(img, 0, 0, width, height);
                
                const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.85);
                
                updateImageBackground(compressedDataUrl);
                document.getElementById('url-bar').placeholder = originalPlaceholder;
            };
            
            img.onerror = () => {
                alert("Failed to load image.");
                document.getElementById('url-bar').placeholder = originalPlaceholder;
            };
            
            img.src = ev.target.result;
        };
        
        reader.onerror = () => {
            alert("Error reading file.");
            document.getElementById('url-bar').placeholder = originalPlaceholder;
        };
        
        reader.readAsDataURL(file);
    };
    
    input.click();
}

        const recommendedBGs = [
"backgrounds/1.jpg" ,
"backgrounds/2.jpg" ,
"backgrounds/3.jpg" ,
"backgrounds/4.jpg" ,
"backgrounds/5.jpg" ,
"backgrounds/6.jpg" ,
"backgrounds/7.jpg" ,
"backgrounds/8.jpg" ,
"backgrounds/9.jpg" ,
"backgrounds/10.jpg",
"backgrounds/11.jpg",
"backgrounds/12.jpg",
        ];

        function showRecommendedBGs() {
            const grid = document.getElementById('bgGrid');
            grid.innerHTML = '';
            recommendedBGs.forEach(src => {
                const div = document.createElement('div');
                div.style.height = '118px';
                div.style.borderRadius = '12px';
                div.style.background = `url('${src}') center/cover`;
                div.style.cursor = 'pointer';
                div.onclick = () => { updateImageBackground(src); hideBGPpopup(); };
                grid.appendChild(div);
            });
            document.getElementById('bgPopup').style.display = 'block';
            document.getElementById('settingsMenu').style.display = 'none';
        }

        function hideBGPpopup() {
            document.getElementById('bgPopup').style.display = 'none';
        }

        const urlBar = document.getElementById('url-bar');
        const suggestionsEl = document.getElementById('suggestions');
         const searchIcon = document.getElementById('searchIcon');

        searchIcon.addEventListener('click', () => {
            const query = urlBar.value.trim();
            if (query) performSearch(query);
            else urlBar.focus();
        });
        
        urlBar.addEventListener('input', () => {
            showSuggestions(urlBar.value.trim());
        });

        urlBar.addEventListener('focus', () => {
            showSuggestions(urlBar.value.trim());
        });

        urlBar.addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                const value = urlBar.value.trim();
                if (value) performSearch(value);
            }
        });

        document.addEventListener('click', e => {
            if (!e.target.closest('.address-bar-container')) {
                suggestionsEl.style.display = 'none';
            }
            if (!e.target.closest('#settingsMenu') && !e.target.closest('.fa-grip-lines')) {
                document.getElementById('settingsMenu').style.display = 'none';
            }
        });

        window.onload = () => {
            applyBackground();
            loadToolbarPosition();
            renderFavorites();
            setTimeout(() => urlBar.focus(), 300);
        };
function addClearButton() {
    const urlBar = document.getElementById('url-bar');
    
    const clearBtn = document.createElement('span');
    clearBtn.innerHTML = '×';
    clearBtn.style.position = 'absolute';
    clearBtn.style.right = '40px';
    clearBtn.style.top = '50%';
    clearBtn.style.transform = 'translateY(-50%)';
    clearBtn.style.fontSize = '25px';
    clearBtn.style.color = 'rgba(255,255,255,0.7)';
    clearBtn.style.cursor = 'pointer';
    clearBtn.style.display = 'none';
    clearBtn.style.fontWeight = '100';
    clearBtn.id = 'clearBtn';
    
    urlBar.parentElement.style.position = 'relative';
    urlBar.parentElement.appendChild(clearBtn);

    clearBtn.addEventListener('click', () => {
        urlBar.value = '';
        urlBar.focus();
    });

    urlBar.addEventListener('input', () => {
        clearBtn.style.display = urlBar.value.trim() ? 'block' : 'none';
    });
}

let cropperInstance = null;

function openImageCropper() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    
    input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;

        if (file.size > 20 * 1024 * 1024) {
            alert("Please select an image smaller than 20MB");
            return;
        }

        document.getElementById('settingsMenu').style.display = 'none';

        const reader = new FileReader();
        reader.onload = function(ev) {
            const img = document.getElementById('cropperImage');
            img.src = ev.target.result;
            
            document.getElementById('cropperPopup').style.display = 'flex';

            if (cropperInstance) cropperInstance.destroy();

            cropperInstance = new Cropper(img, {
                aspectRatio: NaN,         
                viewMode: 1,
                autoCropArea: 0.8,
                movable: true,
                zoomable: true,
                rotatable: true,
                scalable: true,
                background: false,
                center: true,
            });
        };
        reader.readAsDataURL(file);
    };
    input.click();
}

function applyCroppedBackground() {
    if (!cropperInstance) return;

    const croppedCanvas = cropperInstance.getCroppedCanvas({
        maxWidth: 1920,
        maxHeight: 1080,
        imageSmoothingQuality: 'high'
    });

    const croppedDataUrl = croppedCanvas.toDataURL('image/jpeg', 0.88);
    
    updateImageBackground(croppedDataUrl);
    cancelCrop();
}

function cancelCrop() {
    const popup = document.getElementById('cropperPopup');
    popup.style.display = 'none';
    
    if (cropperInstance) {
        cropperInstance.destroy();
        cropperInstance = null;
    }
}

window.onload = () => {
    applyBackground();
    loadToolbarPosition();
    renderFavorites();
    addClearButton();     
    setTimeout(() => {
        document.getElementById('url-bar').focus();
    }, 300);
};
    </script>
</body>
</html>
