<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap');

    :root {
      --bg: #f8f9fa;
      --card: #ffffff;
      --text: #1c1c1e;
      --text-secondary: #636366;
      --accent: #0071e3;
      --border: #d1d1d6;
      --base-size: 1.15;
      --radius: 20px;
    }

    [data-theme="dark"] {
      --bg: #0f0f11;
      --card: #1c1c1e;
      --text: #f5f5f7;
      --text-secondary: #a1a1a6;
      --accent: #0a84ff;
      --border: #38383a;
    }

    [data-theme="telegram"] {
      --bg: #0f1621;
      --card: #18222d;
      --text: #ffffff;
      --text-secondary: #8a9ba8;
      --accent: #229ed9;
      --border: #2a3744;
    }

    [data-theme="cozy"] {
      --bg: #f9f4ed;
      --card: #fffaf0;
      --text: #3f2a1e;
      --text-secondary: #8c6f5e;
      --accent: #d97757;
      --border: #e8d5c0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 20px;
      font-size: calc(16px * var(--base-size));
      line-height: 1.4;
    }

    .container { max-width: 440px; margin: 0 auto; }

    /* Header - Apple Style */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    h1 {
      font-size: calc(32px * var(--base-size));
      font-weight: 700;
      letter-spacing: -1.2px;
      background: linear-gradient(90deg, var(--accent), #00a1ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .settings-btn {
      width: calc(48px * var(--base-size));
      height: calc(48px * var(--base-size));
      border-radius: 50%;
      background: var(--card);
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: calc(24px * var(--base-size));
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .settings-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 4px 12px rgba(0, 113, 227, 0.15);
    }

    /* Alert Banner - Luxury Warning */
    .alert-banner {
      background: linear-gradient(135deg, #ff9500, #ff2d55);
      color: white;
      padding: calc(14px * var(--base-size)) calc(20px * var(--base-size));
      border-radius: var(--radius);
      margin-bottom: 28px;
      font-size: calc(15.5px * var(--base-size));
      font-weight: 600;
      text-align: center;
      box-shadow: 0 8px 25px rgba(255, 149, 0, 0.25);
      letter-spacing: -0.2px;
    }

    /* Main Card */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: calc(28px * var(--base-size));
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
      border: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .welcome-text {
      font-size: calc(22px * var(--base-size));
      font-weight: 600;
      margin-bottom: 8px;
      text-align: center;
    }

    input[type="password"] {
      width: 100%;
      padding: calc(18px * var(--base-size)) calc(20px * var(--base-size));
      font-size: calc(17px * var(--base-size));
      border-radius: 14px;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--text);
      margin-bottom: 18px;
      transition: border 0.3s ease;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
    }

    .btn {
      width: 100%;
      padding: calc(18px * var(--base-size));
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: calc(17.5px * var(--base-size));
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: -0.3px;
    }

    .btn:hover {
      background: #0066cc;
      transform: translateY(-1px);
    }

    /* Loan Cards - Premium Look */
    .loan-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: calc(24px * var(--base-size));
      border: 1px solid var(--border);
      margin-bottom: 20px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
      transition: transform 0.3s ease;
    }

    .loan-card:hover {
      transform: translateY(-3px);
    }

    .loan-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .loan-title {
      font-size: calc(21px * var(--base-size));
      font-weight: 700;
      letter-spacing: -0.6px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: calc(13px * var(--base-size)) 0;
      border-bottom: 1px solid var(--border);
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .label {
      font-size: calc(14.5px * var(--base-size));
      color: var(--text-secondary);
      font-weight: 500;
    }

    .value {
      font-size: calc(20px * var(--base-size));
      font-weight: 600;
      letter-spacing: -0.4px;
    }

    .overdue { color: #ff3b30; }
    .positive { color: #30d158; }

    .status {
      padding: calc(6px * var(--base-size)) calc(16px * var(--base-size));
      border-radius: 9999px;
      font-size: calc(13.5px * var(--base-size));
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .status-active { background: #30d158; color: #fff; }
    .status-overdue { background: #ff3b30; color: #fff; }
    .status-warning { background: #ff9500; color: #fff; }

    /* Settings Modal - Apple Style */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }

    .modal-content {
      background: var(--card);
      border-radius: var(--radius);
      width: 92%;
      max-width: 380px;
      padding: calc(28px * var(--base-size));
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .modal-title {
      font-size: calc(22px * var(--base-size));
      font-weight: 700;
      text-align: center;
      margin-bottom: 28px;
    }

    .option-group {
      margin-bottom: 28px;
    }

    .option-label {
      font-size: calc(15px * var(--base-size));
      color: var(--text-secondary);
      margin-bottom: 12px;
      font-weight: 500;
    }

    .theme-options, .size-options {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .option-btn {
      padding: calc(12px * var(--base-size)) calc(18px * var(--base-size));
      border-radius: 14px;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      font-size: calc(15px * var(--base-size));
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .option-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
  </style>
</head>
<body data-theme="system">

  <div class="container">
    <header>
      <h1>Finance</h1>
      <div class="settings-btn" onclick="openSettings()">⚙︎</div>
    </header>

    <!-- Luxury Alert -->
    <div id="alertBanner" class="alert-banner" style="display: none;">
      ⚠️ Your repayment is approaching. Please settle to avoid late fees.
    </div>

    <!-- Password Screen -->
    <div class="card" id="passwordCard">
      <div class="welcome-text">Welcome back</div>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="off">
      <button class="btn" onclick="checkPassword()">View Account</button>
    </div>

    <!-- Account Overview -->
    <div id="detailsCard" style="display: none;">
      <div style="margin-bottom: 28px; text-align: center;">
        <h2 id="userName" style="font-size: calc(28px * var(--base-size)); font-weight: 700; letter-spacing: -1px;"></h2>
        <p style="color: var(--text-secondary); font-size: calc(15.5px * var(--base-size)); margin-top: 4px;">Personal Finance</p>
      </div>

      <div id="loansContainer"></div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal" id="settingsModal">
    <div class="modal-content">
      <div class="modal-title">Settings</div>

      <div class="option-group">
        <div class="option-label">Appearance</div>
        <div class="theme-options">
          <button class="option-btn" data-theme="system">System</button>
          <button class="option-btn" data-theme="dark">Dark</button>
          <button class="option-btn" data-theme="light">Light</button>
          <button class="option-btn" data-theme="telegram">Telegram</button>
          <button class="option-btn" data-theme="cozy">Cozy</button>
        </div>
      </div>

      <div class="option-group">
        <div class="option-label">Display Size</div>
        <div class="size-options">
          <button class="option-btn" data-size="0.85">Small</button>
          <button class="option-btn" data-size="1">Medium</button>
          <button class="option-btn active" data-size="1.15">Large</button>
        </div>
      </div>

      <button class="btn" style="background:#ff3b30; margin-top: 12px;" onclick="closeSettings()">Done</button>
    </div>
  </div>

  <script>
    // User Data
    const users = [
      {
        password: "rahul123",
        name: "Rahul Sharma",
        loans: [
          { title: "Home Renovation", amount: 120000, interest: 18000, takenDate: "2026-02-10", endDate: "2026-08-10", overduePerDay: 550 },
          { title: "Bike Purchase", amount: 65000, interest: 9750, takenDate: "2026-03-05", endDate: "2026-09-05", overduePerDay: 320 }
        ]
      },
      {
        password: "priya456",
        name: "Priya Patel",
        loans: [
          { title: "Education Loan", amount: 150000, interest: 22500, takenDate: "2026-01-15", endDate: "2026-07-15", overduePerDay: 680 }
        ]
      },
      {
        password: "amit789",
        name: "Amit Kumar",
        loans: [
          { title: "Business Loan", amount: 80000, interest: 12000, takenDate: "2026-02-20", endDate: "2026-08-20", overduePerDay: 420 },
          { title: "Personal Loan", amount: 35000, interest: 5250, takenDate: "2026-04-01", endDate: "2026-10-01", overduePerDay: 180 }
        ]
      }
    ];

    let currentUser = null;

    function loadPreferences() {
      const savedTheme = localStorage.getItem('financeTheme') || 'system';
      const savedSize = localStorage.getItem('financeSize') || '1.15';

      if (savedTheme === 'system') document.body.removeAttribute('data-theme');
      else if (savedTheme === 'light') document.body.setAttribute('data-theme', '');
      else document.body.setAttribute('data-theme', savedTheme);

      document.documentElement.style.setProperty('--base-size', savedSize);

      document.querySelectorAll('.theme-options .option-btn').forEach(btn => {
        if (btn.getAttribute('data-theme') === savedTheme) btn.classList.add('active');
      });
      document.querySelectorAll('.size-options .option-btn').forEach(btn => {
        if (btn.getAttribute('data-size') === savedSize) btn.classList.add('active');
      });
    }

    function calculateDueStatus(endDateStr, overduePerDay) {
      const today = new Date();
      const endDate = new Date(endDateStr);
      today.setHours(0,0,0,0);
      endDate.setHours(0,0,0,0);

      const daysDiff = Math.ceil((endDate - today) / (86400000));

      if (daysDiff > 2) return { isOverdue: false, isNearDue: false, days: daysDiff, overdueAmount: 0 };
      else if (daysDiff > 0) return { isOverdue: false, isNearDue: true, days: daysDiff, overdueAmount: 0 };
      else {
        const overdueDays = Math.abs(daysDiff);
        return { isOverdue: true, isNearDue: true, days: overdueDays, overdueAmount: overdueDays * overduePerDay };
      }
    }

    function renderLoans() {
      const container = document.getElementById('loansContainer');
      container.innerHTML = '';
      let hasNearDue = false;

      currentUser.loans.forEach(loan => {
        const status = calculateDueStatus(loan.endDate, loan.overduePerDay);
        const totalDue = loan.amount + loan.interest + status.overdueAmount;

        if (status.isNearDue) hasNearDue = true;

        let statusHTML = '';
        if (status.isOverdue) {
          statusHTML = `<span class="status status-overdue">Overdue • ${status.days} days</span>`;
        } else if (status.isNearDue) {
          statusHTML = `<span class="status status-warning">Due in ${status.days} day${status.days > 1 ? 's' : ''}</span>`;
        } else {
          statusHTML = `<span class="status status-active">${status.days} days left</span>`;
        }

        const overdueRow = status.isOverdue 
          ? `<div class="info-row"><span class="label">Overdue Charges</span><span class="value overdue">₹ ${status.overdueAmount.toLocaleString('en-IN')}</span></div>`
          : `<div class="info-row"><span class="label">Overdue Rate</span><span class="value">₹ ${loan.overduePerDay}/day</span></div>`;

        const html = `
          <div class="loan-card">
            <div class="loan-header">
              <div class="loan-title">${loan.title}</div>
              ${statusHTML}
            </div>
            <div class="info-row"><span class="label">Principal</span><span class="value">₹ ${loan.amount.toLocaleString('en-IN')}</span></div>
            <div class="info-row"><span class="label">Interest</span><span class="value positive">₹ ${loan.interest.toLocaleString('en-IN')}</span></div>
            <div class="info-row"><span class="label">Taken On</span><span class="value">${loan.takenDate}</span></div>
            <div class="info-row"><span class="label">Due Date</span><span class="value">${loan.endDate}</span></div>
            ${overdueRow}
            <div style="margin-top:22px; padding-top:16px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
              <span class="label">Total Due Today</span>
              <span style="font-size: calc(25px * var(--base-size)); font-weight: 700; color: ${status.isOverdue ? '#ff3b30' : status.isNearDue ? '#ff9500' : 'var(--accent)'};">
                ₹ ${totalDue.toLocaleString('en-IN')}
              </span>
            </div>
          </div>
        `;
        container.innerHTML += html;
      });

      document.getElementById('alertBanner').style.display = hasNearDue ? 'block' : 'none';
    }

    function checkPassword() {
      const pass = document.getElementById('password').value.trim();
      currentUser = users.find(u => u.password === pass);

      if (currentUser) {
        document.getElementById('passwordCard').style.display = 'none';
        document.getElementById('detailsCard').style.display = 'block';
        document.getElementById('userName').textContent = currentUser.name;
        renderLoans();
      } else {
        alert("Incorrect password. Please try again.");
      }
    }

    function logout() {
      document.getElementById('passwordCard').style.display = 'block';
      document.getElementById('detailsCard').style.display = 'none';
      document.getElementById('password').value = '';
      document.getElementById('alertBanner').style.display = 'none';
    }

    function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
    function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }

    // Theme & Size Handlers
    document.querySelectorAll('.theme-options .option-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.theme-options .option-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const theme = btn.getAttribute('data-theme');
        localStorage.setItem('financeTheme', theme);

        if (theme === 'system') document.body.removeAttribute('data-theme');
        else if (theme === 'light') document.body.setAttribute('data-theme', '');
        else document.body.setAttribute('data-theme', theme);
      });
    });

    document.querySelectorAll('.size-options .option-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.size-options .option-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const size = btn.getAttribute('data-size');
        localStorage.setItem('financeSize', size);
        document.documentElement.style.setProperty('--base-size', size);
      });
    });

    document.getElementById('password').addEventListener('keypress', e => {
      if (e.key === 'Enter') checkPassword();
    });

    window.onload = loadPreferences;
  </script>
</body>
</html>
