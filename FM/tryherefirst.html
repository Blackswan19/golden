* {
	-webkit-tap-highlight-color: transparent;
	box-sizing: border-box;
	margin: 0;
	padding: 0;
	font-family: 'Poppins', sans-serif;
	scrollbar-width: none;letter-spacing: 0.5px;
}
        * { margin:0; padding:0; box-sizing:border-box; }
       
    :root {
      --bg: #000000;
      --header: #121212;
      --card: #ffffff0f;
      --text: #ffffff;
      --text2: #ffffff63;
      --accent: #0000ff;
    }
    .light {
      --bg: #f8f9fa;
      --header: #ffffff;
      --card: #ffffff;
      --text: #111111;
      --text2: #666666;
      --accent: #0000ff;
    }* {
            -webkit-tap-highlight-color: transparent;
        }
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
body {
  --c-glass: #bbbbbc;
  --c-light: #fff;
  --c-dark: #000;
  
  --c-content: rgb(255, 255, 255);
  --c-action: #0052f5;
  
  --glass-reflex-dark: 1;
  --glass-reflex-light: 1;
  
  --saturation: 150%;
  
  color: var(--c-content);
}

body:has(input[value="dark"]:checked) {
  --c-glass: #bbbbbc;
  --c-light: #fff;
  --c-dark: #000;
  
  --c-content: #e1e1e1;
  --c-action: #03d5ff;
  
  --c-bg: #1b1b1d;
}

body:has(input[value="dim"]:checked) {
  --c-light: #99deff;
  --c-dark: #20001b;
  --c-glass: hsl(335 250% 74% / 1);
  
  --c-content: #d5dbe2;
  --c-action: #ff48a9;
  
  --c-bg: #152433;

}
    * { margin:0; padding:0; box-sizing:border-box; scrollbar-width: none;}
    h2 {
    text-align: center;
    color: #00aaff;
}
    body {
      background-color: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    width: 100%;
    }
    .toplogos {
 display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    gap: 0;
    flex-direction: column;
}
    header {
position: fixed;
    top: 0;
    right: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 25px 10px 5px 10px;
    flex-direction: column;
    width: 100%;
    max-width: 550px;
    left: 50%;
    transform: translate(-50%, 0);
    background: #111111e8;
    border-bottom: solid 0.5px #59595938;
    backdrop-filter: blur(10px);
    }
    header  svg {
    fill: #00a1ff;
}
    header span{
display: flex;
    justify-content: center;
    flex-direction: column;
    align-items: center;
    font-size: 15px;
    color: white;
    font-weight: 500;
    gap: 9px;
    }
    header p{
     color: #ffffff80;
    font-size: 10px;
    padding: 0px;
    font-weight: 100;
    }
    button.btn-primary {
   font-weight: 600;
    letter-spacing: 0.3px;
    font-size: 18px;
    background: transparent;
}
    header button {
background: transparent;
    color: white;
    border: none;
    font-size: 16px;
    }
    
    .theme-btn {
      transition: all 0.3s;
    }
    i.fa-solid.fa-arrow-left {
    background-color: #46515f;
    border-radius: 100px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    z-index: 11;
    outline: none;
    border: none;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 30px;
    height: 30px;
}
    main {
flex: 1;
    overflow-y: auto;
    background: transparent;
    padding: 130px 8px 80px 8px;
    width: 100%;
    max-width: 565px;
    }
button.theme-btn {
  width: fit-content;
    display: flex;
    gap: 0px;
    font-size: 16px;
    align-items: center;
    justify-content: center;
    color: #00aaff;
}
   
.nav-container svg {
    fill: #00aaff;
   width: 28px;
    height: 28px;
}
.nav {
max-width: 550px;
    text-align: center;
    position: fixed;
    bottom: 0px;
    width: 100%;
    z-index: 100000000;
    background: #111111e8;
    border-top: solid 0.5px #59595938;
    backdrop-filter: blur(10px);
    padding: 5px 20px 20px 20px;
}
   .nav-container {
  display: flex;
    justify-content: space-between;
    align-items: flex-start;
}.maintpopt {
display: flex;
    justify-content: space-between;
    align-items: flex-start;
    width: 100%;
}

 color: #00aaff;

}

    }
    
    .text-secondary {
      color: var(--text2);
    }
    
    .accent {
      color: var(--accent);
    }

     position: fixed;
    inset: 0;
    background-color: #000000bf;
    display: none;
    align-items: end;
    justify-content: center;
    z-index: 9999999999;
    }
    .modal.show {
      display: flex;
    }
    
    .modal-content {
width: 100%;
    max-width: 600px;
    border-radius: 20px 20px 0 0;
    overflow: hidden;
    animation: 0.3s cubic-bezier(0.32, 0.72, 0, 1) forwards;
    background: #161616;
}

    
    .modal-header {
     padding: 20px 25px;

    justify-content: space-between;
    align-items: center;
    }

    letter-spacing: 0.5px;
    color: #00aaff;
    margin: 5px 0 0 0;
    text-align: center;
}

    border-radius: 25px;
    padding: 13px;
    }

    .faq-container {
     background: #161616;
    border-radius: 20px;
    padding: 13px;

.faq-item {
    padding: 5px;
}
    .faq-item:last-child {
      border-bottom: none;

    .faq-item h3 {

    }li {

}
    .faq-item p {

    font-size: 25px;

    color: var(--text);
    border-radius: 12px;
}
    
    .calc-result {
         padding: 0px 5px;
    }
    
    .btn-primary {
width: 100%;

    padding: 10px;
    border: none;

    border-bottom: solid 3px #00000078;

    }
i.fa-solid.fa-xmark.text-3xl.cursor-pointer {

    .btn-secondary {
     width: 100%;

    font-size: 16px;

    transition: all 0.2s;

}

    }

    function hideModal() {
      const modal = document.getElementById('modal');
      modal.classList.remove('show');
    }

    function toggleTheme() {
      isDarkMode = !isDarkMode;
      if (isDarkMode) {
        document.body.classList.remove('light');
        document.getElementById('theme-icon').classList.replace('fa-sun', 'fa-moon');
      } else {
        document.body.classList.add('light');
        document.getElementById('theme-icon').classList.replace('fa-moon', 'fa-sun');
      }
    }

    window.onload = () => {
      switchTab(0);
      console.log('%c✅ BS & MFI — Full pure CSS version (NO Tailwind CDN)', 'color:#0000ff; font-weight:600');

        window.history.back();
      } else {
        alert("✅ Back button clicked!\n\n(In a real app this would take you to previous screen or home.)");
      }
    }
  </script>
