function getColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) {
    hash = name.charCodeAt(i) + ((hash << 5) - hash);
  }
  const hue = Math.abs(hash) % 360;

}

function getInitial(name) {

  const initial = getInitial(site.name);

  a.innerHTML = `
    <div class="letter-icon" style="background: ${bg};">${initial}</div>
    <div class="site-info">
      <h3>${site.name}</h3>
      <p style="    font-size: 12px;
    color: #ffffff4f;">${site.desc}</p>
    </div>
  `;

  return a;
}

// Render All Sections
function renderAll() {
  const container = document.getElementById("sectionsContainer");
  container.innerHTML = "";

  siteGroups.forEach(group => {
    const section = document.createElement("div");
    section.className = "section";

    const h2 = document.createElement("h2");
    h2.textContent = group.heading;
    section.appendChild(h2);

    const list = document.createElement("div");
    list.className = "site-list";

    group.sites.forEach(site => {
      list.appendChild(createSiteItem(site));
    });

    section.appendChild(list);
    container.appendChild(section);
  });
}

// Search Function
function renderFiltered(query = "") {
  const q = query.toLowerCase().trim();
  if (!q) {
    renderAll();
    return;
  }

  const container = document.getElementById("sectionsContainer");
  container.innerHTML = "";

  siteGroups.forEach(group => {
    const matches = group.sites.filter(s =>
      s.name.toLowerCase().includes(q) || 
      (s.desc && s.desc.toLowerCase().includes(q))
    );

    if (!matches.length) return;

    const section = document.createElement("div");
    section.className = "section";
    section.innerHTML = `<h2>${group.heading}</h2>`;

    const list = document.createElement("div");
    list.className = "site-list";
    matches.forEach(site => list.appendChild(createSiteItem(site)));
    section.appendChild(list);
    container.appendChild(section);
  });
}

// Initialize
renderAll();

document.getElementById("searchInput").addEventListener("input", e => {
  renderFiltered(e.target.value);
});
</script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    const loadingOverlay = document.getElementById("loadingOverlay");
    const startBtn = document.getElementById("startAudioBtn");
    const audioControls = document.getElementById("audioControls");
    const progressFill = document.getElementById("audioProgressFill");
    const audioStatus = document.getElementById("audioStatus");
    const audio = document.getElementById("introAudio");
    const muteToggle = document.getElementById("muteToggle");

    let progressInterval = null;

    // Mute Toggle
    muteToggle?.addEventListener("click", () => {
        audio.muted = !audio.muted;
        muteToggle.innerHTML = audio.muted 
            ? '<i class="fas fa-volume-xmark"></i>' 
            : '<i class="fas fa-volume-high"></i>';
    });

    // Start Button
    startBtn?.addEventListener("click", async () => {
        startBtn.style.display = "none";
        audioControls.style.display = "flex";

        try {
            if (audio.readyState < 1) {
                await new Promise(resolve => audio.addEventListener("loadedmetadata", resolve, { once: true }));
            }

            // const duration = audio.duration || 8;
            // const stopTime = Math.min(Math.random() * 3 + 5, duration);


             const duration = audio.duration || 0;
            const stopTime = Math.min(Math.random() * 0 + 0, duration);

            progressFill.style.width = "0%";
            audioStatus.textContent = "0% • Connecting...";

            await audio.play();

            let currentPercent = 0;

            progressInterval = setInterval(() => {
                currentPercent = Math.min((audio.currentTime / stopTime) * 100, 100);

                progressFill.style.width = currentPercent + "%";
                audioStatus.textContent = Math.round(currentPercent) + "% • Connecting...";

                if (audio.currentTime >= stopTime || currentPercent >= 100) {
                    clearInterval(progressInterval);
                    progressFill.style.width = "100%";
                    audioStatus.textContent = "100% • Connected!";
                    audio.pause();
                    loadingOverlay.style.opacity = "0";
                    setTimeout(() => {
                        loadingOverlay.style.display = "none";
                    }, 600);
                }
            }, 40);

        } catch (e) {
            console.error(e);
            audioStatus.textContent = "❌ Audio playback blocked";
            // Still hide after few seconds if audio fails
            setTimeout(() => {
                loadingOverlay.style.opacity = "0";
                setTimeout(() => loadingOverlay.style.display = "none", 600);
            }, 2000);
        }
    });
});
</script>
