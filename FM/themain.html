lden/FM/accverify"> <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"> <path d="M247.85-260.62q51-36.69 108.23-58.03Q413.31-340 480-340t123.92 21.35q57.23 21.34 108.23 58.03 39.62-41 63.73-96.84Q800-413.31 800-480q0-133-93.5-226.5T480-800q-133 0-226.5 93.5T160-480q0 66.69 24.12 122.54 24.11 55.84 63.73 96.84Zm146.88-234.11Q360-529.46 360-580t34.73-85.27Q429.46-700 480-700t85.27 34.73Q600-630.54 600-580t-34.73 85.27Q530.54-460 480-460t-85.27-34.73ZM480-120q-75.31 0-141-28.04t-114.31-76.65Q176.08-273.31 148.04-339 120-404.69 120-480t28.04-141q28.04-65.69 76.65-114.31 48.62-48.61 114.31-76.65Q404.69-840 480-840t141 28.04q65.69 28.04 114.31 76.65 48.61 48.62 76.65 114.31Q840-555.31 840-480t-28.04 141q-28.04 65.69-76.65 114.31-48.62 48.61-114.31 76.65Q555.31-120 480-120Zm108.85-59.35q53.53-19.34 92.53-52.96-39-31.31-90.23-49.5Q539.92-300 480-300q-59.92 0-111.54 17.81-51.61 17.81-89.84 49.88 39 33.62 92.53 52.96Q424.69-160 480-160q55.31 0 108.85-19.35Zm-52-343.8Q560-546.31 560-580t-23.15-56.85Q513.69-660 480-660t-56.85 23.15Q400-613.69 400-580t23.15 56.85Q446.31-500 480-500t56.85-23.15ZM480-580Zm0 350Z"/> </svg> </a> </div> </div>
<script>
 const siteGroups = [
    {
    heading: "Return Management",
    sites: [
      { name: "BS&MFI Solutions",      desc: "Return date extender",       url: "https://blackswan19.github.io/golden/FM/solution",      icon: "fab fa-youtube"       },
]
},
{
  heading: "New in & issue",
  sites: [
    { name: "Enterance Form", desc: "New members form",       url: "https://mfi0212.github.io/MFI/entrysheet", icon: "fas fa-code"         },
    { name: "Helper",      desc: "I have issue form",           url: "https://mfi0212.github.io/MFI/abt.hlp",      icon: "fas fa-film"          },
  ]
},
{
  heading: "Offer & Earns",
  sites: [
    { name: "BsGames",       desc: "Exclusive rewards and benefits for BS&MFI members.",          url: "https://blackswan19.github.io/golden/Bs%20Games/bsgames",       icon: "fab fa-reddit"        },
    { name: "Stars",       desc: "Interest reducer.",          url: "https://blackswan19.github.io/golden/FM/starspage",       icon: "fab fa-reddit"        },
  ]
},
  
  {
    heading: "Services",
    sites: [
      { name: "All Services", desc: "All service from BS&MFI",       url: "https://blackswan19.github.io/BS/bslends", icon: "fas fa-code"         },
      { name: "BsLends", desc: "A service from BS&MFI",       url: "https://mfi0212.github.io/MFI/rate", icon: "fas fa-code"         },
      { name: "Myootive", desc: "A service from BS&MFI",       url: "https://blackswan19.github.io/golden/FM/themain", icon: "fas fa-code"         },
    ]
  },
   {
    heading: "Collaboration",
    sites: [
      { name: "BsPsgenerater", desc: "Password generator",       url: "https://blackswan19.github.io/Educate/password", icon: "fas fa-code"         },
      { name: "BsReminder", desc: "Date wise notes",       url: "https://blackswan19.github.io/bscrop/reminder", icon: "fas fa-code"         },
      { name: "BsBookpad", desc: "Download the notes",       url: "https://blackswan19.github.io/Educate/bookpad", icon: "fas fa-code"         },
      { name: "BsAdstoper", desc: "Ad blocker",       url: "https://blackswan19.github.io/Educate/stoper", icon: "fas fa-code"         },
    ]
  }
];

function getColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) {
    hash = name.charCodeAt(i) + ((hash << 5) - hash);
  }
  const hue = Math.abs(hash) % 360;
  return `hsl(${hue}, 75%, 58%)`;
}

function getInitial(name) {
  return name.trim()[0]?.toUpperCase() || "?";
}
function createSiteItem(site) {
  const a = document.createElement("a");
  a.href = site.url || "#";
  a.target = "_parent";
  a.className = "site-item";

  const bg = getColor(site.name);
  const initial = getInitial(site.name);

  a.innerHTML = `
    <div class="letter-icon" style="background: ${bg};">${initial}</div>
    <div class="site-info">
      <h3>${site.name}</h3>
      <p style="font-size:13px; color:#aaa;">${site.desc}</p>
    </div>
  `;

  return a;
}

function renderAll() {
  const container = document.getElementById("sectionsContainer");
  container.innerHTML = "";

  siteGroups.forEach(group => {
    const section = document.createElement("div");
    section.className = "section";

    const h2 = document.createElement("h2");
    h2.textContent = group.heading;
    section.appendChild(h2);

    const list = document.createElement("div");
    list.className = "site-list";

    group.sites.forEach(site => {
      list.appendChild(createSiteItem(site));
    });

    section.appendChild(list);
    container.appendChild(section);
  });
}
function renderFiltered(query = "") {
  const q = query.toLowerCase().trim();
  if (!q) {
    renderAll();
    return;
  }

  const container = document.getElementById("sectionsContainer");
  container.innerHTML = "";

  siteGroups.forEach(group => {
    const matches = group.sites.filter(s =>
      s.name.toLowerCase().includes(q) || 
      (s.desc && s.desc.toLowerCase().includes(q))
    );

    if (!matches.length) return;

    const section = document.createElement("div");
    section.className = "section";
    section.innerHTML = `<h2>${group.heading}</h2>`;

    const list = document.createElement("div");
    list.className = "site-list";
    matches.forEach(site => list.appendChild(createSiteItem(site)));
    section.appendChild(list);
    container.appendChild(section);
  });
}
renderAll();
document.getElementById("searchInput").addEventListener("input", e => {
  renderFiltered(e.target.value);
});
document.addEventListener("DOMContentLoaded", () => {
    const loadingOverlay = document.getElementById("loadingOverlay");
    const startBtn = document.getElementById("startAudioBtn");
    const audioControls = document.getElementById("audioControls");
    const progressFill = document.getElementById("audioProgressFill");
    const audioStatus = document.getElementById("audioStatus");
    const audio = document.getElementById("introAudio");
    const muteToggle = document.getElementById("muteToggle");

    let progressInterval = null;
    muteToggle?.addEventListener("click", () => {
        audio.muted = !audio.muted;
        muteToggle.innerHTML = audio.muted 
            ? '<i class="fas fa-volume-xmark"></i>' 
            : '<i class="fas fa-volume-high"></i>';
    });
    startBtn?.addEventListener("click", async () => {
        startBtn.style.display = "none";
        audioControls.style.display = "flex";

        try {
            if (audio.readyState < 1) {
                await new Promise(resolve => audio.addEventListener("loadedmetadata", resolve, { once: true }));
            }

            const duration = audio.duration || 8;
            const stopTime = Math.min(Math.random() * 3 + 5, duration);

            progressFill.style.width = "0%";
            audioStatus.textContent = "0% • Connecting...";

            await audio.play();

            let currentPercent = 0;

            progressInterval = setInterval(() => {
                currentPercent = Math.min((audio.currentTime / stopTime) * 100, 100);

                progressFill.style.width = currentPercent + "%";
                audioStatus.textContent = Math.round(currentPercent) + "% • Connecting...";

                if (audio.currentTime >= stopTime || currentPercent >= 100) {
                    clearInterval(progressInterval);
                    progressFill.style.width = "100%";
                    audioStatus.textContent = "100% • Connected!";
                    audio.pause();
                    loadingOverlay.style.opacity = "0";
                    setTimeout(() => {
                        loadingOverlay.style.display = "none";
                    }, 600);
                }
            }, 40);

        } catch (e) {
            console.error(e);
            audioStatus.textContent = "❌ Audio playback blocked";
            setTimeout(() => {
                loadingOverlay.style.opacity = "0";
                setTimeout(() => loadingOverlay.style.display = "none", 600);
            }, 2000);
        }
    });
});
</script>
