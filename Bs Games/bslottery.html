<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>BsGames | Lottery Spins</title> <link rel="icon" href="https://i.ibb.co/ZpVQQ2Kp/mfi-logo.png" /> <style> :root{ --yellow:#f5c518; --red:#e53935; --blue:#1e88e5; --bg:#000000; --card:#161616; } * { -webkit-tap-highlight-color: transparent; } body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; } body{ margin:0; min-height:100vh; background:var(--bg); font-family:system-ui, Segoe UI, sans-serif; color:#fff; display:flex; justify-content:center; align-items:center; } .container{ width:90%; max-width:680px; padding:32px; text-align:center; } h1{color:var(--yellow);margin-bottom:10px} p{color:#ccc} input{ width:220px; padding:12px; font-size:16px; background:#000; color:#fff; border:1px solid #333; border-radius:8px; } button{ padding:12px 22px; font-size:16px; margin-left:8px; background:var(--blue); color:#fff; border:none; border-radius:8px; cursor:pointer; } .cards{ margin-top:28px; display:grid; grid-template-columns:repeat(3,1fr); gap:18px; } .card{ height:130px; background:var(--card); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:600; cursor:pointer; border:1px solid #222; } .card.revealed{cursor:default} .win{color:var(--yellow)} .empty{color:var(--red)} .hidden{display:none} #message{ margin-top:20px; font-size:18px; } .exchange-btn { background: #2481cc; color: white; border: none; padding: 10px; font-size: 14px; font-weight: 400; border-radius: 9px; cursor: pointer; transition: all 0.2s; position: fixed; top: 10px; right: 10px; } .exchange-btn:hover { background: #0066cc; } /* Modal */ .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.82); display: none; justify-content: center; align-items: center; z-index: 1000; } .modal-content { background: #111111; border-radius: 15px; width: 80%; max-width: 420px; border: none; position: relative; animation: popup 0.28s ease-out;padding: 24px; } @keyframes popup { from { transform: scale(0.94); opacity: 0; } to { transform: scale(1); opacity: 1; } } h2 { margin: 0 0 22px 0; font-size: 22px; color: #ffffff; font-weight: 600; } .form-group { margin-bottom: 20px; } label { display: block; margin-bottom: 8px; font-weight: 500; color: #b0b0b0; font-size: 14px; } input { width: 100%; padding: 10px 14px; background: #1a1a1a; border: none; border-radius: 10px; color: #ffffff; font-size: 14px;outline: none; box-sizing: border-box; } input::placeholder { color: #555; } .submit-btn { background: #2481cc; color: white; border: none; padding: 10px 21px; font-size: 15px; font-weight: 400; border-radius: 27px; cursor: pointer; transition: background 0.2s; width: 100%;outline: none; margin: 5px 0px; } .submit-btn:hover { background: #1a6bb3; } /* States */ .loading-state, .success-state { display: none; text-align: center; padding: 20px 0px; } .success-state { color: #a0e060; } .success-icon { font-size: 54px; margin-bottom: 20px; } .success-title { font-size: 21px; font-weight: 600; color: #ffffff; margin: 10px 0 16px; } .close-btn { position: absolute; top: 16px; right: 20px; font-size: 28px; cursor: pointer; color: #777; line-height: 1; } .close-btn:hover { color: #ccc; } .fee-highlight { color: #ffdd57; font-weight: 600; } </style> </head> <body> <button class="exchange-btn" id="exchangeBtn">Exchange Gift</button> <!-- Modal --> <div class="modal-overlay" id="exchangeModal"> <div class="modal-content"> <span class="close-btn" id="closeModal">×</span> <!-- Form --> <div id="formStep"> <h2>Exchange Gift</h2> <div class="form-group"> <label>Your ID</label> <input type="text" id="yourId" placeholder="Your ID" required> </div> <div class="form-group"> <label>Exchanger ID</label> <input type="text" id="exchangerId" placeholder="Exchanger's ID" required> </div> <div class="form-group"> <label>Exchanger Gift ID</label> <input type="text" id="giftId" placeholder="Gift ID" required> </div> <button class="submit-btn" id="submitExchange">Submit</button> </div> <!-- Verifying --> <div class="loading-state" id="loadingStep"> <div style="font-size:44px; margin-bottom:24px;">⟳</div> <h2>Verifying...</h2> <p style="color:#999;">Wait a moment</p> </div> <!-- Success --> <div class="success-state" id="successStep"> <div class="success-icon">✅</div> <div class="success-title">Exchange Requested!</div> <p>Gift exchange fee was <span class="fee-highlight">₹460</span> from Exchanger.</p> <p>We will verify your fee and exchange details shortly.</p> <p style="margin-top:24px; color:#0066cc; font-size:15px;">Thank you!</p> </div> </div> </div>
  <script>
    const modal = document.getElementById('exchangeModal');
    const btn = document.getElementById('exchangeBtn');
    const closeBtn = document.getElementById('closeModal');
    const submitBtn = document.getElementById('submitExchange');

    const formStep   = document.getElementById('formStep');
    const loadingStep = document.getElementById('loadingStep');
    const successStep = document.getElementById('successStep');

    btn.onclick = () => {
      modal.style.display = 'flex';
      formStep.style.display = 'block';
      loadingStep.style.display = 'none';
      successStep.style.display = 'none';
    };

    closeBtn.onclick = () => modal.style.display = 'none';
    modal.onclick = (e) => {
      if (e.target === modal) modal.style.display = 'none';
    };

    submitBtn.onclick = () => {
      const yourId     = document.getElementById('yourId').value.trim();
      const exchangerId = document.getElementById('exchangerId').value.trim();
      const giftId     = document.getElementById('giftId').value.trim();

      if (!yourId || !exchangerId || !giftId) {
        alert("Fill all fields");
        return;
      }

      formStep.style.display = 'none';
      loadingStep.style.display = 'block';

      setTimeout(() => {
        loadingStep.style.display = 'none';
        successStep.style.display = 'block';
      }, 2000);
    };
  </script>
<div class="container" id="app">
    <h1>Lottery Spins</h1>
    <div id="content"></div>
</div>

<script>
const START_TIME = new Date("2026-02-17T18:00:00");
const END_TIME   = new Date("2026-02-22T23:59:00");
const now = new Date();
const content = document.getElementById("content");
document.addEventListener('contextmenu', e => e.preventDefault());
if(now < START_TIME || now > END_TIME){
    content.innerHTML = `
        <p style="color:#e53935;font-size:20px;font-weight:600">
            No Current Spins Available
        </p>
    `;
    throw new Error("Spin window closed");
}
if(localStorage.getItem("claimed")){
    content.innerHTML = `
        <p style="color:#e53935;font-size:18px">
            Reward already claimed on this device.
        </p>
    `;
    throw new Error("Already claimed");
}
content.innerHTML = `
    <p>Enter access code</p>
    <input id="code" type="password" placeholder="•••••••••">
    <button onclick="verify()">Verify</button>
    <div id="message"></div>
`;
function verify(){
    if(document.getElementById("code").value === "123456789"){
        startGame();
    }else{
        document.getElementById("message").textContent = "Invalid code";
        document.getElementById("message").style.color = "#e53935";
    }
}
const totalCards = 6;
const maxOpens = 3;
let opened = 0;
let giftGiven = false;
const gifts = ["100 Stars","200 Stars","300 Stars"];
const selectedGift = gifts[Math.floor(Math.random()*3)];
function startGame(){
    content.innerHTML = `
        <p>Select any 3 cards</p>
        <div class="cards" id="cards"></div>
        <div id="message"></div>
    `;
    const wrap = document.getElementById("cards");
    for(let i=0;i<totalCards;i++){
        const c = document.createElement("div");
        c.className = "card";
        c.textContent = "?";
        c.onclick = ()=>openCard(c);
        wrap.appendChild(c);
    }
}
function openCard(card){
    if(card.classList.contains("revealed")) return;
    if(opened >= maxOpens) return;
    opened++;
    card.classList.add("revealed");
    let giveGift =
        (opened === maxOpens && !giftGiven) ||
        (!giftGiven && Math.random() < 0.33);

    if(giveGift && !giftGiven){
        giftGiven = true;
        card.textContent = selectedGift;
        card.classList.add("win");
        document.getElementById("message").textContent =
            "You won " + selectedGift;
        document.getElementById("message").style.color = "#f5c518";
        localStorage.setItem("claimed","true");
    }else{
        card.textContent = "Empty";
        card.classList.add("empty");
    }

    if(opened === maxOpens){
        localStorage.setItem("claimed","true");
    }
}
</script>
</body>
</html>
